<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CodeWhale</title>
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#faf9f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CodeWhale">
<style>
  :root{
    --bg:#faf9f7; --panel:#f4f2ee; --panel2:#e9e6e0; --line:#e2ded7;
    --txt:#2b2926; --dim:#6b665f; --faint:#9c968d;
    --accent:#c2410c; --accent2:#d4622a; --user:#dde8ef; --usertxt:#1f3a4d;
    --ok:#3f9d5f; --run:#c08a2e; --err:#c4483f; --code:#f0ede7;
    --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sidebar-w:268px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{display:flex;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;overflow:hidden}

  /* ---------- Sidebar ---------- */
  #sidebar{width:var(--sidebar-w);min-width:210px;max-width:min(520px,55vw);flex:0 0 var(--sidebar-w);background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
  html.sidebar-collapsed #sidebar,html.sidebar-collapsed #sideresize{display:none}
  #sideresize{width:5px;flex:0 0 5px;cursor:col-resize;background:transparent;position:relative;z-index:8}
  #sideresize::after{content:"";position:absolute;top:0;bottom:0;left:2px;width:1px;background:transparent}
  #sideresize:hover::after,body.sideresizing #sideresize::after{background:var(--accent)}
  body.sideresizing{cursor:col-resize;user-select:none}
  #sidehead{padding:14px 14px 10px;border-bottom:1px solid var(--line)}
  #brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;letter-spacing:.2px}
  #brand .logo{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px}
  #brand .bname{font-weight:600;font-size:15px}
  #version{font-size:11px;color:var(--faint);font-weight:400}
  #updbtn,#guiupdbtn{display:none;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;margin-left:6px}
  #updbtn{margin-left:auto}
  #updbtn:hover,#guiupdbtn:hover{background:var(--accent2)} #updbtn.busy,#guiupdbtn.busy{background:var(--panel2);color:var(--dim);cursor:default}
  .updprog{min-width:220px;text-align:right}
  .updbar{height:8px;border-radius:5px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
  .updfill{height:100%;width:0%;background:var(--accent);border-radius:5px;transition:width .35s ease}
  .updfill.err{background:#c0392b}
  .updtxt{font-size:11px;color:var(--dim);margin-top:4px;white-space:nowrap}
  #cwtoast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(12px);background:var(--txt);color:var(--bg);padding:9px 16px;border-radius:9px;font-size:13px;max-width:80vw;white-space:pre-wrap;box-shadow:0 6px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.2s;z-index:200}
  #cwtoast.show{opacity:.96;transform:translateX(-50%) translateY(0)}
  .cwdlg-ov{position:fixed;inset:0;background:rgba(0,0,0,.34);display:flex;align-items:center;justify-content:center;z-index:210}
  .cwdlg{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .cwdlg-m{font-size:13.5px;line-height:1.6;color:var(--txt);white-space:pre-wrap;margin-bottom:14px}
  .cwdlg-b{display:flex;gap:8px;justify-content:flex-end}
  .cwdlg-b button{border-radius:8px;padding:6px 16px;font-size:13px;cursor:pointer;border:1px solid var(--line)}
  .cwdlg-cancel{background:var(--bg);color:var(--dim)}
  .cwdlg-ok{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  #newbtn{margin-top:12px;width:100%;padding:9px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:5px}
  #newbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
  #updatebar{display:none;margin-top:8px;padding:7px 10px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;text-align:center;font-weight:500;line-height:1.35}
  #updatebar:hover{background:var(--accent2)}
  #updatebar.busy{background:var(--panel2);color:var(--dim);cursor:default}
  #threads{flex:1;overflow-y:auto;padding:8px}
  .grp{display:flex;align-items:center;gap:6px;padding:9px 8px 4px;margin-top:2px;font-size:11px;font-weight:700;color:var(--faint);letter-spacing:.3px;cursor:pointer;user-select:none}
  .grp:first-child{margin-top:0}
  .grp:hover{color:var(--dim)}
  .grp:focus-visible,.thread:focus-visible,.runstatus-h:focus-visible{outline:2px solid color-mix(in srgb,var(--accent) 55%,transparent);outline-offset:2px}
  .grp .gcount{font-weight:500;opacity:.65}
  .grp .gcar{margin-left:auto;font-size:8px;opacity:.7;transition:transform .15s}
  .grp.collapsed .gcar{transform:rotate(-90deg)}
  .thread{padding:9px 10px;border-radius:9px;cursor:pointer;margin-bottom:3px;border:1px solid transparent}
  .thread.cmpsess{background:color-mix(in srgb,var(--accent) 6%,transparent)}              /* 对比会话行:淡强调底,和单聊区分 */
  .thread.cmpsess:hover{background:color-mix(in srgb,var(--accent) 12%,transparent)}
  .thread.cmpsess .title{font-weight:600}
  .thread:hover{background:var(--panel2)}
  .thread.active{background:var(--panel2);border-color:var(--line)}
  .thread .t1{display:flex;align-items:center;gap:7px}
  .thread .dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex:0 0 auto}   /* idle=灰 */
  .thread .dot.ok{background:var(--ok)}                 /* 完成=绿 */
  .thread .dot.err{background:var(--err)}               /* 失败/中断=红 */
  .thread .dot.running{width:12px;height:12px;border:2px solid var(--line);border-top-color:var(--accent);background:transparent;box-sizing:border-box;animation:spin .7s linear infinite}  /* 运行中=橙色旋转圈 */
  @keyframes spin{to{transform:rotate(360deg)}}
  .thread .dot.stalled{width:12px;height:12px;border:2px solid var(--run);border-radius:50%;background:transparent;box-sizing:border-box;opacity:.55}  /* 非旋转琥珀环 = 可能卡住/超时 */
  .thread .title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .thread .title .ico{width:13px;height:13px;margin-right:3px;vertical-align:-2px}
  .thread .prev{font-size:11.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:3px 0 0 14px}
  .thread .meta{font-size:10.5px;color:var(--faint);margin:3px 0 0 14px;display:flex;gap:8px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  #sidefoot{padding:8px 12px;border-top:1px solid var(--line);font-size:11px;color:var(--faint);display:flex;flex-direction:column;gap:6px}
  #statusrow{display:flex;justify-content:space-between;align-items:center;gap:8px}
  #modelchip{border:1px solid var(--line);background:var(--panel);color:var(--dim);border-radius:7px;padding:3px 9px;font-size:11px;cursor:pointer;max-width:64%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #modelchip:hover{color:var(--accent);border-color:var(--accent)}
  #conn{display:flex;align-items:center;gap:5px}
  #conn .cd{width:7px;height:7px;border-radius:50%;background:var(--err)} #conn.up .cd{background:var(--ok)}

  /* ---------- Main ---------- */
  #main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  #scrollbtn{position:absolute;right:22px;bottom:92px;width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer;font-size:16px;box-shadow:0 2px 9px rgba(0,0,0,.16);display:none;z-index:20}
  #scrollbtn.show{display:flex;align-items:center;justify-content:center} #scrollbtn:hover{color:var(--accent);border-color:var(--accent)}
  #topbar{height:50px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:12px;background:var(--panel)}
  .ico{width:16px;height:16px;display:inline-block;vertical-align:-3px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
  .iconbtn{width:34px;height:32px;border:1px solid transparent;background:transparent;color:var(--dim);border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;flex:0 0 auto}
  .iconbtn:hover,.iconbtn.on{background:var(--panel2);border-color:var(--line);color:var(--accent)}
  #ttitle{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #tmeta{font-size:11.5px;color:var(--dim);display:flex;gap:10px;flex:1;white-space:nowrap;overflow:hidden}
  .badge{background:var(--panel2);border:1px solid var(--line);padding:1px 8px;border-radius:20px;font-size:11px;color:var(--dim)}
  #interruptbtn{display:none;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--err);background:transparent;color:var(--err);border-radius:8px;cursor:pointer;font-size:12px}
  #interruptbtn:hover{background:var(--err);color:#fff}
  #fswrap,#cmpFswrap{display:inline-flex;align-items:center}   /* A−/A+ 连成一个紧凑小药丸,不显字号数字 */
  .fsbtn{border:1px solid var(--line);background:var(--panel2);color:var(--dim);width:23px;height:21px;cursor:pointer;font-size:11px;line-height:1;padding:0;font-weight:600}
  .fsbtn:first-child{border-radius:6px 0 0 6px}
  .fsbtn:last-child{border-radius:0 6px 6px 0;border-left:none}
  .fsbtn:hover{color:var(--accent);border-color:var(--accent);position:relative;z-index:1}
  #previewbtn{padding:5px 10px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);border-radius:8px;cursor:pointer;font-size:12px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  #previewbtn:hover,#previewbtn.on{color:#fff;background:var(--accent);border-color:var(--accent)}

  #messages{flex:1;overflow-y:auto;padding:24px 0}
  #mwrap{max-width:760px;margin:0 auto;padding:0 24px}
  .empty{color:var(--faint);text-align:center;margin-top:18vh;font-size:14px;line-height:1.9}
  .empty .big{font-size:26px;margin-bottom:8px}

  .msg{margin-bottom:20px;display:flex;gap:11px}
  .msg .av{width:28px;height:28px;border-radius:7px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin-top:1px}
  .msg.user .av{background:var(--user);color:var(--usertxt)}
  .msg.assistant .av{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .msg .body{flex:1;min-width:0;padding-top:3px}
  .msg .who{font-size:11px;color:var(--faint);margin-bottom:4px;font-weight:600;letter-spacing:.3px}
  .msg .content{line-height:1.62;white-space:normal;word-wrap:break-word;font-size:var(--chat-fs,14px)}
  .msg.user .content{color:var(--usertxt)}
  .msg.queued{opacity:.62} .msg.queued .who{color:var(--run)} .msg.queued .body{position:relative}
  .qx{position:absolute;top:-2px;right:0;background:transparent;border:none;cursor:pointer;color:var(--faint);font-size:13px;line-height:1} .qx:hover{color:var(--err)}
  .content p{margin:0 0 9px} .content p:last-child{margin-bottom:0}
  .content pre{background:var(--code);border:1px solid var(--line);border-radius:8px;padding:11px 13px;overflow-x:auto;margin:9px 0;font-family:var(--mono);font-size:.9em;line-height:1.5}
  .content code:not(pre code){background:var(--code);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:.9em}
  .content strong{color:#1a1714} .content a{color:var(--accent);text-decoration:underline}
  /* markdown 完整元素 */
  .content h1,.content h2,.content h3,.content h4{margin:15px 0 7px;line-height:1.3;font-weight:600;color:#1a1714}
  .content h1:first-child,.content h2:first-child,.content h3:first-child{margin-top:2px}
  .content h1{font-size:1.45em} .content h2{font-size:1.28em} .content h3{font-size:1.12em} .content h4{font-size:1em}
  .content ul,.content ol{margin:7px 0;padding-left:23px} .content li{margin:3px 0}
  .content blockquote{border-left:3px solid var(--accent);margin:9px 0;padding:3px 0 3px 13px;color:var(--dim)}
  .content hr{border:none;border-top:1px solid var(--line);margin:15px 0}
  .content em{font-style:italic} .content del{opacity:.55}
  .content table{border-collapse:collapse;margin:11px 0;font-size:.95em;display:block;max-width:100%;overflow-x:auto}
  .content th,.content td{border:1px solid var(--line);padding:5px 10px;text-align:left;white-space:nowrap}
  .content th{background:var(--panel2);font-weight:600}
  /* 对比答案也走 markdown,样式镜像单窗口 .content(基准字号用 --cmp-fs);.md 渲染后切 normal(.cmpmsg.a .ans.md 比 .ans 的 pre-wrap 更具体,胜出)*/
  .cmpmsg.a .ans.md{white-space:normal}
  .cmpmsg .ans.md p{margin:0 0 8px} .cmpmsg .ans.md p:last-child{margin-bottom:0}
  .cmpmsg .ans.md pre{background:var(--code);border:1px solid var(--line);border-radius:8px;padding:10px 12px;overflow-x:auto;margin:8px 0;font-family:var(--mono);font-size:.9em;line-height:1.5}
  .cmpmsg .ans.md code:not(pre code){background:var(--code);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:.9em}
  .cmpmsg .ans.md strong{color:#1a1714} .cmpmsg .ans.md a{color:var(--accent);text-decoration:underline}
  .cmpmsg .ans.md h1,.cmpmsg .ans.md h2,.cmpmsg .ans.md h3,.cmpmsg .ans.md h4{margin:12px 0 6px;line-height:1.3;font-weight:600;color:#1a1714}
  .cmpmsg .ans.md h1:first-child,.cmpmsg .ans.md h2:first-child,.cmpmsg .ans.md h3:first-child{margin-top:2px}
  .cmpmsg .ans.md h1{font-size:1.32em} .cmpmsg .ans.md h2{font-size:1.2em} .cmpmsg .ans.md h3{font-size:1.1em} .cmpmsg .ans.md h4{font-size:1em}
  .cmpmsg .ans.md ul,.cmpmsg .ans.md ol{margin:6px 0;padding-left:21px} .cmpmsg .ans.md li{margin:2px 0}
  .cmpmsg .ans.md blockquote{border-left:3px solid var(--accent);margin:8px 0;padding:2px 0 2px 12px;color:var(--dim)}
  .cmpmsg .ans.md hr{border:none;border-top:1px solid var(--line);margin:12px 0}
  .cmpmsg .ans.md em{font-style:italic} .cmpmsg .ans.md del{opacity:.55}
  .cmpmsg .ans.md table{border-collapse:collapse;margin:9px 0;font-size:.95em;display:block;max-width:100%;overflow-x:auto}
  .cmpmsg .ans.md th,.cmpmsg .ans.md td{border:1px solid var(--line);padding:4px 9px;text-align:left;white-space:nowrap}
  .cmpmsg .ans.md th{background:var(--panel2);font-weight:600}
  .msg .acts{display:flex;gap:6px;margin-top:7px;opacity:0;transition:opacity .12s}
  .msg:hover .acts{opacity:.95}
  .mact{border:1px solid var(--line);background:transparent;color:var(--faint);border-radius:6px;min-width:26px;height:26px;cursor:pointer;font-size:12px;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
  .mact .ico{width:14px;height:14px}
  .mact:hover{color:var(--accent);border-color:var(--accent)}
  .mact.ok{color:var(--accent);border-color:var(--accent)}
  @media (hover:none){ .msg .acts{opacity:.8} }   /* 手机无 hover:常显操作栏 */

  /* reasoning */
  .reason{margin-bottom:10px;margin-left:39px}
  .reason .head{font-size:11px;color:var(--faint);cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
  .reason .head:hover{color:var(--dim)}
  .reason .rbody{display:none;margin-top:6px;padding:8px 12px;border-left:2px solid var(--line);color:var(--dim);font-size:12px;line-height:1.5;white-space:pre-wrap;max-height:200px;overflow-y:auto}
  .reason.open .rbody{display:block} .reason.open .head .caret{transform:rotate(90deg)}
  .reason .caret{transition:.15s;display:inline-block}
  .runstatus{margin:0 0 12px 39px;border:1px solid var(--line);border-radius:9px;background:var(--panel);overflow:hidden;color:var(--dim);font-size:12px}
  .runstatus-h{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;user-select:none;min-height:32px}
  .runstatus-h:hover{color:var(--accent)}
  .runstatus .pulse{width:7px;height:7px;border-radius:50%;background:var(--run);box-shadow:0 0 0 0 rgba(192,138,46,.36);animation:runpulse 1.25s infinite;flex:0 0 auto}
  @keyframes runpulse{70%{box-shadow:0 0 0 7px rgba(192,138,46,0)}100%{box-shadow:0 0 0 0 rgba(192,138,46,0)}}
  .runstatus .ttl{font-weight:600;color:var(--txt);white-space:nowrap}
  .runstatus .sub{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--faint)}
  .runstatus .elapsed{font:11px var(--mono);color:var(--faint);white-space:nowrap}
  .runstatus .caret{transition:.15s;color:var(--faint);display:inline-block}
  .runstatus.open .caret{transform:rotate(90deg)}
  .runstatus-b{display:none;border-top:1px solid var(--line);background:var(--bg);max-height:180px;overflow-y:auto;padding:6px 10px}
  .runstatus.open .runstatus-b{display:block}
  .runstep{display:flex;gap:7px;padding:3px 0;color:var(--dim);line-height:1.45;word-break:break-word}
  .runstep .tm{font:10.5px var(--mono);color:var(--faint);flex:0 0 auto}
  .runstep.err{color:var(--err)}
  .runstatus.done .pulse{background:var(--ok);animation:none;box-shadow:none}
  .runstatus.err .pulse{background:var(--err);animation:none;box-shadow:none}
  .runstatus.stalled{border-color:color-mix(in srgb,var(--run) 55%,var(--line));background:color-mix(in srgb,var(--run) 7%,var(--panel))}
  .runstatus.stalled .ttl{color:var(--run)}

  /* tool / command card */
  .tool{margin:0 0 20px 39px;border:1px solid var(--line);border-radius:9px;background:var(--panel);overflow:hidden}
  .tool .th{padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
  .tool .th .ic{color:var(--accent2)}
  .tool .tb{padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--dim);white-space:pre-wrap;max-height:240px;overflow:auto}
  .tool.needapproval{border-color:var(--run)}
  .tool.collapsible .th{cursor:pointer;user-select:none}
  .tool.collapsible:not(.open) .th{border-bottom:none}
  .tool.collapsible .tb{display:none}
  .tool.collapsible.open .tb{display:block}
  .tool .caret{transition:.15s;display:inline-block;color:var(--faint)}
  .tool.collapsible.open .caret{transform:rotate(90deg)}
  .approval{padding:9px 12px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;background:var(--panel2)}
  .approval .q{font-size:12px;color:var(--run);flex:1}
  .approval button{padding:5px 13px;border-radius:7px;border:1px solid var(--line);cursor:pointer;font-size:12px;background:var(--panel);color:var(--txt)}
  .approval .allow{border-color:var(--ok);color:var(--ok)} .approval .allow:hover{background:var(--ok);color:#fff}
  .approval .deny{border-color:var(--err);color:var(--err)} .approval .deny:hover{background:var(--err);color:#fff}
  .sysnote{margin:0 0 16px 39px;font-size:11.5px;color:var(--faint);font-style:italic}
  .typing{display:inline-block;color:var(--faint)} .typing::after{content:"▋";animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}

  /* composer */
  #composer{border-top:1px solid var(--line);padding:14px 0 18px;background:var(--bg)}
  #cwrap{max-width:760px;margin:0 auto;padding:0 24px;display:flex;gap:10px;align-items:flex-end}
  #input{flex:1;resize:none;background:var(--panel);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:11px 14px;font-family:var(--font);font-size:14px;line-height:1.5;max-height:200px;outline:none}
  #input,#cmpInput,.cmpcolin{overflow-x:hidden;overflow-y:auto;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word}
  #input:focus{border-color:var(--accent)}
  #sendbtn{width:42px;height:42px;border-radius:11px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:17px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}

const API = location.origin;            // 同源:经 server.py 代理到本机 codewhale(免 CORS,适配手机)

if(TOKEN){ localStorage.setItem("cw_token",TOKEN); if(new URLSearchParams(location.search).get("token")) history.replaceState({},"",location.pathname); }
// 新会话 workspace 不再由前端指定:createThread 传空 body,app-server 用自身工作目录($HOME)→ 任何机器都正确,无需注入/写死路径

  cmpSessions:JSON.parse(localStorage.getItem("cw_cmp_sessions")||"[]"),                // 对比会话:[{id,topic,ts,threads:{prov:tid}}] → 侧栏每会话一行,点击回到当时对比
  grpCollapsed:new Set(JSON.parse(localStorage.getItem("cw_grpcollapsed")||"[]")),      // 折叠的分组(置顶/对比/对话)
  autoApprove:false, allowShell:false, queue:[], attachments:[], stopTurnId:null, stopRequestedAt:0, runUI:null };  // 按会话,不再全局持久
const preview={url:localStorage.getItem("cw_preview_url")||"", scanT:null, lastKey:"", autoOpen:localStorage.getItem("cw_pv_auto_open")!=="0", autoRefresh:localStorage.getItem("cw_pv_auto_refresh")!=="0", size:localStorage.getItem("cw_pv_size")||"desktop", sandboxMode:localStorage.getItem("cw_pv_sandbox")||"auto", confirmedExternal:new Set()};

function errorBodyText(body){
  let s=String(body&&body.message||body||"").trim();
  try{
    const j=JSON.parse(s);
    s=String(j.error||j.message||j.detail||j.output||s);
  }catch(e){}
  return s.replace(/\s+/g," ").trim();
}
function explainError(input,path="",status=0){
  const raw=errorBodyText(input);
  const hay=(path+" "+raw).toLowerCase();
  let msg=raw||"未知错误";
  if(/has no auth configured|no auth configured|api_key_env|api key env/.test(hay)){
    msg="该模型还没有配置 API key。请打开左下模型设置,选择对应 provider 后填写 key；换电脑后也需要在那台电脑本机重新配置。";
  }else if(/invalid api key|incorrect api key|api key is invalid|unauthorized api key|bad api key/.test(hay)){
    msg="API key 无效。请检查模型设置里的 provider 是否选对、key 是否完整,以及是否复制了多余空格。";
  }else if(/free_quota_exhausted|endpoint is inactive|quota|insufficient balance|402/.test(hay)){
    msg="额度或计费状态不可用。请确认对应平台已充值/开通 endpoint,并且当前 key 有权限调用这个模型。";
  }else if(status===401 || /\b401\b|unauthorized|forbidden token|invalid token/.test(hay)){
    msg="未授权。当前页面 token 可能和后端不匹配,请从 CodeWhale App 内重新打开或刷新更新后的入口。";
  }else if(status===404 || /\b404\b|not found/.test(hay)){
    msg="接口不存在或当前版本不完整。请确认 GUI 和 CodeWhale 后端都已更新到同一批版本。";
  }else if(/failed to fetch|networkerror|network error|load failed|eventsource/.test(hay)){
    msg="网络连接失败。请确认本机 CodeWhale 后端仍在运行,或重启后端后再试。";
  }
  return (status?("HTTP "+status+": "):"")+msg+(raw&&msg!==raw?(" 原始信息: "+raw.slice(0,240)):"");
}
function makeApiError(path,status,body){
  const e=new Error(explainError(body,path,status));
  e.status=status; e.path=path; e.body=body;
  return e;
}
async function api(path, opts={}){
  let r;
  try{ r = await fetch(url(path), {...opts, headers:{...(opts.body?{"Content-Type":"application/json"}:{}),...auth,...(opts.headers||{})}}); }
  catch(e){ throw makeApiError(path,0,e); }
  if(!r.ok) throw makeApiError(path,r.status,(await r.text()).slice(0,1000));
  const ct = r.headers.get("content-type")||""; return ct.includes("json") ? r.json() : r.text();
}

/* ---------- app preview ---------- */
function previewAbs(u){ if(!u)return ""; return u.startsWith("/") ? location.origin+u : u; }
function previewIsOpen(){ const p=$("#previewPane"); return !!p && !p.hidden; }
function previewTrustedUrl(raw){
  try{
    if(!String(raw||"").trim()) return false;
    const u=new URL(previewAbs(raw),location.href);
    const host=u.hostname.replace(/^\[|\]$/g,"");
    return u.protocol==="file:" || u.origin===location.origin || ["localhost","127.0.0.1","0.0.0.0","::1"].includes(host);
  }catch(e){ return false; }
}
function previewSameOrigin(raw){
  try{ return new URL(previewAbs(raw||""),location.href).origin===location.origin; }catch(e){ return false; }
}
function previewSandboxValue(raw){
  const target = raw||preview.url;
  // Same-origin preview (e.g. /preview/static/<pid>/) holds UNTRUSTED model/dist HTML.
  // Granting allow-same-origin there lets it read parent localStorage (cw_token) and
  // call authenticated APIs = token leak + RCE. Only cross-origin dev URLs may keep
  // allow-same-origin (they get their own origin, harmless to us).
  const safe = preview.sandboxMode==="safe"
    || previewSameOrigin(target)
    || (preview.sandboxMode==="auto" && !previewTrustedUrl(target));
  return safe ? "allow-scripts allow-forms allow-popups allow-downloads" : "allow-scripts allow-same-origin allow-forms allow-popups allow-downloads";
}
function previewApplySandbox(raw){
  const f=$("#previewFrame"); if(!f) return;
  const val=previewSandboxValue(raw);
  if(f.getAttribute("sandbox")!==val) f.setAttribute("sandbox",val);
  const sel=$("#pvSandboxMode"); if(sel) sel.value=preview.sandboxMode;
}
function previewShow(){
  const p=$("#previewPane"), r=$("#previewResize"), b=$("#previewbtn");
  if(!p) return;
  p.hidden=false; if(r)r.hidden=false; document.body.classList.add("preview-open"); if(b)b.classList.add("on");
}
function previewHide(){
  const p=$("#previewPane"), r=$("#previewResize"), b=$("#previewbtn");
  if(p)p.hidden=true; if(r)r.hidden=true; document.body.classList.remove("preview-open"); if(b)b.classList.remove("on");
}
function previewToggle(){ previewIsOpen()?previewHide():previewShow(); }
function previewSetError(msg){
  const e=$("#pvError"); if(!e) return;
  const txt=String(msg||"").trim(); e.hidden=!txt; e.textContent=txt.slice(-6000);
}
function previewLoad(raw, source="manual"){
  const u=previewAbs((raw||"").trim()); if(!u) return;
  if(source==="manual" && !previewTrustedUrl(u) && !preview.confirmedExternal.has(u)){
    cwConfirm("预览将打开外部地址:\n"+u+"\n\n建议只打开你信任的本地开发地址。继续?").then(ok=>{ if(ok){ preview.confirmedExternal.add(u); previewLoad(u,"confirmed"); } });
    return;
  }
  const f=$("#previewFrame"), inp=$("#pvUrl");
  preview.url=u; try{localStorage.setItem("cw_preview_url",u);}catch(e){}
  if(inp) inp.value=u;
  if(source!=="silent" && (preview.autoOpen || previewIsOpen())) previewShow();
  previewSetError("");
  previewApplySandbox(u);
  if(f){
    if(f.src===u && preview.autoRefresh) f.src = u + (u.includes("?")?"&":"?") + "cw_reload=" + Date.now();
    else f.src=u;
  }
}
function previewReload(){
  const f=$("#previewFrame");
  if(f && f.src){ try{ f.contentWindow.location.reload(); }catch(e){ f.src=f.src; } }
  else if(preview.url) previewLoad(preview.url);
}
function previewSetSize(size){
  preview.size=["desktop","tablet","phone"].includes(size)?size:"desktop";
  try{localStorage.setItem("cw_pv_size",preview.size);}catch(e){}
  const p=$("#previewPane"); if(p){ p.classList.remove("pv-desktop","pv-tablet","pv-phone"); p.classList.add("pv-"+preview.size); }
  document.querySelectorAll("[data-pv-size]").forEach(b=>b.classList.toggle("on",b.dataset.pvSize===preview.size));
}
function previewBindFrameDiagnostics(){
  const f=$("#previewFrame");
  if(!f) return;
  f.onload=()=>{
    previewSetError("");
    try{
      const w=f.contentWindow;
      if(!w || w.__cwPreviewDiag) return;
      w.__cwPreviewDiag=true;
      w.addEventListener("error",e=>previewSetError("JS: "+(e.message||"脚本错误")+(e.filename?("\n"+e.filename+":"+e.lineno):"")));
      w.addEventListener("unhandledrejection",e=>previewSetError("Promise: "+((e.reason&&e.reason.message)||e.reason||"未处理异常")));
      if(w.fetch){
        const orig=w.fetch.bind(w);
        w.fetch=(...args)=>orig(...args).then(r=>{ if(!r.ok) previewSetError("请求失败: "+r.status+" "+r.url); return r; }).catch(err=>{ previewSetError("请求失败: "+(err&&err.message||err)); throw err; });
      }
    }catch(e){}
  };
}
function previewMetaCwd(meta){ return meta && (meta.cwd||meta.workdir||meta.working_dir||meta.current_dir||meta.pwd); }
function previewFeedTerminal(text, failed=false, meta=null, live=false){
  text=String(text||""); if(!text.trim()) return;
  const hasUrl=/https?:\/\/(?:localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])/i.test(text);
  if(live && !hasUrl) return;
  const key=(failed?"f:":"o:")+hasUrl+":"+text.slice(-1200);
  if(key===preview.lastKey) return;
  preview.lastKey=key; clearTimeout(preview.scanT);
  preview.scanT=setTimeout(async()=>{
    try{
      const d=await api("/api/preview/detect",{method:"POST",body:JSON.stringify({text,failed,cwd:previewMetaCwd(meta)})});
      if(d.kind==="url"||d.kind==="static"){
        const u=previewAbs(d.url);
        if(previewIsOpen() || preview.autoOpen || (preview.autoRefresh && preview.url===u)) previewLoad(u,d.kind);
        else { preview.url=u; try{localStorage.setItem("cw_preview_url",u);}catch(e){} const inp=$("#pvUrl"); if(inp)inp.value=u; }
      }else if(d.kind==="error" || failed){
        if(preview.autoOpen || previewIsOpen()) previewShow();
        previewSetError(d.error||text);
      }
    }catch(e){ if(failed) previewSetError(String(e&&e.message||e)); }
  }, live?350:80);
}

function cwToast(msg){ let t=document.getElementById("cwtoast"); if(!t){ t=document.createElement("div"); t.id="cwtoast"; document.body.appendChild(t); }
  t.textContent=String(msg); t.classList.add("show"); clearTimeout(cwToast._t); cwToast._t=setTimeout(()=>t.classList.remove("show"),3200); }

function cwConfirm(msg){ return new Promise(res=>{
  const ov=document.createElement("div"); ov.className="cwdlg-ov";
  ov.innerHTML=`<div class="cwdlg"><div class="cwdlg-m"></div><div class="cwdlg-b"><button class="cwdlg-cancel">取消</button><button class="cwdlg-ok">确定</button></div></div>`;
  ov.querySelector(".cwdlg-m").textContent=String(msg);
  document.body.appendChild(ov);
  const done=v=>{ ov.remove(); res(v); };
  ov.querySelector(".cwdlg-ok").onclick=()=>done(true);
  ov.querySelector(".cwdlg-cancel").onclick=()=>done(false);
  ov.onclick=e=>{ if(e.target===ov) done(false); };
  setTimeout(()=>ov.querySelector(".cwdlg-ok").focus(),30);
}); }

async function loadThreads(){
  if(state._loadingThreads) return;   // 防重入:忙碌的 :7878 下,4s 轮询若上一发还没回来就别再压一发(并发堆叠=切换更卡)
  state._loadingThreads=true;
  try{
    const t = await api("/api/threads/all");   // 聚合各 provider 后端的会话,带 provider 标签(每对话锁模型)
    setConn(true);
    if(state.pendingNew && state.pendingNew.length){   // 乐观新建、尚未进慢 SWR 缓存的新对话:保留在列表里,直到它真出现(否则后台刷新会把它冲掉 → 新对话闪一下就没了)
      const ids=new Set(t.map(x=>x.id));
      state.pendingNew=state.pendingNew.filter(p=>!ids.has(p.id));   // 已出现在真实列表 → 不再 pending
      state.threads=[...state.pendingNew, ...t];
    } else state.threads=t;
    const at=state.threads.find(x=>x.id===state.activeId);   // 兜底:SSE 漏收 turn.completed 时,靠轮询发现活动会话已结束 → 收尾 + 发队列
    if(at && state.running && isTurnDone(at.latest_turn_status)){ setRunning(false); processQueue(); }
    const sig=JSON.stringify(state.threads.map(x=>[x.id,x.title,x.latest_turn_status,x.updated_at,x.provider]))+"|"+[...state.pinned].sort().join(",")+"|"+[...state.cmpThreads].sort().join(",")+"|"+state.cmpSessions.map(s=>s.id+":"+Object.keys(s.threads||{}).length).join(",")+"|"+[...state.grpCollapsed].sort().join(",")+"|"+state.activeId;   // 从合并后列表算(含 pending):含 provider/对比集/会话/折叠态,任一变都重渲染
    if(sig!==state._sig){ state._sig=sig; renderThreads(); }   // 仅当列表真变化才重建 DOM,避免轮询吞掉点击
  }catch(e){ setConn(false); console.warn(e); }
  finally{ state._loadingThreads=false; }
}

function threadEl(t){   // 单条对话 DOM
  const pinned=state.pinned.has(t.id);
  const d=document.createElement("div"); d.className="thread"+(t.id===state.activeId?" active":"");
  const st=t.latest_turn_status||"";
  let dotCls = isTurnRunning(st) ? "running"   // summary 返回的是 inprogress(无下划线)
               : normTurnStatus(st)==="completed" ? "ok"
               : (isTurnDone(st) ? "err" : "idle");
  let dotTitle = st||"空闲";
  if(dotCls==="running"){
    const age=(Date.now()-new Date(t.updated_at).getTime())/1000;   // inprogress 但久未更新 → 多半是卡死/孤儿 turn
    if(age>240){ dotCls="stalled"; dotTitle=`约 ${Math.round(age/60)} 分钟无更新 — 可能在等你审批、或卡住;点开查看`; }
    else dotTitle="运行中";
  }
  const stalled = dotCls==="stalled";
  d.innerHTML=`<div class="t1"><span class="dot ${dotCls}" title="${dotTitle}"></span><span class="title">${pinned?icon("pin"):""}${stalled?icon("alert"):""}${esc(t.title||"未命名")}</span>`+
    `<span class="actions"><button class="act rename" title="重命名">${icon("edit")}</button><button class="act pin" title="${pinned?"取消置顶":"置顶"}">${icon("pin")}</button><button class="act del" title="删除">${icon("trash")}</button></span></div>`+
    (t.preview?`<div class="prev">${esc(t.preview)}</div>`:"")+
    `<div class="meta"><span>${esc(PROV_SHORT[t.provider]||t.provider||t.model||"")}</span><span>${relTime(t.updated_at)}</span></div>`;
  d.onclick=()=>openThread(t.id);
  keyboardButton(d,()=>openThread(t.id),`打开对话: ${t.title||"未命名"}`);
  d.querySelector(".pin").onclick=(e)=>{e.stopPropagation();togglePin(t.id);};
  d.querySelector(".del").onclick=(e)=>{e.stopPropagation();deleteThread(t.id,t.title);};
  d.querySelector(".rename").onclick=(e)=>{e.stopPropagation();renameThread(t.id,t.title);};
  return d;
}
function cmpSessionEl(s){   // 对比会话行:点=回到当时整场对比
  const provs=Object.keys(s.threads||{});
  const d=document.createElement("div"); d.className="thread cmpsess"+(s.id===CMP.sessionId&&!$("#cmpView")?.hidden?" active":"");
  const names=provs.map(p=>PROV_SHORT[p]||p).join(" · ");
  d.innerHTML=`<div class="t1"><span class="dot ok" title="对比会话(点击回到当时对比)"></span><span class="title">${icon("layout")}${esc(s.topic||"对比")}</span>`+
    `<span class="actions"><button class="act del" title="从列表删除此对比会话">${icon("trash")}</button></span></div>`+
    `<div class="meta"><span>${provs.length} 模型 · ${esc(names)}</span><span>${relTime(s.ts||0)}</span></div>`;
  d.onclick=()=>openCompareWindow(s.id);   // 点会话 → 新开一个独立窗口还原那场对比(主窗口不受影响)
  keyboardButton(d,()=>openCompareWindow(s.id),`打开对比会话: ${s.topic||"对比"}`);
  d.querySelector(".del").onclick=(e)=>{e.stopPropagation();deleteCmpSession(s.id,s.topic);};
  return d;
}
async function deleteCmpSession(id,topic){
  const s=state.cmpSessions.find(x=>x.id===id);
  const tids=s?Object.values(s.threads||{}).filter(Boolean):[];
  if(!(await cwConfirm(`删除对比会话「${topic||"对比"}」及其 ${tids.length} 个模型对话?\n(整组归档移出列表;后端可恢复)`))) return;
  await Promise.allSettled(tids.map(tid=>api(`/v1/threads/${tid}`,{method:"PATCH",body:JSON.stringify({archived:true})})));   // 归档每个模型的原始 thread
  state.threads=state.threads.filter(t=>!tids.includes(t.id));   // 从列表移除
  let pinChanged=false; tids.forEach(tid=>{ state.cmpThreads.delete(tid); if(state.pinned.delete(tid)) pinChanged=true; });   // 从对比注册表/置顶清掉
  saveCmp(); if(pinChanged) savePins();
  state.cmpSessions=state.cmpSessions.filter(x=>x.id!==id);   // 删会话本身
  saveCmpSessions(); state._sig=null; renderThreads();
}
function renderThreads(){
  const box=$("#threads"); box.innerHTML="";
  const byTime=(a,b)=>new Date(b.updated_at||0)-new Date(a.updated_at||0);
  const sessionTids=new Set();                            // 已被某对比会话收编的 thread → 不再单独显示(由会话行代表)
  for(const s of state.cmpSessions) for(const tid of Object.values(s.threads||{})) sessionTids.add(tid);
  // 对比归组判定:① 服务端权威标记 t.compare(取后端 cmp_threads 注册表,每次刷新,不依赖前端本地是否同步——根治"对比对话散落进单聊");
  // ② 前端本地登记(即时,新建对比当下就归组);③ gpt/glm/kimi 这些 provider 单窗口从不用 → 兜底
  const isCmp=t=>t.compare||state.cmpThreads.has(t.id)||CMP_ONLY_PROV.has(t.provider);
  const pinG=[], cmpLeftover=[], normG=[];               // 置顶 / 对比散条(无会话的历史) / 普通对话
  for(const t of state.threads){
    if(state.pinned.has(t.id)){ pinG.push(t); continue; }  // 置顶优先
    if(sessionTids.has(t.id)) continue;                    // 属某会话 → 跳过,会话行代表它
    if(isCmp(t)){ cmpLeftover.push(t); continue; }
    normG.push(t);
  }
  pinG.sort(byTime); cmpLeftover.sort(byTime); normG.sort(byTime);
  const sessions=[...state.cmpSessions].sort((a,b)=>(b.ts||0)-(a.ts||0));
  const cmpCount=sessions.length+cmpLeftover.length;
  const groups=[];
  if(pinG.length)  groups.push({key:"pin", label:"📌 置顶", count:pinG.length, render:b=>pinG.forEach(t=>b.appendChild(threadEl(t)))});
  if(cmpCount)     groups.push({key:"cmp", label:"⊞ 多模型对比", count:cmpCount, render:b=>{ sessions.forEach(s=>b.appendChild(cmpSessionEl(s))); cmpLeftover.forEach(t=>b.appendChild(threadEl(t))); }});
  if(normG.length) groups.push({key:"norm",label:"💬 对话", count:normG.length, render:b=>normG.forEach(t=>b.appendChild(threadEl(t)))});
  if(!groups.length){ box.innerHTML='<div style="padding:14px;color:var(--faint);font-size:12px">还没有对话,点上方新建</div>'; return; }
  const showHeaders=groups.length>1;                     // 只有一组时不显分组头,保持简洁
  for(const g of groups){
    if(showHeaders){
      const collapsed=state.grpCollapsed.has(g.key);
      const h=document.createElement("div"); h.className="grp"+(collapsed?" collapsed":"");
      h.innerHTML=`<span>${g.label}</span><span class="gcount">${g.count}</span><span class="gcar">▼</span>`;
      h.onclick=()=>toggleGroup(g.key);
      keyboardButton(h,()=>toggleGroup(g.key),`${collapsed?"展开":"折叠"}${g.label}`);
      box.appendChild(h);
      if(collapsed) continue;
    }
    g.render(box);
  }
}
function toggleGroup(key){
  state.grpCollapsed.has(key)?state.grpCollapsed.delete(key):state.grpCollapsed.add(key);
  localStorage.setItem("cw_grpcollapsed",JSON.stringify([...state.grpCollapsed]));
  renderThreads();
}
function savePins(){ const arr=[...state.pinned]; localStorage.setItem("cw_pinned",JSON.stringify(arr)); api("/api/pins",{method:"POST",body:JSON.stringify({ids:arr})}).catch(()=>{}); }  // 同时写本地缓存 + 服务端(跨窗口/手机共享)
async function loadPins(){ try{ const r=await api("/api/pins"); if(!Array.isArray(r)) return;
    const local=[...state.pinned];
    if(r.length===0 && local.length>0){ savePins(); return; }   // 服务端还空、本地有 → 首次升级把本地置顶迁移上去,不丢
    state.pinned=new Set(r.map(String)); localStorage.setItem("cw_pinned",JSON.stringify([...state.pinned])); state._sig=null; renderThreads();   // 否则服务端为准
  }catch(e){ /* 离线:沿用 localStorage,不报错 */ } }
function togglePin(id){ state.pinned.has(id)?state.pinned.delete(id):state.pinned.add(id); savePins(); renderThreads(); }
// ── 对比 thread 注册表(侧栏分组用):本地即时 + 服务端只增并集(跨窗口/设备共享,不互相覆盖)──
function saveCmp(){ const arr=[...state.cmpThreads]; localStorage.setItem("cw_cmp",JSON.stringify(arr)); api("/api/cmp-threads",{method:"POST",body:JSON.stringify({ids:arr})}).catch(()=>{}); }
function markCmp(id){ if(id && !state.cmpThreads.has(id)){ state.cmpThreads.add(id); saveCmp(); state._sig=null; renderThreads(); } }   // 新对比 thread 登记 → 立刻归入对比组
async function loadCmp(){ try{ const r=await api("/api/cmp-threads"); if(!Array.isArray(r)) return;
    const before=state.cmpThreads.size;
    const merged=new Set([...state.cmpThreads,...r.map(String)]);                     // 本地 ∪ 服务端,不丢
    state.cmpThreads=merged; localStorage.setItem("cw_cmp",JSON.stringify([...merged]));
    if(merged.size>r.length) saveCmp();                                               // 本地有服务端没有的 → 推上去
    if(merged.size!==before){ state._sig=null; renderThreads(); }
  }catch(e){ /* 离线:沿用 localStorage */ } }
// ── 对比会话:一次对比(一个主题)= 一个会话,含各模型的 thread → 侧栏每会话一行、点击回到当时对比 ──
function saveCmpSessions(){
  try{ localStorage.setItem("cw_cmp_sessions",JSON.stringify(state.cmpSessions.slice(0,500))); }catch(e){}
  api("/api/cmp-sessions",{method:"POST",body:JSON.stringify({sessions:state.cmpSessions.slice(0,500)})}).catch(()=>{});
}
function cmpSessionUpsert(sess){   // 按 id 覆盖或新增(新会话置顶)
  const i=state.cmpSessions.findIndex(s=>s.id===sess.id);
  if(i>=0) state.cmpSessions[i]=sess; else state.cmpSessions.unshift(sess);
  saveCmpSessions(); state._sig=null; renderThreads();
}
function cmpSessionRecordThread(prov,tid){   // cmpRun 建好某栏 thread → 记进当前会话
  if(!CMP.sessionId||!tid) return;
  const s=state.cmpSessions.find(x=>x.id===CMP.sessionId); if(!s) return;
  if(s.threads[prov]!==tid){ s.threads[prov]=tid; s.providers=Object.keys(s.threads); saveCmpSessions(); state._sig=null; renderThreads(); }
}
async function loadCmpSessions(){ try{ const r=await api("/api/cmp-sessions"); if(!Array.isArray(r)) return;
    const byId=new Map(state.cmpSessions.map(s=>[s.id,s]));
    for(const s of r){ const cur=byId.get(s.id);   // 服务端 ∪ 本地:同 id 取 thread 更全的那份
      if(!cur || Object.keys(s.threads||{}).length>=Object.keys(cur.threads||{}).length) byId.set(s.id,s); }
    const sigOf=a=>a.map(s=>s.id+":"+(s.ts||0)+":"+Object.keys(s.threads||{}).sort().map(p=>p+"="+s.threads[p]).join(",")).join("|");
    const before=sigOf(state.cmpSessions);
    const merged=[...byId.values()].sort((a,b)=>(b.ts||0)-(a.ts||0));
    const changed=sigOf(merged)!==before;
    state.cmpSessions=merged; try{ localStorage.setItem("cw_cmp_sessions",JSON.stringify(merged.slice(0,500))); }catch(e){}
    if(changed){ state._sig=null; renderThreads(); }
  }catch(e){ /* 离线:沿用 localStorage */ } }
async function renameThread(id, cur){
  const t = prompt("重命名对话:", cur||"");
  if(t===null) return;                      // 取消
  const name=t.trim();
  try{
    await api(`/v1/threads/${id}`,{method:"PATCH",body:JSON.stringify({title:name})});
    const th=state.threads.find(x=>x.id===id); if(th) th.title=name;
    if(state.activeId===id) $("#ttitle").textContent=name||"对话";
    state._sig=null; renderThreads();        // 强制重渲染
  }catch(e){ alert("重命名失败: "+e.message); }
}
async function deleteThread(id,title){
  if(!(await cwConfirm(`删除对话「${title||"未命名"}」?\n(归档移出列表,后端可恢复)`))) return;
  try{ await api(`/v1/threads/${id}`,{method:"PATCH",body:JSON.stringify({archived:true})});
    state.threads=state.threads.filter(t=>t.id!==id);
    if(state.pinned.delete(id)) savePins();
    if(state.activeId===id){ closeStream(); runStatusReset(false); state.activeId=null; $("#mwrap").innerHTML='<div class="empty">已删除。左侧选择或新建对话</div>'; $("#ttitle").textContent="CodeWhale"; $("#tmeta").innerHTML=""; setRunning(false); state.autoApprove=false; state.allowShell=false; renderAuto(); renderShell(); }
    renderThreads();
  }catch(e){ alert("删除失败: "+e.message); }
}

/* ---------- running status ---------- */
function runFmt(ms){
  const s=Math.max(0,Math.floor((ms||0)/1000));
  if(s<60) return s+"s";
  const m=Math.floor(s/60), r=s%60;
  return m+"m"+(r?(" "+r+"s"):"");
}
function runStatusReset(remove){
  if(state.runUI&&state.runUI.timer) clearInterval(state.runUI.timer);
  if(remove&&state.runUI&&state.runUI.el) state.runUI.el.remove();
  state.runUI=null;
}
function runStatusEnsure(label="启动中",detail="等待模型响应"){
  let ui=state.runUI;
  if(ui&&ui.el&&document.body.contains(ui.el)){
    $("#mwrap").appendChild(ui.el);   // 保持状态条贴在当前输出后面,不被后来的消息块盖住
    return ui;
  }
  const el=document.createElement("div");
  el.className="runstatus";
  el.innerHTML=`<div class="runstatus-h"><span class="caret">▸</span><span class="pulse"></span><span class="ttl"></span><span class="sub"></span><span class="elapsed">0s</span></div><div class="runstatus-b"></div>`;
  const head=el.querySelector(".runstatus-h");
  head.onclick=()=>el.classList.toggle("open");
  keyboardButton(head,()=>el.classList.toggle("open"),"展开或折叠运行过程");
  $("#mwrap").appendChild(el);
  ui={el,title:el.querySelector(".ttl"),sub:el.querySelector(".sub"),body:el.querySelector(".runstatus-b"),elapsed:el.querySelector(".elapsed"),started:Date.now(),lastAt:Date.now(),lastLabel:label,lastDetail:detail,lastStep:"",steps:0,timer:null};
  state.runUI=ui;
  ui.timer=setInterval(()=>runStatusTick(),1000);
  runStatusUpdate(label,detail);
  runStatusStep("本轮开始");
  return ui;
}
function runStatusTick(){
  const ui=state.runUI; if(!ui) return;
  const now=Date.now(), idle=now-(ui.lastAt||now);
  ui.elapsed.textContent=runFmt(now-ui.started);
  ui.el.classList.toggle("stalled",idle>90000);
  if(idle>90000){ ui.title.textContent="可能卡住"; ui.sub.textContent=`${runFmt(idle)} 没有新事件 · ${ui.lastDetail||ui.lastLabel||"等待响应"}`; }
  else if(idle>30000 && state.running){ ui.sub.textContent=`等待响应 ${runFmt(idle)} · ${ui.lastDetail||ui.lastLabel||""}`; }
}
function runStatusUpdate(label,detail,kind){
  const ui=runStatusEnsure(label,detail);
  ui.lastAt=Date.now(); ui.lastLabel=label||ui.lastLabel; ui.lastDetail=detail||ui.lastDetail||"";
  ui.el.classList.remove("done","err","stalled");
  if(kind) ui.el.classList.add(kind);
  ui.title.textContent=label||"处理中";
  ui.sub.textContent=detail||"";
  ui.elapsed.textContent=runFmt(Date.now()-ui.started);
  $("#mwrap").appendChild(ui.el);
  return ui;
}
function runStatusStep(text,cls){
  const ui=runStatusEnsure();
  const t=String(text||"").replace(/\s+/g," ").trim();
  if(!t||t===ui.lastStep) return;
  ui.lastStep=t; ui.steps++;
  const d=document.createElement("div");
  d.className="runstep"+(cls?(" "+cls):"");
  d.innerHTML=`<span class="tm">${runFmt(Date.now()-ui.started)}</span><span></span>`;
  d.lastChild.textContent=t;
  ui.body.appendChild(d);
  while(ui.body.children.length>80) ui.body.firstChild.remove();
  ui.body.scrollTop=ui.body.scrollHeight;
}
function runLabelForItem(item){
  const kind=item&&item.kind, summary=String((item&&item.summary)||"").replace(/\s+/g," ").slice(0,120);
  if(kind==="agent_reasoning") return ["思考中", summary||"正在整理思路"];
  if(kind==="agent_message") return ["输出中", summary||"正在生成回复"];
  if(kind==="command_execution") return ["执行命令", summary||"正在运行 shell/终端命令"];
  if(kind==="tool_call") return ["调用工具", summary||"正在调用工具"];
  if(kind==="file_change") return ["修改文件", summary||"正在写入或更新文件"];
  if(kind==="error") return ["出错", summary||"运行时出现错误"];
  return ["处理中", summary||kind||"等待下一步"];
}
function runStatusFromItem(item,phase){
  const pair=runLabelForItem(item||{}), label=pair[0], detail=pair[1];
  runStatusUpdate(phase||label,detail);
  if(item&&item.kind&&item.kind!=="agent_message"&&item.kind!=="agent_reasoning") runStatusStep(`${phase||label}: ${detail}`);
}
function runStatusFinish(label,kind){
  const ui=state.runUI; if(!ui) return;
  if(ui.timer) clearInterval(ui.timer);
  ui.title.textContent=label||"已完成";
  ui.sub.textContent=ui.steps?`过程 ${ui.steps} 步`:"本轮结束";
  ui.elapsed.textContent=runFmt(Date.now()-ui.started);
  ui.el.classList.remove("stalled");

/* ---------- open / stream a thread ---------- */
function closeStream(){ if(state.es){ state.es.close(); state.es=null; } }
function renderThreadSnapshot(rec, preserveQueue=false){
  const wrap=$("#mwrap"), queued=preserveQueue?state.queue.map(q=>q.el).filter(Boolean):[];
  runStatusReset(false);
  state.items.clear(); state._optimUser=null; wrap.innerHTML="";
  state.latestSeq=Math.max(state.latestSeq||0, rec.latest_seq||0);
  for(const it of (rec.items||[])){
    if(it.kind==="status") continue;
    startItem(it.id, it);
    completeItem(it.id, it, /fail|error|interrupt|cancel/i.test(it.status||""));
  }
  queued.forEach(el=>wrap.appendChild(el));
  scrollDown(true);
}
async function syncActiveTurn(){
  if(!state.activeId || !state.running || state._activeSyncing) return;
  const id=state.activeId; state._activeSyncing=true;
  try{
    const rec=await api(`/v1/threads/${id}`);
    if(state.activeId!==id) return;
    const turns=rec.turns||[], lastTurn=turns[turns.length-1]||{};
    const status=lastTurn.status||(rec.thread||{}).latest_turn_status||"";
    if(lastTurn.id) state.turnId=lastTurn.id;
    if(isTurnDone(status)){
      if(isStoppingTurn(lastTurn.id)){ state.stopTurnId=null; state.stopRequestedAt=0; }
      runStatusFinish(normTurnStatus(status)==="completed"?"已完成":(normTurnStatus(status)==="interrupted"?"已停止":"已结束"), normTurnStatus(status)==="failed"||normTurnStatus(status)==="error"?"err":"done");
      if((rec.latest_seq||0)>(state.latestSeq||0)) renderThreadSnapshot(rec,true);
      setRunning(false); refreshActiveMeta(); processQueue();
    }else if(isTurnRunning(status)){
      const freshStop=isStoppingTurn(lastTurn.id) && Date.now()-state.stopRequestedAt<15000;
      if(!freshStop){ setRunning(true); runStatusUpdate("同步中","后端仍在运行,等待新事件"); }
    }
  }catch(e){ console.warn("active turn sync failed", e); }
  finally{ state._activeSyncing=false; }
}
async function openThread(id){
  if(state.activeId===id && state.es) return;
  closeStream();
  runStatusReset(false);
  state.activeId=id; state.items.clear(); state.seen.clear(); state.turnId=null; state._optimUser=null; state.stopTurnId=null; state.stopRequestedAt=0; setRunning(false);
  state.autoApprove=false; state.allowShell=false; renderAuto(); renderShell(); loadAutoState(id);   // 读该会话真实 auto_approve/allow_shell 如实显示
  renderThreads(); closeDrawer();
  $("#emptyState")?.remove();
  const wrap=$("#mwrap"); wrap.innerHTML="";
  const t=state.threads.find(x=>x.id===id);
  $("#ttitle").textContent=t?.title||"对话";
  $("#tmeta").innerHTML = t ? `<span class="badge" title="此对话锁定的模型">${esc(PROV_SHORT[t.provider]||t.provider||t.model||"")}</span><span class="badge">${esc(t.mode||"")}</span><span class="badge">${esc((t.workspace||"").split("/").pop()||"~")}</span>` : "";

  // 快照渲染历史(一次 GET 拿全部 item)→ 再从 latest_seq 起只听新事件。
  // 避免旧做法从 since_seq=0 重放上万条事件(切大会话时卡顿的根源)。
  let since=0;
  $("#mwrap").innerHTML='<div class="sysnote" id="histloading">· 载入历史…</div>';
  try{
    const rec=await api(`/v1/threads/${id}`);
    if(state.activeId!==id) return;   // 等待期间又切走了 → 放弃,别污染新会话
    since=rec.latest_seq||0; state.latestSeq=since;
    const lastTurn=(rec.turns||[]).slice(-1)[0];   // 切到一条仍在跑的对话:快照不会重放已发生的 turn.started → 据此同步 running,否则会误发触发 409
    const tst=(lastTurn&&lastTurn.status)||(rec.thread||{}).latest_turn_status||"";
    const stillRunning=isTurnRunning(tst);
    if(stillRunning) state.turnId=(lastTurn&&lastTurn.id)||state.turnId;
    renderThreadSnapshot(rec);
    if(stillRunning){ setRunning(true); runStatusUpdate("同步中","这轮还在运行,正在接收新状态"); runStatusStep("恢复运行中的对话"); }
  }catch(e){ $("#mwrap").innerHTML=""; since=0; console.warn("快照载入失败,退回从0重放",e); }

  const es=new EventSource(url(`/v1/threads/${id}/events?since_seq=${since}`));
  state.es=es;
  ["thread.started","thread.forked","turn.started","turn.lifecycle","turn.completed","turn.failed","turn.interrupted","turn.steered",
   "turn.interrupt_requested","item.started","item.delta","item.completed","item.failed","item.interrupted",
   "approval.required","approval.decided","approval.timeout","sandbox.denied"]
   .forEach(ev=>es.addEventListener(ev,e=>onEvent(ev,e)));
  es.onerror=()=>{ /* auto-reconnect; seen-set dedups replay */ };
}

/* ---------- event handling ---------- */
function onEvent(ev, e){
  let m; try{ m=JSON.parse(e.data); }catch{ return; }
  if(m.thread_id && m.thread_id!==state.activeId) return;
  if(m.seq!=null){ if(state.seen.has(m.seq)) return; state.seen.add(m.seq); }
  const p=m.payload||{};
  if(m.seq!=null) state.latestSeq=Math.max(state.latestSeq||0,m.seq);
  switch(ev){
    case "turn.started":
      state.turnId=m.turn_id;
      if(!isStoppingTurn(m.turn_id)){ setRunning(true); runStatusUpdate("思考中","本轮已开始,等待模型输出"); runStatusStep("模型开始处理"); }
      break;
    case "turn.interrupt_requested":
      state.stopTurnId=m.turn_id||state.turnId; state.stopRequestedAt=Date.now(); runStatusUpdate("正在停止","已请求中断当前轮"); runStatusStep("已请求停止"); setRunning(false); break;
    case "turn.completed":
      state.stopTurnId=null; state.stopRequestedAt=0; runStatusFinish("已完成","done"); setRunning(false); refreshActiveMeta(); processQueue(); break;
    case "turn.failed":
      state.stopTurnId=null; state.stopRequestedAt=0; runStatusFinish("本轮失败","err"); setRunning(false); refreshActiveMeta(); processQueue(); break;
    case "turn.interrupted":
      state.stopTurnId=null; state.stopRequestedAt=0; runStatusFinish("已停止","done"); setRunning(false); refreshActiveMeta(); processQueue(); break;
    case "turn.lifecycle":
      if(p.status&&isTurnRunning(p.status)){ if(!isStoppingTurn(m.turn_id||state.turnId)){ setRunning(true); runStatusUpdate("处理中",p.status); } }
      else if(p.status&&isTurnDone(p.status)){ state.stopTurnId=null; state.stopRequestedAt=0; runStatusFinish(normTurnStatus(p.status)==="completed"?"已完成":"已结束",normTurnStatus(p.status)==="failed"?"err":"done"); setRunning(false); processQueue(); }
      break;
    case "item.started":
      startItem(m.item_id, p.item); runStatusFromItem(p.item,"开始处理"); break;
    case "item.delta":
      deltaItem(m.item_id, p.delta, p.kind);
      if(p.kind==="agent_reasoning") runStatusUpdate("思考中","正在推理和规划");
      else if(p.kind==="agent_message") runStatusUpdate("输出中","正在生成回复");
      else if(p.kind==="command_execution") runStatusUpdate("执行命令","正在接收终端输出");
      break;
    case "item.completed":
      completeItem(m.item_id, p.item);
      if(p.item&&p.item.kind&&p.item.kind!=="agent_message"&&p.item.kind!=="agent_reasoning"){ const pair=runLabelForItem(p.item); runStatusStep(`完成: ${pair[1]||pair[0]}`); runStatusUpdate("整理中","工具步骤已完成,等待模型继续"); }
      break;
    case "item.failed": case "item.interrupted":
      completeItem(m.item_id, p.item, true);
      { const pair=runLabelForItem(p.item||{}); runStatusStep(`失败: ${pair[1]||pair[0]}`,"err"); runStatusUpdate("步骤失败",pair[1]||"某一步失败","err"); }
      break;
    case "approval.required": approvalRequired(m, p); runStatusUpdate("等待审批",p.tool_name||p.tool||p.command||p.summary||"工具调用需要确认"); runStatusStep("等待审批: "+(p.tool_name||p.tool||p.command||p.summary||"工具调用")); break;
    case "approval.decided": case "approval.timeout": approvalResolved(m,p,ev); runStatusUpdate("审批已处理",ev==="approval.timeout"?"审批超时":(p.decision==="allow"?"已允许工具调用":"已拒绝工具调用")); runStatusStep(ev==="approval.timeout"?"审批超时":(p.decision==="allow"?"审批通过":"审批拒绝")); break;
    case "sandbox.denied": sysnote("⛔ 沙箱拒绝: "+(p.detail||p.reason||"")); runStatusStep("沙箱拒绝: "+(p.detail||p.reason||""),"err"); runStatusUpdate("沙箱拒绝",p.detail||p.reason||"工具被拒绝","err"); break;
  }
  scrollDown();
}

function startItem(id, item){
  if(!id||state.items.has(id)) return;
  const kind=item?.kind||"agent_message";
  const wrap=$("#mwrap"); let el, content, meta=null;
  if(kind==="user_message"){
    if(state._optimUser){ el=state._optimUser; state._optimUser=null; content=el.querySelector(".content"); content.innerHTML=md(item.detail||item.summary||content.textContent||""); }   // 认领 send() 即时加的乐观气泡 → 不再重复渲染一条
    else { el=row("user","你"); content=el.querySelector(".content"); content.innerHTML=md(item.detail||item.summary||""); }
  }else if(kind==="agent_reasoning"){
    el=document.createElement("div"); el.className="reason";
    el.innerHTML=`<div class="head"><span class="caret">▸</span> 💭 思考过程</div><div class="rbody"></div>`;
    el.querySelector(".head").onclick=()=>el.classList.toggle("open");
    content=el.querySelector(".rbody"); content.textContent=item.detail||"";
  }else if(kind==="command_execution"){          // 终端块:$ 命令 + 输出
    el=document.createElement("div"); el.className="term";
    let cmd=""; try{ meta=JSON.parse(item.detail||"{}"); cmd=meta.command||meta.cmd||""; }catch{ cmd=item.detail||""; }
    el.innerHTML=`<div class="term-cmd"><span class="dollar">$</span>${esc(cmd)}</div><div class="term-out">运行中…</div>`;
    content=el.querySelector(".term-out");
  }else if(kind==="tool_call"||kind==="file_change"){
    el=document.createElement("div"); el.className="tool collapsible";   // 默认折叠,点头部展开(这类 JSON 一大坨,占屏)
    const label=kind==="file_change"?"✎ 文件改动":"🔧 工具调用";
    el.innerHTML=`<div class="th"><span class="caret">▸</span><span class="ic">${label}</span><span>${esc(item.summary||"")}</span></div><div class="tb">${esc(item.detail||"")}</div>`;
    el.querySelector(".th").onclick=()=>el.classList.toggle("open");
    content=el.querySelector(".tb");
  }else if(kind==="error"){
    el=document.createElement("div"); el.className="sysnote"; el.style.color="var(--err)"; el.textContent="⚠ "+(item.detail||item.summary||"错误"); content=el;
  }else if(kind==="context_compaction"||kind==="status"){
    el=document.createElement("div"); el.className="sysnote"; el.textContent="· "+(item.summary||item.detail||kind); content=el;
  }else{ // agent_message + fallback
    el=row("assistant","CodeWhale"); content=el.querySelector(".content"); content.innerHTML='<span class="typing"></span>';
  }
  wrap.appendChild(el); if(el) el.dataset.id=id;
  state.items.set(id,{el,content,kind,raw:(kind==="user_message"?"":(item?.detail||"")),meta});
}
function deltaItem(id, delta, kind){
  if(delta==null) return;
  let it=state.items.get(id);
  if(!it){ startItem(id,{kind:kind||"agent_message",detail:"",summary:""}); it=state.items.get(id); }
  it.raw=(it.raw||"")+delta;
  if(it.kind==="agent_reasoning"){ it.content.textContent=it.raw; }
  else if(it.kind==="agent_message"||!["tool_call","command_execution","file_change","user_message","status","context_compaction","error"].includes(it.kind)){ it.content.innerHTML=md(it.raw); }
  else { it.content.textContent=it.raw; }
  if(it.kind==="command_execution") previewFeedTerminal(it.raw,false,it.meta,true);
}
function preferLongerText(streamed, finalText){
  const s=streamed||"", f=finalText||"";
  if(!s) return f;
  if(!f) return s;
  return s.length>f.length ? s : f;   // 有些 provider 的 completed 快照会短于已收到的 delta,不要把 UI 回滚成残缺文本
}
function completeItem(id, item, failed){
  const it=state.items.get(id); if(!it) { if(item) startItem(id,item); return; }
  const snap = item?.detail!=null && item.detail!=="" ? item.detail : "";
  const shouldPreserveStream = it.kind==="agent_message" || it.kind==="agent_reasoning" || !["tool_call","command_execution","file_change","user_message","status","context_compaction","error"].includes(it.kind);
  const final = shouldPreserveStream ? preferLongerText(it.raw, snap) : (snap || it.raw);
  it.raw = final || it.raw || "";
  if(it.kind==="command_execution"){            // 终端输出写进 term-out,失败标红
    it.content.textContent = (final && final.trim()) ? final : (failed ? "" : "(无输出)");
    if(failed) it.el.classList.add("failed");
    previewFeedTerminal(final,!!failed,it.meta,false);
    return;
  }
  if(it.kind==="agent_reasoning") it.content.textContent=final;
  else if(it.kind==="user_message") it.content.innerHTML=md(final);
  else if(["tool_call","file_change","status","context_compaction"].includes(it.kind)) it.content.textContent=final;
  else { it.content.innerHTML=md(final); augmentOptions(it.content.parentElement, final, "#input"); }   // 助手消息末尾若是「选项清单+选择问句」→ 追加可点选项
  if(it.kind==="file_change" && preview.url && preview.autoRefresh) setTimeout(previewReload,250);
  if(failed) it.el.style.opacity=.6;
}
// ── 选项拾取器:模型末尾是「编号清单 + 选择问句」时,把清单渲染成可点选项(多选 + 其他),点「填入输入框」拼进 compose 供编辑再发 ──
function detectOptions(text){
  if(!text) return null;
  const lines=String(text).replace(/\r/g,"").split("\n");
  const nonEmpty=lines.map(l=>l.trim()).filter(Boolean);
  if(nonEmpty.length<2) return null;
  // 触发闸:末尾几行必须有"选择问句"(否则普通编号步骤列表不该变按钮)
  const cueRe=/(哪一?步|哪个|哪些|选哪|要不要|需要我[^。\n]{0,20}(执行|做|帮|试|跑|开始)|你想[^。\n]{0,20}(做|选|执行|先)|想先(做|选|跑)|要我[^。\n]{0,10}(做|执行|跑|试)哪|which\b|choose|pick one|which (one|step)|shall i|execute which)/i;
  const tail=nonEmpty.slice(-4).join("\n");
  const last=nonEmpty[nonEmpty.length-1];
  if(!(cueRe.test(tail) || /[?？]\s*$/.test(last))) return null;
  // 取"最后一段连续编号行"(空行不打断,普通文字行打断)
  const itemRe=/^\s*(\d{1,2})[.、)]\s+(.+?)\s*$/;
  let run=[], best=[];
  for(const l of lines){
    const m=l.match(itemRe);
    if(m) run.push({n:m[1], label:m[2]});
    else if(l.trim()==="") {/* 空行不打断 */}
    else { if(run.length) best=run; run=[]; }
  }
  if(run.length) best=run;
  if(best.length<2) return null;
  best.forEach(it=>{ it.label=it.label.replace(/`([^`]+)`/g,"$1").replace(/\*\*([^*]+)\*\*/g,"$1").replace(/^[\*_ ]+|[\*_ ]+$/g,"").trim(); });
  return best;
}
function buildOptPicker(items, inputSel){
  const sel=new Set();
  const wrap=document.createElement("div"); wrap.className="optpicker";
  const chips=document.createElement("div"); chips.className="optchips";
  items.forEach(it=>{
    const c=document.createElement("span"); c.className="optchip";
    const short=it.label.length>52?it.label.slice(0,50)+"…":it.label;
    c.textContent=(it.n?it.n+". ":"")+short; c.title=it.label;
    c.onclick=()=>{ if(sel.has(it)){sel.delete(it);c.classList.remove("on");} else {sel.add(it);c.classList.add("on");} };
    chips.appendChild(c);
  });
  const other=document.createElement("span"); other.className="optchip other"; other.textContent="其他…";
  const otherInp=document.createElement("input"); otherInp.type="text"; otherInp.className="optother"; otherInp.placeholder="自定义补充…"; otherInp.style.display="none";
  other.onclick=()=>{ const show=otherInp.style.display==="none"; otherInp.style.display=show?"":"none"; other.classList.toggle("on",show); if(show) otherInp.focus(); };
  chips.appendChild(other); wrap.appendChild(chips); wrap.appendChild(otherInp);
  const fill=document.createElement("button"); fill.className="optfill"; fill.textContent="填入输入框 ↵";
  fill.onclick=()=>{
    const parts=[...sel].map(it=>it.label); const ot=otherInp.value.trim(); if(ot) parts.push(ot);
    if(!parts.length) return;
    const txt = parts.length>1 ? ("请帮我执行:\n"+parts.map(p=>"- "+p).join("\n")) : ("请帮我:"+parts[0]);
    const inp=$(inputSel); if(!inp) return;
    inp.value = inp.value.trim() ? (inp.value.replace(/\s+$/,"")+"\n"+txt) : txt;
    inp.dispatchEvent(new Event("input")); inp.focus();
    try{ inp.setSelectionRange(inp.value.length,inp.value.length); }catch(e){}
  };
  wrap.appendChild(fill);
  return wrap;
}
function augmentOptions(container, text, inputSel){   // container=消息 body 节点;幂等(先清旧 picker)
  try{
    if(!container) return;
    [...container.querySelectorAll(":scope > .optpicker")].forEach(n=>n.remove());
    const items=detectOptions(text); if(!items) return;
    container.appendChild(buildOptPicker(items, inputSel||"#input"));
  }catch(e){}
}

/* ---------- approvals ---------- */
function pendingApprovalCards(){
  return [...document.querySelectorAll(".tool.needapproval[data-aid]")];
}
function approvalGoneError(e){
  const msg=String(e&&e.message||e||"");
  return /\b404\b|no pending approval|not found|expired|stale|gone/i.test(msg);
}
function markApproval(card,label){
  if(!card) return;
  const a=card.querySelector(".approval");
  if(a) a.innerHTML=`<span class="q">${label}</span>`;
  card.classList.remove("needapproval");
  delete card.dataset.deciding;
}
function approvalRequired(m,p){
  const aid=p.approval_id||p.id||m.approval_id; const tool=p.tool_name||p.tool||p.command||p.summary||"工具调用";
  if(aid){
    const old=pendingApprovalCards().find(c=>c.dataset.aid===aid);
    if(old){ scrollDown(); return; }   // SSE 重连/历史重放时不要重复追加同一个审批卡片
  }
  const card=document.createElement("div"); card.className="tool needapproval"; card.dataset.aid=aid;
  card.innerHTML=`<div class="th"><span class="ic">🔧 待审批</span><span>${esc(tool)}</span></div>`+
    (p.detail?`<div class="tb">${esc(p.detail)}</div>`:"")+
    `<div class="approval"><span class="q">${esc(p.matched_rule?("规则: "+p.matched_rule):"是否允许执行?")}</span>`+
    `<button class="deny">拒绝</button><button class="allow">允许</button></div>`;
  $("#mwrap").appendChild(card);
  card.querySelector(".allow").onclick=()=>decide(aid,"allow",card);
  card.querySelector(".deny").onclick=()=>decide(aid,"deny",card);
  // 自动批准开启时,前端直接允许(不依赖后端 turn 启动时读取的标志)。延迟 400ms 并检查仍待审批,避免重放历史已决项时误触。
  if(state.autoApprove && aid){ setTimeout(()=>{ if(card.classList.contains("needapproval")) decide(aid,"allow",card,true); }, 400); }
  scrollDown();
}
async function decide(aid,decision,card,silent){
  if(!aid || !card || card.dataset.deciding==="1" || !card.classList.contains("needapproval")) return;
  card.dataset.deciding="1";
  card.querySelectorAll("button").forEach(b=>b.disabled=true);
  try{
    await api(`/v1/approvals/${aid}`,{method:"POST",body:JSON.stringify({decision,remember:false})});

function clipCopy(t){ if(navigator.clipboard && window.isSecureContext){ return navigator.clipboard.writeText(t).catch(()=>execCopy(t)); } return execCopy(t); }   // 优先 clipboard API;不存在(手机/LAN 非 HTTPS)或被拒(失焦/权限)都退回 execCommand

let _dfModel=""; // DeerFlow 选择的模型
async function submitDeerFlow(model){
  const prompt=$("#dfprompt").value.trim();
  if(!prompt) return;
  const m=model||_dfModel||"";
  closeDeerFlow();
  // 在聊天区添加用户消息
  const label=m?`🔬 DeerFlow [${m}]: `:"🔬 DeerFlow 深度研究: ";
  const oel=row("user","你"); oel.querySelector(".content").innerHTML=md(label+prompt); $("#mwrap").appendChild(oel); scrollDown(true);
  // 添加 DeerFlow 结果容器
  const dfel=document.createElement("div"); dfel.className="df-result"; dfel.id="df-"+Date.now();
  dfel.innerHTML='<div class="df-hdr running"><div class="spinner"></div> DeerFlow 深度研究中…</div><div class="df-body">正在提交研究任务…</div><div class="df-stats"></div>';
  $("#mwrap").appendChild(dfel); scrollDown(true);
  const hdr=dfel.querySelector(".df-hdr"); const body=dfel.querySelector(".df-body"); const stats=dfel.querySelector(".df-stats");
  try{
    // 提交研究任务
    const body={prompt}; if(m) body.model=m;
    const r=await fetch("/api/deerflow/research",{method:"POST",headers:{...auth,"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    if(!d.ok){ body.textContent="提交失败: "+(d.error||"未知错误"); hdr.classList.remove("running"); hdr.textContent="❌ DeerFlow 提交失败"; return; }
    body.textContent="任务已提交 (Thread: "+d.thread_id.slice(0,8)+"…)\n等待结果中…";
    stats.textContent="Thread: "+d.thread_id.slice(0,12)+"…";
    // 轮询结果
    const maxPolls=60, interval=8000;
    for(let i=0;i<maxPolls;i++){
      await new Promise(res=>setTimeout(res,interval));
      const pr=await fetch("/api/deerflow/poll?thread_id="+encodeURIComponent(d.thread_id),{headers:{...auth}});
      const pd=await pr.json();
      if(pd.error){ body.textContent="轮询失败: "+pd.error; hdr.classList.remove("running"); hdr.textContent="❌ DeerFlow 错误"; return; }
      const out=pd.output||"";
      if(out.includes("success")||out.includes("研究完成")||out.includes("Status: success")){
        hdr.classList.remove("running"); hdr.textContent="✅ DeerFlow 深度研究完成";
        // 获取完整结果
        const rr=await fetch("/api/deerflow/poll?thread_id="+encodeURIComponent(d.thread_id)+"&full=1");
        const rd=await rr.json();
        const final=rd.output||out;
        // 清理输出:去掉轮询状态行
        const clean=final.replace(/^\[.*?\] tokens:.*$/gm,"").replace(/^  \[.*$/gm,"").trim();
        body.innerHTML=md(clean||out);
        // 尝试获取统计信息
        const statMatch=final.match(/([\d,]+)\s*in\s*\/\s*([\d,]+)\s*out.*?(\d+)\s*LLM\s*calls?/i);
        if(statMatch) stats.textContent="Tokens: "+statMatch[1]+" in / "+statMatch[2]+" out | "+statMatch[3]+" LLM calls";
        else stats.textContent="完成";
        return;
      }
      if(out.includes("error")||out.includes("失败")){ hdr.classList.remove("running"); hdr.textContent="❌ DeerFlow 研究失败"; body.textContent=out.slice(0,3000); return; }
      if(out.includes("running")){ body.textContent="研究中… ("+Math.round((i+1)*interval/1000)+"s)"; }
      else { body.textContent=out.slice(0,1000); }
    }
    hdr.classList.remove("running"); hdr.textContent="⏳ DeerFlow 超时";
    body.textContent="研究超过 8 分钟仍在进行。可稍后在终端运行:\npython3 ~/scripts/deerflow_client.py result "+d.thread_id;
  }catch(e){ hdr.classList.remove("running"); hdr.textContent="❌ DeerFlow 异常"; body.textContent=e.message; }
}

/* ---------- send ---------- */
async function send(queuedText){
  const inp=$("#input");
  let text=queuedText;
  if(text===undefined){ text=inp.value.trim(); if(!text && !state.attachments.length) return; inp.value=""; inp.style.height="auto"; text=withAttachments(text); _stick=true; }   // 新发:折入附件路径 + 贴底
  if(!text) return;
  try{
    if(!state.activeId){ const t=await createThread(); _addOptimisticThread(t.id, text.replace(/\s+/g," ").trim().slice(0,40)); await openThread(t.id); loadThreads(); }   // 乐观立刻把新 thread 加进侧栏(否则慢 SWR 缓存下首条消息不生成可见 thread,要发第二条才出现);loadThreads 后台刷,不阻塞
    // 乐观渲染:会话就绪后立刻显示用户消息 + 进入"运行中"(思考指示),不等 SSE。否则首条要等后端起 turn(~1s+,推理模型更久),
    // 这段时间窗口空白,体感像"卡住/过好久才显示"。真 user_message 事件到达时由 startItem 认领这个气泡,不重复。
    const oel=row("user","你"); oel.querySelector(".content").innerHTML=md(text); $("#mwrap").appendChild(oel); state._optimUser=oel; setRunning(true); runStatusUpdate("发送中","正在把消息交给模型"); scrollDown(true);
    const th=state.threads.find(x=>x.id===state.activeId);
    const freezeName = !th || !th.title || th.title==="New Thread";   // 首条消息 → 把名字锁成这句话,之后后端不再每轮重算
    const r=await api(`/v1/threads/${state.activeId}/turns`,{method:"POST",body:JSON.stringify({prompt:text})});
    state.turnId=r?.turn?.id||state.turnId; setRunning(true); runStatusUpdate("思考中","请求已送达,等待模型返回状态"); runStatusStep("请求已送达");
    if(freezeName){
      const title=text.replace(/\s+/g," ").trim().slice(0,40);
      api(`/v1/threads/${state.activeId}`,{method:"PATCH",body:JSON.stringify({title})}).then(()=>{
        const t2=state.threads.find(x=>x.id===state.activeId); if(t2) t2.title=title;
        if(state.activeId) $("#ttitle").textContent=title; state._sig=null; renderThreads();
      }).catch(()=>{});
    }
  }catch(e){
    if(state._optimUser){ state._optimUser.remove(); state._optimUser=null; }   // 发送失败/转排队 → 移除乐观气泡(由排队占位或错误提示接管)
    if(/\b409\b|active turn/i.test(e.message||"")){   // 该对话仍有一轮在跑(切回来误发/连点)→ 不报错,转为排队,turn 完成后自动发
      setRunning(true); state.queue.push({text, el:(()=>{ const el=document.createElement("div"); el.className="msg user queued"; el.innerHTML=`<div class="av">你</div><div class="body"><div class="who">⏳ 排队中(上一轮还在跑)</div><div class="content"></div><button class="qx" title="取消排队">✕</button></div>`; el.querySelector(".content").textContent=text; el.querySelector(".qx").onclick=()=>{ const i=state.queue.findIndex(q=>q.el===el); if(i>=0) state.queue.splice(i,1); el.remove(); }; $("#mwrap").appendChild(el); scrollDown(true); return el; })()});
      runStatusUpdate("排队中","上一轮仍在运行,这条会稍后发送");
      return;
    }
    inp.value=text; inp.style.height="auto"; inp.style.height=Math.min(inp.scrollHeight,200)+"px"; inp.focus();  // 失败:文字留回输入框
    $("#sendbtn").disabled=false;
    runStatusFinish("发送失败","err");
    sysnote("发送失败: "+e.message);
  }
}
function enterSend(){
  const inp=$("#input"); const raw=inp.value.trim();
  // DeerFlow 深度研究: /df 前缀
  if(raw.startsWith("/df ")){
    const prompt=raw.slice(4).trim();
    if(!prompt) return;
    inp.value=""; inp.style.height="auto"; $("#sendbtn").disabled=true;
    submitDeerFlowFromInput(prompt); return;
  }
  if(state.running) queueFromInput(); else send();
}   // 运行中=排队,空闲=直接发
function queueFromInput(){
  const inp=$("#input"); const raw=inp.value.trim(); if(!raw && !state.attachments.length) return;
  const text=withAttachments(raw);   // 排队时就折入附件(否则等发送时附件可能已被后一条消息清掉)
  inp.value=""; inp.style.height="auto"; $("#sendbtn").disabled=true;
  const el=document.createElement("div"); el.className="msg user queued";
  el.innerHTML=`<div class="av">你</div><div class="body"><div class="who">⏳ 排队中</div><div class="content"></div><button class="qx" title="取消排队">✕</button></div>`;
  el.querySelector(".content").textContent=raw||"(附件)";
  el.querySelector(".qx").onclick=()=>{ const i=state.queue.findIndex(q=>q.el===el); if(i>=0) state.queue.splice(i,1); el.remove(); };
  $("#mwrap").appendChild(el); scrollDown(true);
  state.queue.push({text, el});
}
function processQueue(){   // 当前任务结束后,自动发下一条排队消息
  if(state.running || !state.queue.length) return;
  const item=state.queue.shift(); item.el.remove();   // 移除占位,真消息由 turn 事件渲染
  send(item.text);
}
async function interrupt(){
  if(!state.activeId) return;
  let turn=state.turnId;
  if(!turn){ try{ const rec=await api(`/v1/threads/${state.activeId}`); turn=(rec.thread||rec).latest_turn_id; }catch{} }  // turnId 丢了就查回来
  if(!turn) return;
  state.stopTurnId=turn; state.stopRequestedAt=Date.now(); runStatusUpdate("正在停止","准备中断当前轮并处理悬挂审批"); setRunning(false);
  const cards=pendingApprovalCards();
  if(cards.length) await Promise.allSettled(cards.map(c=>decide(c.dataset.aid,"deny",c,true)));   // 停止时先拒掉悬挂审批,否则后端会继续等工具批准
  try{ await api(`/v1/threads/${state.activeId}/turns/${turn}/interrupt`,{method:"POST",body:"{}"}); setRunning(false);
    if(state.queue.length){ state.queue.forEach(q=>q.el.remove()); state.queue=[]; }   // 停止=连排队的也取消
    sysnote("⏹ 已请求停止"); }
  catch(e){
    if(approvalGoneError(e)){ state.stopTurnId=null; state.stopRequestedAt=0; runStatusFinish("这轮已经结束","done"); sysnote("⏹ 这轮已经结束"); }
    else { runStatusUpdate("停止失败",e.message,"err"); sysnote("停止失败: "+e.message); }
  }
}
// 乐观把新对话立刻加进侧栏(慢 SWR 缓存要很久才有它)。pendingNew 保证后台 loadThreads 刷新时不被冲掉,直到它真出现再去重。
// 新建按钮 + 单窗口发首条消息(隐式建 thread)都走它。
function _addOptimisticThread(tid, title){
  if(!tid) return;
  const prov=window._newchatProv||"deepseek";
  const opt={id:tid, title:title||"新对话", preview:"", provider:prov, compare:false, updated_at:new Date().toISOString(), latest_turn_status:""};
  state.pendingNew=state.pendingNew||[];
  if(!state.pendingNew.find(x=>x.id===tid)) state.pendingNew.unshift(opt);
  if(!state.threads.find(x=>x.id===tid)) state.threads.unshift(opt);
  state._sig=null; renderThreads();
}
async function newThread(){
  try{
    const t=await createThread();
    if(t && t.id){ _addOptimisticThread(t.id, "新对话"); openThread(t.id); $("#input").focus(); }
    loadThreads();   // 后台刷真实信息,不 await;pendingNew 会被保留直到真出现
  }catch(e){ alert("新建失败: "+e.message); }
}

/* ---------- 附件上传 ---------- */
async function uploadOne(f, scope){   // 上传单个文件到 workspace,返回附件记录或 null(通用,单窗口/对比各栏共用)
  if(f.size>50*1024*1024){ sysnote("⚠ "+f.name+" 超过 50MB,跳过"); return null; }
  try{
    const buf=await f.arrayBuffer();
    const r=await fetch(url("/api/upload"),{method:"POST",headers:{...auth,"X-Filename":encodeURIComponent(f.name),"X-Upload-Scope":scope||"inbox"},body:buf});
    const d=await r.json();
    if(d.path) return uploadAttachmentRecord(f,d);
    sysnote("⚠ 上传失败: "+(d.error||f.name));
  }catch(e){ sysnote("⚠ 上传失败: "+e.message); }
  return null;
}
async function uploadFiles(files){
  for(const f of files){ const rec=await uploadOne(f, state.activeId||"inbox"); if(rec) state.attachments.push(rec); }
  renderAttach();
}
// ── 对比:每栏「只追问」输入框各自的附件 ──

function cmpColRenderAttach(prov){

function cmpColWithAttach(prov, text){   // 把该栏附件路径折进 prompt 后清空(与单窗口 withAttachments 一致)
  const list=(CMP.colAttach&&CMP.colAttach[prov])||[];

function renderAttach(){
  const bar=$("#attachbar"); bar.innerHTML="";
  state.attachments.forEach((a,i)=>{
    bar.appendChild(attachmentChip(a,()=>{ revokeAttachmentPreview(a); state.attachments.splice(i,1); renderAttach(); }));

function withAttachments(text){   // 把附件路径折进 prompt,让 agent 用 read_file 读;然后清空

}

async function openConnectors(){

  const body=$("#modalBody");
  body.innerHTML=`<div id="mcplist">加载中…</div>
    <div class="prow" style="margin-top:8px"><input id="mname" placeholder="名称"><input id="mcmd" placeholder="命令 如 /opt/homebrew/bin/npx"><input id="margs" placeholder="参数,逗号分隔"></div>
    <div class="prow"><button class="btn primary" id="maddbtn">＋ 添加 server</button><button class="btn" id="mrestart">↻ 重启后端生效</button></div>
    <div style="font-size:11px;color:var(--faint);line-height:1.5">增删/开关后需「重启后端」才生效。Gmail/GDrive 等可加对应的本地 MCP server(自己跑 OAuth),不是 Claude 那种一键托管。</div>`;
  const drawList=async()=>{
    const list=$("#mcplist");
    try{
      const servers=await api("/api/mcp"); list.innerHTML="";
      if(!servers.length) list.innerHTML='<div style="color:var(--faint);font-size:12px">还没有 MCP server</div>';
      for(const s of servers){
        const row=document.createElement("div"); row.className="lrow";
        const stc=s.status==="ok"?"ok":(s.status==="unknown"?"unknown":"err");
        row.innerHTML=`<span class="nm" title="${esc((s.command||s.url||"")+" "+(s.args||[]).join(" "))}">${esc(s.name)}<span class="sub">${esc((s.command||s.url||"").split("/").pop())}</span></span>
          <span class="st ${stc}">${esc(s.enabled?s.status:"已停用")}</span>
          <button class="btn" data-act="toggle">${s.enabled?"停用":"启用"}</button>
          <button class="btn danger" data-act="remove">删</button>`;
        row.querySelector("[data-act=toggle]").onclick=async()=>{ await api("/api/mcp",{method:"POST",body:JSON.stringify({action:"toggle",name:s.name,enabled:!s.enabled})}); drawList(); };
        row.querySelector("[data-act=remove]").onclick=async()=>{ if(!(await cwConfirm("删除 MCP server「"+s.name+"」?"))) return; await api("/api/mcp",{method:"POST",body:JSON.stringify({action:"remove",name:s.name})}); drawList(); };
        list.appendChild(row);
      }
    }catch(e){ list.textContent="加载失败: "+e.message; }
  };
  drawList();
  $("#maddbtn").onclick=async()=>{
    const name=$("#mname").value.trim(), command=$("#mcmd").value.trim();
    const args=$("#margs").value.split(",").map(x=>x.trim()).filter(Boolean);
    if(!name||!command){ alert("名称和命令必填"); return; }
    const d=await api("/api/mcp",{method:"POST",body:JSON.stringify({action:"add",name,command,args})});
    if(d.error){ alert(d.error); return; }
    $("#mname").value=$("#mcmd").value=$("#margs").value=""; drawList();
  };
  $("#mrestart").onclick=async()=>{ const b=$("#mrestart"); b.textContent="重启中…"; try{ await api("/api/mcp",{method:"POST",body:JSON.stringify({action:"restart"})}); }catch(e){} setTimeout(()=>{ b.textContent="↻ 重启后端生效"; drawList(); },2800); };
}
