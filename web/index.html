const PROVIDERS=[   // 非 DeepSeek 的 provider 模型填 auto:app-server 把 default_text_model 当 DeepSeek 字段校验,填具体名(如 glm-4.6)会启动失败;auto=由该 provider 自选默认模型
  {id:"deepseek",name:"DeepSeek V4",model:"deepseek-v4-pro"},
  {id:"zai",name:"GLM (智谱 / Z.ai)",model:"auto"},
  {id:"moonshot",name:"Kimi (月之暗面)",model:"auto"},
  {id:"openai-codex",name:"ChatGPT(OAuth 登录)",model:"auto",oauth:true},
  {id:"custom",name:"腾讯混元",model:"hy3-preview",cmpKeyOnly:true,freeModel:true},   // OpenAI 兼容槽(TokenHub)。官方语言模型做成下拉;freeModel 保留手填新 ID 的逃生口
  {id:"claude-code",name:"Claude (订阅)",model:"auto",oauth:true,newchatOnly:true},   // 委派官方 claude -p 走订阅(免 API key,真正能用的那条);单窗口可选但只能当"新对话 provider"(走独立后端 :7900),不能当 launchd 主后端(官方二进制不识别)。已合并掉原 anthropic(API Key)条:它对订阅令牌走 x-api-key 必 401,且会误显"已配置"
];   // 已删 OpenRouter / DeepInfra(felix 不用、未配置只显 ⚠)
const PROV_SHORT={deepseek:"DeepSeek",zai:"GLM",moonshot:"Kimi","openai-codex":"ChatGPT",custom:"混元","claude-code":"Claude"};
async function switchActiveThreadProvider(provider, model){
  if(!state.activeId) return null;
  const body={tid:state.activeId,provider}; if(model) body.model=model;
  const d=await api("/api/thread-provider",{method:"POST",body:JSON.stringify(body)});
  if(d.error) throw new Error(d.error);
  const t=state.threads.find(x=>x.id===state.activeId);
  if(t){ t.provider=provider; t.model=d.model||model||t.model; t.compare=false; }
  state._sig=null; renderThreads();
  return d;
}
async function loadModelLabel(){ try{ const d=await api("/api/model"); const c=d.current||{};
  let nc=""; try{ nc=(await api("/api/newchat-provider")).provider||""; }catch(e){}   // "新对话 provider":单窗口新建对话实际走它(可能 != 主配置,如主后端 deepseek 但新对话 claude-code)
  const newProv=nc||c.provider||"?";
  window._newchatProv=newProv;   // 缓存新对话 provider → 乐观新建时直接用,不在发送关键路径再请求
  const active=state.threads.find(x=>x.id===state.activeId);
  const prov=(active&&active.provider&&!active.compare)?active.provider:newProv;
  const disp=(prov===c.provider && c.model && c.model!=="auto") ? c.model : (PROV_SHORT[prov]||prov);   // chip 代表"下一个新对话用什么";newchat 覆盖主配置时显 newchat 友好名
  const nm=$("#modelname"); if(nm) nm.textContent=disp;
  const chip=$("#modelchip"); if(chip) chip.title=`当前显示:${prov}; 新对话默认:${newProv}${nc&&nc!==c.provider?`(主后端 ${c.provider})`:""} — 点击切换`;
}catch(e){} }
async function openModelSwitch(preselect){
  openModal("🧠 切换模型");
  const body=$("#modalBody");
  body.innerHTML=`<div style="font-size:13px;margin-bottom:12px">当前:<b id="curmodel">…</b></div>
    <div class="prow"><select id="mprov" class="msearch" style="margin:0"></select></div>
    <div class="prow" id="mvariantrow" style="display:none"><select id="mvariant" class="msearch" style="margin:0" title="模型变体"></select></div>
    <div class="prow" id="meffortrow" style="display:none"><select id="meffort" class="msearch" style="margin:0" title="Claude 推理 effort"><option value="">推理 effort:默认</option><option value="low">低</option><option value="medium">中</option><option value="high">高</option></select></div>
    <div class="prow"><input id="mmodel" placeholder="模型名(可改)"></div>
    <div class="prow" id="mkeyrow"><input id="mkey" type="password" placeholder="API key"></div>
    <div class="prow"><button class="btn primary" id="mswitch">切换并应用到当前对话</button></div>
    <div id="mhint" style="font-size:11px;color:var(--faint);line-height:1.6">切换后<b>当前打开的对话下一条</b>会直接使用此模型;没有打开对话时,只会设置新对话默认模型。其它未打开的旧对话保持原模型。切换可能重启对应后端几秒,会话数据不丢。key 存本机,不外传。</div>`;
  let keyed={}, curNc="", prefs={};
  try{ const d=await api("/api/model"); keyed=d.keyed||{};
    try{ curNc=(await api("/api/newchat-provider")).provider||""; }catch(e){}
    try{ const mp=await api("/api/model-pref"); prefs=mp.prefs||{}; window._effortPrefs=mp.effort||{}; }catch(e){}   // 各 provider 当前所选模型变体 + claude effort
    $("#curmodel").textContent = (curNc && curNc!==d.current.provider)
      ? `${PROV_SHORT[curNc]||curNc}(新对话)· 主后端 ${d.current.provider}`   // newchat 覆盖主配置时,明确两者
      : `${d.current.provider} / ${d.current.model||"(默认)"}`;
  }catch(e){ $("#curmodel").textContent="读取失败"; }
  const sel=$("#mprov");
  sel.innerHTML=PROVIDERS.map(p=>`<option value="${p.id}">${p.name}${keyed[p.id]?"  ✓已配置":""}</option>`).join("");   // 含 claude-code(newchatOnly):单窗口可选,选它只设"新对话 provider"(见 mswitch),不动 launchd 主后端
  if(preselect && PROVIDERS.some(p=>p.id===preselect)) sel.value=preselect;
  else if(curNc && PROVIDERS.some(p=>p.id===curNc)) sel.value=curNc;   // 预选当前"新对话 provider",打开即见实际状态
  const sync=()=>{ const p=PROVIDERS.find(x=>x.id===sel.value)||{};
    const vars=MODEL_VARIANTS[sel.value]||[];                       // 有预设变体 → 用下拉;freeModel 额外保留手填框
    if(vars.length){
      $("#mvariantrow").style.display="flex";
      const cm=prefs[sel.value]||p.model||(vars[0]&&vars[0].id);
      const opts=(cm && !vars.some(v=>v.id===cm)) ? vars.concat([{id:cm,name:"自定义: "+cm}]) : vars;
      $("#mvariant").innerHTML=opts.map(v=>`<option value="${esc(v.id)}" ${v.id===cm?"selected":""}>${esc(v.name)}</option>`).join("");
      if(p.freeModel){
        $("#mmodel").parentElement.style.display="flex"; $("#mmodel").value=cm||""; $("#mmodel").placeholder="模型 ID(可改;下拉会同步)";
        $("#mvariant").onchange=()=>{ $("#mmodel").value=$("#mvariant").value; };
      } else { $("#mmodel").parentElement.style.display="none"; $("#mvariant").onchange=null; }
    } else { $("#mvariantrow").style.display="none"; $("#mvariant").onchange=null; $("#mmodel").parentElement.style.display="flex"; $("#mmodel").value=prefs[sel.value]||p.model||""; $("#mmodel").placeholder=p.freeModel?"模型 ID,如 hy3-preview":"模型名(可改)"; }
    if(EFFORT_PROVIDERS.includes(sel.value)){ $("#meffortrow").style.display="flex"; $("#meffort").value=(window._effortPrefs&&window._effortPrefs[sel.value])||""; }   // Claude / GPT 有推理 effort
    else $("#meffortrow").style.display="none";
    $("#mkeyrow").style.display=p.oauth?"none":"flex";
    $("#mkey").placeholder=p.oauth?"OAuth 登录,无需 key":(keyed[p.id]?"已配置,留空=不改":(p.cmpKeyOnly?"必填:TokenHub 模型调用 api_key(sk- 开头)":"必填:该 provider 的 API key"));
    const sw=$("#mswitch"); if(sw) sw.textContent=p.cmpKeyOnly?"保存并应用到当前对话":(p.newchatOnly?"应用到当前对话":"切换并应用到当前对话"); };   // custom/claude-code 不切主后端,但可 pin 当前 thread
  sel.onchange=sync; sync();
  $("#mswitch").onclick=async()=>{
    const provider=sel.value, api_key=$("#mkey").value;
    const p=PROVIDERS.find(x=>x.id===provider)||{};
    const vars=MODEL_VARIANTS[provider]||[];
    const variant = vars.length ? (p.freeModel ? ($("#mmodel").value.trim() || $("#mvariant").value) : $("#mvariant").value) : $("#mmodel").value.trim();   // 所选模型变体/手填模型 ID
    if(!p.oauth && !keyed[provider] && !api_key){ alert("该 provider 还没配置 key —— 请先填 API key"); return; }
    const b=$("#mswitch"); b.textContent=p.cmpKeyOnly?"校验中…":(p.newchatOnly?"切换中…":"切换中,重启后端…"); b.disabled=true;
    try{
      if(p.cmpKeyOnly){
        // 腾讯混元:auth CLI 不认 custom,所以 /api/model 只负责写 [providers.custom].api_key;
        // 单窗口新对话再通过 /api/newchat-provider 路由到独立 custom 后端,主 :7878 保持 deepseek 不动。
        const d=await api("/api/model",{method:"POST",body:JSON.stringify({provider,model:variant||p.model||"hy3-preview",api_key})});
        if(d.error){ alert("保存失败: "+d.error); b.textContent="保存并应用到当前对话"; b.disabled=false; return; }
        if(d.warning){ b.title=d.warning; cwToast("⚠ "+d.warning); }
        if(variant){ try{ await api("/api/model-pref",{method:"POST",body:JSON.stringify({provider,model:variant})}); }catch(e){} }
        await api("/api/newchat-provider",{method:"POST",body:JSON.stringify({provider})});
        if(state.activeId) await switchActiveThreadProvider(provider, variant||p.model||"hy3-preview");
        b.textContent=state.activeId?"✓ 当前对话下一条用混元":"✓ 已设为混元默认";
        setTimeout(()=>{ closeModal(); loadModelLabel(); loadThreads(); }, 700);
        return;
      }
      if(p.newchatOnly){
        // claude-code(订阅,委派 claude -p)不能当 launchd 主后端(官方二进制不识别)→ 只设"新对话 provider":
        // 新对话走它的独立后端 :7900,主后端 :7878 保持原默认(deepseek)不动、不重启。
        await api("/api/newchat-provider",{method:"POST",body:JSON.stringify({provider})});
      } else {
        // set_model 用安全 model:deepseek 可填具体 id,其它非 deepseek 必须 auto(否则 default_text_model 被当 deepseek 字段校验、启动失败);变体走 pref
        const sm = (provider==="deepseek") ? (variant||p.model||"auto") : (p.model||"auto");
        const d=await api("/api/model",{method:"POST",body:JSON.stringify({provider,model:sm,api_key})});
        if(d.error){ alert("切换失败: "+d.error); b.textContent="切换并重启后端"; b.disabled=false; return; }
        try{ await api("/api/newchat-provider",{method:"POST",body:JSON.stringify({provider})}); }catch(e){}   // 新对话锁定此 provider(每对话锁模型)
      }
      const body={provider}; if(variant) body.model=variant; if(EFFORT_PROVIDERS.includes(provider)) body.effort=$("#meffort").value;   // 模型变体 + Claude/GPT effort 存 pref(单窗口+对比共用)
      if(body.model||"effort" in body){ try{ await api("/api/model-pref",{method:"POST",body:JSON.stringify(body)}); }catch(e){} }
      if(state.activeId) await switchActiveThreadProvider(provider, variant||p.model||"");
      b.textContent="✓ "+(state.activeId?"当前对话下一条用 ":"已设为默认 ")+(PROV_SHORT[provider]||provider)+(variant?(" · "+variant):"");
      setTimeout(()=>{ const a=state.activeId, r=state.running; closeModal(); if(!r){ closeStream(); if(a) openThread(a); } loadThreads(); loadModelLabel(); loadBalance(); }, 700);   // 空闲时重连当前会话到新 provider;正在跑则不断流,下一条自然走新模型
    }catch(e){ alert("切换失败: "+e.message); b.textContent="切换并重启后端"; b.disabled=false; }
  };
}

/* ---------- 更新中心(界面 GUI + CodeWhale 后端)---------- */
async function openUpdate(){
  openModal("🔄 更新");
  $("#modalBody").innerHTML=`
    <div class="lrow"><span class="nm">🖥 界面 (GUI)<span class="sub" id="u_gui"></span></span><span id="u_gui_act" style="flex:0 0 auto">检查中…</span></div>
    <div class="lrow"><span class="nm">🐳 CodeWhale 后端<span class="sub" id="u_cw"></span></span><span id="u_cw_act" style="flex:0 0 auto">检查中…</span></div>
    <div style="font-size:11px;color:var(--faint);line-height:1.6;margin-top:8px">界面更新走<b>签名验证</b>(下载 → Ed25519 验签 → 校验 SHA-256 → 替换 → 重启);后端更新跑 codewhale update。更新会重启,会话数据不丢。</div>`;
  (async()=>{ const a=$("#u_gui_act"), c=$("#u_gui");
    try{ const d=await api("/api/update/gui/check"); c.textContent=" 当前 "+(d.current||"?");
      if(d.enabled===false){ a.innerHTML='<span class="st unknown">未配置更新源</span>'; return; }
      if(d.error){ const hint=/404|not found|403|401/i.test(d.error)?"更新源拉不到(仓库私有或未发布 Release)":"检查失败"; a.innerHTML='<span class="st err">'+hint+'</span>'; a.title=d.error; return; }
      if(d.available){ const b=document.createElement("button"); b.className="btn primary"; b.textContent="↑ 更新到 "+d.latest; b.onclick=()=>applyUpd(b,"/api/update/gui/apply"); a.innerHTML=""; a.appendChild(b); }
      else a.innerHTML='<span class="st ok">已是最新</span>';
    }catch(e){ a.innerHTML='<span class="st err">检查失败</span>'; }
  })();
  (async()=>{ const a=$("#u_cw_act"), c=$("#u_cw");
    try{ const d=await api("/api/update/check"); c.textContent=" 当前 "+(d.current||"?");
      if(d.error){ a.innerHTML='<span class="st err">检查失败</span>'; return; }
      if(d.available && d.latest){ const b=document.createElement("button"); b.className="btn primary"; b.textContent="↑ 更新到 "+d.latest; b.onclick=()=>applyUpd(b,"/api/update/apply"); a.innerHTML=""; a.appendChild(b); }
      else a.innerHTML='<span class="st ok">已是最新</span>';
    }catch(e){ a.innerHTML='<span class="st err">检查失败</span>'; }
  })();
}
async function applyUpd(btn,endpoint){
  if(endpoint.indexOf("/gui/")>=0){   // 界面更新:异步 + 下载/校验/应用 进度条
    if(!(await cwConfirm("开始更新界面?会下载、校验数字签名 + SHA-256 后替换并重启(会话数据不丢)。"))) return;
    return guiUpdateWithProgress(btn.parentNode);
  }
  // 后端(codewhale update):子进程,无细粒度进度,沿用同步
  if(!(await cwConfirm("开始更新?会下载、校验后替换并重启(几秒,会话数据不丢)。"))) return;
  btn.disabled=true; btn.textContent="⏳ 更新中…";
  try{ const r=await api(endpoint,{method:"POST",body:"{}"});
    if(r.ok){ btn.textContent="✓ 重启中…"; setTimeout(()=>location.reload(),4800); }
    else { btn.disabled=false; btn.textContent="✗ 重试"; alert("更新失败:\n"+(r.error||r.output||"未知错误")); }
  }catch(e){ btn.disabled=false; btn.textContent="✗ 重试"; alert("更新出错: "+e.message); }
}
// 界面更新进度:启动异步作业 → 每 400ms 轮询进度 → 画下载/校验/应用进度条 → 完成自动刷新
async function guiUpdateWithProgress(box){
  box.innerHTML='<div class="updprog"><div class="updbar"><div class="updfill"></div></div><div class="updtxt">开始…</div></div>';
  const fill=box.querySelector(".updfill"), txt=box.querySelector(".updtxt");
  let start; try{ start=await api("/api/update/gui/apply",{method:"POST",body:"{}"}); }
  catch(e){ txt.innerHTML='<span class="st err">启动失败:'+esc(e.message)+'</span>'; return; }
  if(start && start.error){ txt.innerHTML='<span class="st err">'+esc(start.error)+'</span>'; return; }
  const LAB={checking:"检查中",downloading:"下载中",verifying:"校验签名/完整性",applying:"应用中",restarting:"重启中"};
  const mb=n=>((n||0)/1048576).toFixed(1);
  const poll=setInterval(async()=>{
    let p; try{ p=await api("/api/update/gui/progress"); }catch(e){ return; }
    if(p.phase==="downloading"){ fill.style.width=(p.pct||0)+"%"; txt.textContent=`下载中 ${p.pct||0}%  (${mb(p.downloaded)}/${mb(p.total)} MB)`; }
    else if(!p.done){ fill.style.width="100%"; txt.textContent=(LAB[p.phase]||p.phase||"处理中")+"…"; }
    if(p.done){
      clearInterval(poll);
      if(p.error){ fill.classList.add("err"); txt.innerHTML='<span class="st err">更新失败:'+esc(p.error)+'</span>'; }
      else { fill.style.width="100%"; txt.textContent="✓ 更新完成 "+(p.version||"")+",重启中…"; setTimeout(()=>location.reload(),4500); }
    }
  },400);
}

  const b=$("#sidebarToggle"); if(!b) return;

  b.classList.toggle("on", mobile ? !!open : !!collapsed);

async function cmpLoadHistory(prov,tid){   // 拉某栏 thread 全部 item,渲染成问答气泡(过程/工具项略过,回看以对话为主)
  const b=$("#cmpb-"+CSS.escape(prov)); if(b) b.innerHTML='<div class="cmpmsg a sysnote">· 载入历史…</div>';
  if(!tid){ if(b) b.innerHTML=""; return; }
  try{
    const rec=await (await fetch(url(`/cmp/${prov}/v1/threads/${tid}`))).json();
    CMP.seq[prov]=rec.latest_seq||0;
    if(b) b.innerHTML="";
    let n=0;
    for(const it of (rec.items||[])){
      const k=it.kind||"", txt = it.text!=null?it.text : (it.detail!=null?it.detail : (it.summary||""));
      if(k==="user_message"||k==="user"){ cmpAddMsg(prov,"u",esc(txt.replace(/^【本机网络环境[\s\S]*?】\s*/,""))); n++; }   // 旧会话存进去的 prompt 可能带历史遗留的网络指引前缀,显示时去掉
      else if(k==="agent_message"){ cmpAddMsg(prov,"a",'<span class="ans md">'+md(txt)+'</span>'); n++; }
    }
    if(!n) cmpAddMsg(prov,"a sysnote","(无历史内容)");
  }catch(e){ if(b) b.innerHTML=""; cmpAddMsg(prov,"a err","✗ 载入历史失败:"+esc(e.message||"")); }
}

  await Promise.all(Object.entries(CMP.threads).map(([prov,tid])=>fetch(url(`/cmp/${prov}/v1/threads/${tid}`),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({auto_approve:CMP.autoApprove, allow_shell:CMP.allowShell})}).catch(()=>{})));
}
function cmpToggleAuto(){ CMP.autoApprove=!CMP.autoApprove; renderCmpToggles(); cmpApplyFlags(); }
function cmpToggleShell(){ CMP.allowShell=!CMP.allowShell; if(CMP.allowShell) CMP.autoApprove=true; renderCmpToggles(); cmpApplyFlags(); }   // 对比无逐栏审批 UI:开 Shell 自动连带开自动批准
function renderCmpChips(){
  const box=$("#cmpChips");
  const maxed=CMP.maxed;   // 放大态:顶部 chips 变书签页/tab,在已选模型间点击切换
  box.classList.toggle("tabmode", !!maxed);
  box.innerHTML=PROVIDERS.map(p=>{
    const on=CMP.sel.has(p.id), nokey=!p.oauth && !CMP.keyed[p.id];
    const isTab=maxed===p.id;                 // 当前正在看的那栏 = 高亮 tab
    const dim=maxed && !on;                   // 放大态下,未参与对比的模型置灰(不可切换)
    const tip=maxed ? (on?'点击切到这个模型':'未参与本次对比') : (nokey?'未配置 key':'');
    return `<span class="cmpchip ${on?'on':''} ${nokey?'nokey':''} ${isTab?'tab':''} ${dim?'dim':''}" data-p="${p.id}" title="${tip}">${PROV_SHORT[p.id]||p.name}${nokey?' ⚠':''}</span>`;
  }).join("");
  box.querySelectorAll(".cmpchip").forEach(el=>el.onclick=()=>{
    const id=el.dataset.p;
    const p=PROVIDERS.find(x=>x.id===id)||{};
    const nokey=!p.oauth && !CMP.keyed[id];
    // 放大(tab)态:只在已选模型间切换视图,不改勾选;点当前 tab 则退回并排
    if(CMP.maxed){
      if(!CMP.sel.has(id)) return;            // 未参与对比的 chip 不响应
      if(CMP.maxed===id){ toggleMax(id); renderCmpChips(); return; }   // 点当前 tab → 退出放大回并排
      cmpSwitchTab(id); return;
    }
    // 并排态:chip = 勾选/取消该模型列(原行为)
    if(nokey && !CMP.sel.has(id)){
      if(p.cmpKeyOnly) openModelSwitch(id);
      else alert((PROV_SHORT[id]||id)+" 还没配置 key");
      return;
    }
    if(CMP.sel.has(id)){ if(CMP.sel.size>1) CMP.sel.delete(id); } else CMP.sel.add(id);
    renderCmpChips(); renderCmpCols();
  });
}
function cmpSwitchTab(id){   // 放大态下把可见栏切到 id(书签页切换),其余隐藏
  CMP.maxed=id;
  $("#cmpCols").querySelectorAll(".cmpcol").forEach(c=>{
    const me=c.dataset.p===id; c.classList.toggle("max",me); c.classList.toggle("hide",!me);
  });
  renderCmpChips();
  const b=$("#cmpb-"+CSS.escape(id)); if(b) b.scrollTop=b.scrollHeight;   // 切过去滚到最新
}

      `<div class="cmprunbar" id="cmprun-${p.id}" hidden><span class="pulse"></span><span class="txt">启动中</span><button class="cmpstopbar" title="停止这一栏当前回答">停止</button></div>`+
      `<div class="cmpcol-b" id="cmpb-${p.id}"></div>`+
      `<div class="cmpcatt" id="cmpcatt-${p.id}" hidden></div>`+
      `<div class="cmpcol-f"><button class="cmpcolattach" id="cmpcattbtn-${p.id}" title="给 ${nm} 加附件（只随这一栏的追问发出）">📎</button><input type="file" class="cmpcolfile" id="cmpcfile-${p.id}" multiple hidden><textarea class="cmpcolin" id="cmpin-${p.id}" rows="1" wrap="soft" placeholder="只追问 ${nm}…（Enter 发送）"></textarea><button class="cmpcolsend" id="cmpcsend-${p.id}" title="只发给 ${nm}（单独继续这个对话）">→</button></div>`;
    box.appendChild(d);
    const sel=d.querySelector(".cmpmodelsel"); if(sel){ sel.addEventListener("click",e=>e.stopPropagation()); sel.addEventListener("change",e=>{ e.stopPropagation(); cmpSetModel(p.id, e.target.value); }); }
    const mi=d.querySelector(".cmpmodelinput"); if(mi){ const apply=()=>{ const v=mi.value.trim(); if(v) cmpSetModel(p.id,v); else mi.value=(CMP.modelPrefs&&CMP.modelPrefs[p.id])||CMP_FORCE_MODEL[p.id]||""; }; mi.addEventListener("click",e=>e.stopPropagation()); mi.addEventListener("blur",apply); mi.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); mi.blur(); } }); }
    const esl=d.querySelector(".cmpeffortsel"); if(esl){ esl.addEventListener("click",e=>e.stopPropagation()); esl.addEventListener("change",e=>{ e.stopPropagation(); cmpSetEffort(p.id, e.target.value); }); }
    d.querySelector(".cmpcol-h").onclick=(e)=>{ if(e.target.closest(".cmpstop")||e.target.closest(".cmpmodelsel")||e.target.closest(".cmpmodelinput")||e.target.closest(".cmpeffortsel")) return; toggleMax(p.id); };   // 点头部=最大化;点「停止」/模型控件 不触发
    d.querySelector(".cmpstop").onclick=(e)=>{ e.stopPropagation(); cmpStop(p.id); };
    d.querySelector(".cmpstopbar").onclick=(e)=>{ e.stopPropagation(); cmpStop(p.id); };
    const ci=d.querySelector(".cmpcolin"), cs=d.querySelector(".cmpcolsend");

    ci.addEventListener("input",()=>{ ci.style.height="auto"; ci.style.height=Math.min(ci.scrollHeight,90)+"px"; });
    const catBtn=d.querySelector(".cmpcolattach"), catFile=d.querySelector(".cmpcolfile");   // 每栏独立附件:📎 → 选文件;贴文件也进该栏
    if(catBtn&&catFile){ catBtn.onclick=()=>catFile.click(); catFile.onchange=e=>{ if(e.target.files.length) cmpColUpload(p.id,[...e.target.files]); e.target.value=""; }; }

function cmpSetProgress(prov, text){   // 长任务可见进度:阶段 / 步数 / 秒表 / 最近工具或等待状态
  const bar=$("#cmprun-"+CSS.escape(prov));
  if(!bar) return;
  bar.hidden=false;
  const t=bar.querySelector(".txt"); if(t) t.textContent=text||"运行中";
}
function cmpClearProgress(prov){
  const bar=$("#cmprun-"+CSS.escape(prov));
  if(bar){ bar.hidden=true; const t=bar.querySelector(".txt"); if(t) t.textContent=""; }
}
// 单栏运行态:跑时显示「停止」+ 禁该栏追问框,完成后复原
function cmpSetRunning(prov,on){
  CMP.running[prov]=on;
  const stop=$("#cmpstop-"+CSS.escape(prov)); if(stop) stop.hidden=!on;
  const cs=$("#cmpcsend-"+CSS.escape(prov)); if(cs) cs.disabled=on;
  if(on) cmpSetProgress(prov,"启动中"); else cmpClearProgress(prov);
  cmpSyncSendUI();   // 刷新「引导」按钮显隐(列停了就收起)
}
async function cmpStop(prov){   // 暂停单个对话:中断该栏当前 turn(中断后 SSE 会发 completed/interrupted → finish 收尾)
  const tid=CMP.threads[prov]; let turn=CMP.turn[prov];
  const st=$("#cmpst-"+CSS.escape(prov));
  CMP.cancelled[prov]=true;
  if(!turn && tid){ try{ const rec=await (await fetch(url(`/cmp/${prov}/v1/threads/${tid}`))).json(); const turns=rec.turns||[]; turn=(rec.thread||{}).latest_turn_id||(turns[turns.length-1]||{}).id; }catch(e){} }
  if(!tid||!turn){ if(st) st.textContent="⏸"; cmpSetProgress(prov,"正在停止"); return; }
  cmpSetProgress(prov,"正在停止");
  try{ await fetch(url(`/cmp/${prov}/v1/threads/${tid}/turns/${turn}/interrupt`),{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"}); }catch(e){}
  if(st) st.textContent="⏸ 已暂停";
}
async function cmpStopAll(){   // 全局取消:中断正在跑的列,同时清掉所有未发送队列
  const active=[...CMP.sel].filter(p=>CMP.running[p]||CMP.dispatching[p]);
  const queued=cmpQueuedGroups().length;
  Object.keys(CMP.provQ||{}).forEach(p=>{ CMP.provQ[p]=[]; });
  cmpSyncSendUI();
  if(!active.length){ if(queued) cwToast("已清空排队"); return; }
  await Promise.allSettled(active.map(p=>cmpStop(p)));
}
async function cmpRunOne(prov){   // 只追问这一个模型(单独继续该栏对话)
  const inp=$("#cmpin-"+CSS.escape(prov)); if(!inp) return;
  const raw=(inp.value||"").trim();
  const hasAtt=!!(CMP.colAttach&&CMP.colAttach[prov]&&CMP.colAttach[prov].length);
  if((!raw && !hasAtt) || CMP.running[prov] || CMP.dispatching[prov]) return;   // 无字且无附件,或该栏在跑/派发中→拦住
  CMP.dispatching[prov]=true;   // 同步占位锁:在 await 之前就置上,关闭"重复 Enter"窗口
  inp.value=""; inp.style.height="auto";
  const text=cmpColWithAttach(prov, raw);   // 折入该栏附件路径 + 清空该栏附件条
  cmpAddMsg(prov,"u",esc(text));
  try{
    let ensured={}; try{ ensured=await api("/api/compare/ensure",{method:"POST",body:JSON.stringify({providers:[prov]})}); }catch(e){}
    await cmpRun(prov,text,ensured[prov]);
  } finally { CMP.dispatching[prov]=false; cmpMaybeFlush(); }   // 该栏结束→若有排队的全栏发送在等,顺手 flush
}

  if(!(await cwConfirm("重启所有对比后端?会清空各栏当前历史,并用最新配置 / key 重新连接各模型(几秒)。\n用于:某个模型栏回答的不是它本人(回退成了 DeepSeek)。"))) return;

  try{ await api("/api/compare/reset",{method:"POST",body:"{}"}); }catch(e){}
  CMP.sessionId=null;   // 重启后端=清历史→开新会话边界
  CMP.threads={}; CMP.seq={}; CMP.turn={}; CMP.running={}; CMP.busy=false; CMP.sendQ=[]; CMP.provQ={}; CMP.dispatching={}; CMP.cancelled={}; clearAttachmentList(CMP.attachments); Object.keys(CMP.colAttach||{}).forEach(pv=>{clearAttachmentList(CMP.colAttach[pv]); cmpColRenderAttach(pv);}); cmpSyncSendUI(); cmpRenderAttach();
  [...CMP.sel].forEach(p=>{ const b=$("#cmpb-"+CSS.escape(p)); if(b) b.innerHTML=""; const s=$("#cmpst-"+CSS.escape(p)); if(s) s.textContent=""; const stop=$("#cmpstop-"+CSS.escape(p)); if(stop) stop.hidden=true; cmpClearProgress(p); const cs=$("#cmpcsend-"+CSS.escape(p)); if(cs) cs.disabled=false; });
  if(btn){ btn.disabled=false; btn.textContent="↻ 重启后端"; }
  const i=$("#cmpInput"); if(i) i.focus();
}

  [...CMP.sel].forEach(p=>{ const b=$("#cmpb-"+CSS.escape(p)); if(b) b.innerHTML=""; const s=$("#cmpst-"+CSS.escape(p)); if(s) s.textContent=""; const stop=$("#cmpstop-"+CSS.escape(p)); if(stop) stop.hidden=true; cmpClearProgress(p); const cs=$("#cmpcsend-"+CSS.escape(p)); if(cs) cs.disabled=false; });

function toggleMax(p){
  const cols=$("#cmpCols").querySelectorAll(".cmpcol");
  if(CMP.maxed===p){ CMP.maxed=null; cols.forEach(c=>c.classList.remove("max","hide")); }
  else { CMP.maxed=p; cols.forEach(c=>{ const me=c.dataset.p===p; c.classList.toggle("max",me); c.classList.toggle("hide",!me); }); }
  renderCmpChips();   // 进/出放大 → 顶部 chips 同步进入/退出 tab 模式并高亮当前
}
function cmpAddMsg(p,cls,html){ const b=$("#cmpb-"+CSS.escape(p)); if(!b) return null; const d=document.createElement("div"); d.className="cmpmsg "+cls; d.innerHTML=html; b.appendChild(d); b.scrollTop=b.scrollHeight; return d; }
function cmpProvBusy(p){ return !!(CMP.running[p]||CMP.dispatching[p]); }
function cmpAnyBusy(){ return Object.values(CMP.running).some(Boolean) || Object.values(CMP.dispatching).some(Boolean); }
function cmpQueueFor(prov,item){ (CMP.provQ||(CMP.provQ={}))[prov]=(CMP.provQ[prov]||[]); CMP.provQ[prov].push(item); }
function cmpQueuedGroups(){   // 把 provider 维度队列聚回「用户发的每一条」,用于顶部队列条展示/取消
  const by=new Map();
  Object.entries(CMP.provQ||{}).forEach(([prov,q])=>(q||[]).forEach(item=>{
    if(!by.has(item.id)) by.set(item.id,{item,provs:[]});
    by.get(item.id).provs.push(prov);
  }));
  return [...by.values()];
}
function cmpCancelQueued(id){ Object.keys(CMP.provQ||{}).forEach(p=>{ CMP.provQ[p]=(CMP.provQ[p]||[]).filter(it=>it.id!==id); }); cmpSyncSendUI(); }
function cmpValidProviders(provs){
  return provs.filter(p=>{
    const meta=PROVIDERS.find(x=>x.id===p)||{};
    if(!meta.oauth && !CMP.keyed[p]){
      cmpAddMsg(p,"a err",`✗ ${(PROV_SHORT[p]||p)} 还没配置 key。点击左下「🧠 模型」→「${meta.name||p}」填写 API key。`);
      const s=$("#cmpst-"+CSS.escape(p)); if(s) s.textContent="未配置";
      return false;
    }
    return true;
  });
}
function cmpEnsureSession(item,provs){
  if(CMP.sessionId) return;
  CMP.sessionId="cmps_"+Math.random().toString(36).slice(2,9)+state.cmpSessions.length;
  const topic=((item.disp||"").replace(/\s*📎.*$/,"").trim().slice(0,80))||"(无标题对比)";
  cmpSessionUpsert({id:CMP.sessionId, topic, ts:Date.now(), providers:provs.slice(), threads:{}});
}
let _cmpItemSeq=0;
function cmpMakeItem(sent,disp){ return {id:"cmpq_"+Date.now()+"_"+(++_cmpItemSeq), sent, disp}; }
// 同步发送区 UI:任一栏在跑时按钮显「发送中…/排队 N」,但按钮不禁用(点/Enter 都能继续排队到忙的列)
function cmpSyncSendUI(){
  const btn=$("#cmpSendBtn"), ta=$("#cmpInput"), groups=cmpQueuedGroups(), q=groups.length, active=cmpAnyBusy();
  if(btn) btn.textContent=active?(q?("发送中·排队"+q):"发送中…"):(q?("排队"+q):"发送");
  if(ta) ta.placeholder=active?"完成的模型会先发;忙的模型自动排队…":"输入一个问题,同时发给所有选中的模型…（Enter 发送 · Shift+Enter 换行）";
  const qb=$("#cmpQueue");   // 队列条:把排队中的问题原文显示出来,每条可单独 ✕ 撤销
  if(qb){
    if(!q){ qb.hidden=true; qb.innerHTML=""; }
    else{
      qb.hidden=false;
      qb.innerHTML='<span class="cmpqlbl">⏳ 分列排队（空闲模型会先发）：</span>'+
        groups.map(g=>{ const d=g.item.disp||""; const names=g.provs.map(p=>PROV_SHORT[p]||p).join("/"); return `<span class="cmpqchip" title="${esc(d)} · 等待 ${esc(names)}"><span>${esc(d)} · ${esc(names)}</span><b data-id="${esc(g.item.id)}" title="取消这条未发送部分">✕</b></span>`; }).join("");
      qb.querySelectorAll(".cmpqchip b").forEach(x=>x.onclick=()=>cmpCancelQueued(x.dataset.id));
    }
  }
  const sb=$("#cmpSteerBtn"); if(sb) sb.hidden=![...CMP.sel].some(p=>CMP.running[p]&&CMP.turn[p]);   // 有正在跑(且有活动 turn)的列才显「引导」
  const stopAll=$("#cmpStopAllBtn");
  if(stopAll){ stopAll.hidden=!(active||q); stopAll.textContent=active?"停止全部":"清排队"; }
}
// 引导:把输入插进所有正在跑的列的当前 turn(steering),实时改变它们的输出。全模型支持(实测 deepseek/gpt 都被引导停)。
async function cmpSteer(){
  const ta=$("#cmpInput"); const text=(ta.value||"").trim();
  if(!text) return;
  const running=[...CMP.sel].filter(p=>CMP.running[p] && CMP.threads[p] && CMP.turn[p]);   // 正在跑且有活动 turn 的列
  if(!running.length){ cwToast("没有正在运行的对话可引导;直接「发送」即可"); return; }
  ta.value=""; ta.style.height="auto";
  running.forEach(p=>cmpAddMsg(p,"u steer",'⤵ 引导:'+esc(text)));   // 显示引导气泡
  await Promise.allSettled(running.map(p=>
    fetch(url(`/cmp/${p}/v1/threads/${CMP.threads[p]}/turns/${CMP.turn[p]}/steer`),
      {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:text})})
      .then(r=>{ if(!r.ok) return r.text().then(t=>{throw new Error(t.slice(0,80))}); })
      .catch(e=>cmpAddMsg(p,"a err","✗ 引导失败:"+esc(String(e&&e.message||e))))
  ));
}
async function cmpSend(){
  const ta=$("#cmpInput"); const raw=(ta.value||"").trim();
  if(!raw && !CMP.attachments.length) return;   // 有字或有附件就能发
  ta.value=""; ta.style.height="auto";
  const atts=CMP.attachments.slice(); CMP.attachments=[]; cmpRenderAttach();   // 取走本轮附件并清空附件栏
  atts.forEach(revokeAttachmentPreview);
  // sent=发给模型(折入文件路径,让各栏 read_file 读);disp=气泡显示(原文 + 附件名)
  const sent=atts.length ? `我上传了以下文件,请先用 read_file 读取再回答:\n${atts.map(a=>"- "+a.path).join("\n")}\n\n${raw}`.trim() : raw;
  const disp=raw+(atts.length?("  📎 "+atts.map(a=>a.name).join(", ")):"");
  const item=cmpMakeItem(sent,disp);
  const provs=cmpValidProviders([...CMP.sel]);
  if(!provs.length){ cmpSyncSendUI(); return; }
  cmpEnsureSession(item,provs);
  const ready=[], queued=[];
  provs.forEach(p=>cmpProvBusy(p)?queued.push(p):ready.push(p));
  queued.forEach(p=>cmpQueueFor(p,item));
  if(ready.length) cmpDispatch(item,ready);
  cmpSyncSendUI();
}
async function cmpDispatch(item,provs){   // 把同一条用户问题发给指定的一组空闲 provider;忙的 provider 会由各自队列稍后补发
  provs=cmpValidProviders((provs||[]).filter(p=>CMP.sel.has(p)&&!cmpProvBusy(p)));
  if(!provs.length){ cmpSyncSendUI(); return; }
  cmpEnsureSession(item,provs);
  provs.forEach(p=>{ CMP.dispatching[p]=true; cmpAddMsg(p,"u",esc(item.disp)); const s=$("#cmpst-"+CSS.escape(p)); if(s) s.textContent="启动…"; });   // 立即显示用户气泡 + 启动中,不等后端
  cmpSyncSendUI();
  try{
    let ensured={}; try{ ensured=await api("/api/compare/ensure",{method:"POST",body:JSON.stringify({providers:provs})}); }catch(e){}
    await Promise.allSettled(provs.map(p=>cmpRun(p,item.sent,ensured[p]).catch(e=>cmpAddMsg(p,"a err","✗ "+esc(String(e&&e.message||e)))).finally(()=>{ CMP.dispatching[p]=false; cmpRunNextFor(p); })));
  } finally { cmpSyncSendUI(); }
}
// ── 对比附件(主输入框:文件发给所有栏)── 上传到 /api/upload 拿文件系统路径,各 provider 后端都能 read_file 读
async function cmpUploadFiles(files){
  for(const f of files){
    if(f.size>50*1024*1024){ cwToast("⚠ "+f.name+" 超过 50MB,跳过"); continue; }
    try{
      const buf=await f.arrayBuffer();
      const r=await fetch(url("/api/upload"),{method:"POST",headers:{...auth,"X-Filename":encodeURIComponent(f.name),"X-Upload-Scope":CMP.sessionId?("cmp_"+CMP.sessionId):"cmp"},body:buf});
      const d=await r.json();
      if(d.path) CMP.attachments.push(uploadAttachmentRecord(f,d)); else cwToast("⚠ 上传失败: "+(d.error||f.name));
    }catch(e){ cwToast("⚠ 上传失败: "+e.message); }
  }
  cmpRenderAttach();
}
function cmpRenderAttach(){   // 附件栏(输入框上方):chip + ✕ 移除
  const bar=$("#cmpAttachBar"); if(!bar) return;
  bar.innerHTML=""; bar.hidden=!CMP.attachments.length;
  CMP.attachments.forEach((a,i)=>{
    bar.appendChild(attachmentChip(a,()=>{ revokeAttachmentPreview(a); CMP.attachments.splice(i,1); cmpRenderAttach(); }));
  });
}
function cmpRunNextFor(prov){
  if(!CMP.sel.has(prov)){ if(CMP.provQ&&CMP.provQ[prov]) CMP.provQ[prov]=[]; cmpSyncSendUI(); return; }
  if(cmpProvBusy(prov)){ cmpSyncSendUI(); return; }
  const q=(CMP.provQ&&CMP.provQ[prov])||[];
  const next=q.shift();
  if(next) cmpDispatch(next,[prov]);
  else cmpSyncSendUI();
}
function cmpMaybeFlush(){ [...CMP.sel].forEach(cmpRunNextFor); cmpSyncSendUI(); }
async function cmpRun(prov,text,ens){
  const st=$("#cmpst-"+CSS.escape(prov));   // 用户气泡已在 cmpSend 里即时加过
  if(ens && ens.ok===false){ cmpAddMsg(prov,"a err","✗ 后端启动失败:"+esc(ens.error||"")); if(st)st.textContent="✗"; return; }
  if(CMP.cancelled[prov]){ if(st)st.textContent="⏸ 已取消"; cmpClearProgress(prov); CMP.cancelled[prov]=false; return; }
  const cb=$("#cmpb-"+CSS.escape(prov));
  // 过程块:思考 + 工具/命令调用都收进来,默认折叠,点头部展开;答案气泡始终可见在下面
  const proc=document.createElement("div"); proc.className="cmpproc collapsed";
  proc.innerHTML=`<div class="cmpproc-h"><span class="car">▸</span> ⚙️ 过程 <span class="cnt">0</span> 步</div><div class="cmpproc-b"><div class="rsn"></div></div>`;
  if(cb) cb.appendChild(proc);
  proc.querySelector(".cmpproc-h").onclick=()=>proc.classList.toggle("collapsed");
  const rsn=proc.querySelector(".rsn"), procCnt=proc.querySelector(".cnt"), procBody=proc.querySelector(".cmpproc-b");
  let steps=0, lastStep="", pushProgress=()=>{};
  const addStep=(t)=>{ const d=document.createElement("div"); d.className="cmpstep"; d.textContent=t; procBody.appendChild(d); procCnt.textContent=(++steps); lastStep=String(t||"").replace(/\s+/g," ").slice(0,120); pushProgress(); const x=$("#cmpb-"+CSS.escape(prov)); if(x) x.scrollTop=x.scrollHeight; };
  const A=cmpAddMsg(prov,"a",`<span class="ans"></span><span class="cur">▍</span>`);
  if(!A){ if(st)st.textContent="✗ 此栏未就绪"; cmpSetRunning(prov,false); return; }   // 该 provider 没渲染出列(#cmpb 缺)→ 优雅跳过,绝不抛错连累 Promise.all
  const ans=A.querySelector(".ans"), cur=A.querySelector(".cur");
  if(st)st.textContent="思考…";
  try{
    if(!CMP.threads[prov]){
      const t=await (await fetch(url(`/cmp/${prov}/v1/threads`),{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"})).json();   // 不前端钉 model,由服务端按 model_prefs 注入(claude-code→sonnet 路由键,其它→所选变体)
      CMP.threads[prov]=t.id; CMP.seq[prov]=0;
      api("/api/pin-thread",{method:"POST",body:JSON.stringify({tid:t.id,provider:prov})}).catch(()=>{});   // 锁定到本 provider → 主窗口侧栏正确标 GLM/GPT,不再误显默认 DeepSeek
      markCmp(t.id);   // 登记为对比 thread → 主窗口侧栏归入「多模型对比」组,不灌进普通对话列表
      cmpSessionRecordThread(prov,t.id);   // 记进当前对比会话 → 侧栏会话行能点回来恢复这一栏
    }
    const tid=CMP.threads[prov];
    cmpSetRunning(prov,true);
    // 每轮按当前开关设会话标志(自动批准 / 允许 shell)→ 让模型能联网取数、跳出沙箱
    await fetch(url(`/cmp/${prov}/v1/threads/${tid}`),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({auto_approve:CMP.autoApprove, allow_shell:CMP.allowShell})}).catch(()=>{});
    if(CMP.cancelled[prov]){ if(st)st.textContent="⏸ 已取消"; cmpSetRunning(prov,false); return; }
    // ★ since_seq 取「发 turn 前的当前 latest_seq」,只听本轮新事件、绝不重放历史——
    //   否则追问时会把上一轮的 turn.completed/旧增量重放进来,导致 ✓0s 误收尾、流式不同步、答案吞掉。
    let since=CMP.seq[prov]||0;
    try{ const ti=await (await fetch(url(`/cmp/${prov}/v1/threads/${tid}`))).json(); if(typeof ti.latest_seq==="number") since=ti.latest_seq; }catch(e){}
    // 不再往用户 prompt 里前置任何网络指引——它会被模型复述、或在恢复历史时显示出来(felix 嫌它显示)。
    // fake-ip 下「fetch_url 被拦 → 用 curl / web_search」的引导已写在 compare-research skill 的系统提示里(server.py ~876 行),
    // 对模型不可见地生效;非 shell 工具 / MCP / web_search 始终可用,Shell 开关只额外控制 exec_shell(上面 PATCH 的 allow_shell)。
    const sendText=text;
    let myTurn=null;
    try{ const tr=await (await fetch(url(`/cmp/${prov}/v1/threads/${tid}/turns`),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:sendText})})).json();
      myTurn=(tr&&((tr.turn&&tr.turn.id)||tr.id))||null;   // 本轮 turn id:SSE 只认本轮事件,重放的旧轮一律忽略
      if(myTurn) CMP.turn[prov]=myTurn;
    }catch(e){}
    if(CMP.cancelled[prov] && myTurn){ await fetch(url(`/cmp/${prov}/v1/threads/${tid}/turns/${myTurn}/interrupt`),{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"}).catch(()=>{}); }
    await new Promise(resolve=>{
      const es=new EventSource(url(`/cmp/${prov}/v1/threads/${tid}/events?since_seq=${since}`));
      let done=false, sawTool=false, grace=null, phase="思考中", tick=null, poll=null, idle=null; const t0=Date.now();
      const secs=()=>Math.round((Date.now()-t0)/1000);
      const finish=(failed)=>{ if(done)return; done=true; clearTimeout(grace); clearTimeout(idle); clearInterval(tick); clearInterval(poll); try{es.close()}catch(e){} cmpSetRunning(prov,false); CMP.turn[prov]=null; CMP.cancelled[prov]=false; if(cur)cur.remove(); if(ans&&!failed&&ans.textContent.trim()&&!ans.classList.contains("md")){ const _rawAns=ans.textContent; try{ ans.innerHTML=md(_rawAns); ans.classList.add("md"); }catch(e){} try{ augmentOptions(ans.parentElement, _rawAns, "#cmpInput"); }catch(e){} }   // 收尾把流式纯文本整体重渲染成 markdown(跟单窗口一致);失败/已渲染则不动;末尾选项清单→可点选项(填入 #cmpInput)
        if(steps===0&&!rsn.textContent.trim()&&proc.parentNode)proc.remove(); if(A&&!ans.textContent.trim()&&!failed)A.remove(); if(st&&!/^[✓✗⏸⏱]/.test(st.textContent))st.textContent="✓ "+secs()+"s"; resolve(); };
      const syncFromThread=async()=>{
        if(done) return false;
        try{
          const rec=await (await fetch(url(`/cmp/${prov}/v1/threads/${tid}`))).json();
          if(typeof rec.latest_seq==="number") CMP.seq[prov]=Math.max(CMP.seq[prov]||0, rec.latest_seq);
          const turns=rec.turns||[];
          const turn=myTurn ? turns.find(t=>t.id===myTurn) : turns[turns.length-1];
          const status=(turn&&turn.status)||(rec.thread||{}).latest_turn_status||"";
          const item=[...(rec.items||[])].reverse().find(it=>it.kind==="agent_message" && (!myTurn || it.turn_id===myTurn) && it.detail);
          if(item&&item.detail) ans.textContent=preferLongerText(ans.textContent,item.detail);
          if(isTurnDone(status)){ finish(normTurnStatus(status)!=="completed"); return true; }
          if(isTurnRunning(status)){ setPhase(ans.textContent.trim()?"同步中":"等待模型"); bump(); }
        }catch(e){}
        return false;
      };
      // 空闲超时只做软提示,不再直接判失败收尾。部分模型/工具长时间无 SSE chunk,但后端仍在跑;靠 thread 直查兜底收尾。
      const onIdle=()=>{ if(done)return; setPhase("等待模型"); syncFromThread(); bump(); };
      const bump=()=>{ clearTimeout(idle); idle=setTimeout(onIdle, 180000); };
      const statusText=()=>phase+(steps?" · "+steps+"步":"")+" · "+secs()+"s";   // 工作状态:阶段 · 已跑步数 · 已用秒(步数涨/秒在跳=还在干活)
      const progressText=()=>statusText()+(lastStep?" · 最近:"+lastStep:"");
      pushProgress=()=>{ if(st&&!/^[✓✗⏸⏱]/.test(st.textContent)) st.textContent=statusText(); cmpSetProgress(prov,progressText()); };
      const setPhase=(p)=>{ phase=p; pushProgress(); };
      tick=setInterval(()=>{ if(!done) pushProgress(); },1000);   // 心跳:每秒刷新工作状态
      poll=setInterval(syncFromThread,4000);   // 兜底:SSE 停顿/漏 turn.completed 时直查当前 thread,不依赖 summary limit/cache
      const scroll=()=>{ const b=$("#cmpb-"+CSS.escape(prov)); if(b) b.scrollTop=b.scrollHeight; };
      setPhase("思考中");
      const isTool=kind=>kind && !["agent_message","agent_reasoning","user_message"].includes(kind);
      const onEv=(k,e)=>{   // SSE 是命名事件,逐个 addEventListener(onmessage 只收匿名事件,收不到)
        let ev; try{ ev=JSON.parse(e.data); }catch{ return; }
        if(myTurn && ev.turn_id && ev.turn_id!==myTurn) return;   // 不是本轮的事件(重放的旧轮)→ 忽略,杜绝 ✓0s 误收尾 / 流式不同步 / 吞答案
        bump();   // 每收到一个事件就重置空闲计时:模型在干活就别超时
        if(ev.seq) CMP.seq[prov]=ev.seq;
        const pl=ev.payload||{};
        if(k==="turn.started"){ CMP.turn[prov]=ev.turn_id||(pl.turn||{}).id||CMP.turn[prov]; cmpSyncSendUI(); }   // 记下 turn_id 供「停止」中断 + 引导;turn 活了刷「引导」按钮
        else if(k==="item.delta"){
          if(pl.kind==="agent_message"){ if(grace){clearTimeout(grace);grace=null;} ans.textContent+=pl.delta||""; setPhase("输出中"); scroll(); }
          else if(pl.kind==="agent_reasoning"){ rsn.textContent+=pl.delta||""; setPhase("思考中"); }   // 思考收进折叠的过程块,不挤占答案
        } else if(k==="item.started"){ const it=pl.item||{}; if(isTool(it.kind)){ lastStep=String(it.summary||it.kind||"工具调用").replace(/\s+/g," ").slice(0,120); setPhase("执行工具"); } }
        else if(k==="item.completed"){ const it=pl.item||{};
          if(it.kind==="agent_message"&&it.detail) ans.textContent=preferLongerText(ans.textContent, it.detail);
          else if(isTool(it.kind)){ sawTool=true; addStep("🔧 "+String(it.summary||it.kind).slice(0,140)); }   // 工具/命令活动→折叠的过程块
        }
        else if(k==="approval.required"){ const aid=pl.approval_id||pl.id||ev.approval_id; const tool=String(pl.tool_name||pl.command||pl.summary||"工具调用").slice(0,90);
          if(CMP.autoApprove && aid){ fetch(url(`/cmp/${prov}/v1/approvals/${aid}`),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({decision:"allow",remember:false})}).catch(()=>{}); addStep("🔧 自动批准:"+tool); }
          else addStep("🔒 需批准:"+tool+"(开「⚡自动批准」放行)");
        }
        else if(k==="item.failed"){ const it=pl.item||{}; const msg=String(it.detail||it.summary||"失败").replace(/\s+/g," ").slice(0,160);
          // 工具/命令失败只算"过程一步",agent 会重试/换招 → 不要当整轮失败把该栏收尾(否则吞掉后面真正的答案)。
          // 只有当 turn 真正结束(turn.completed/failed)且全程没拿到答案时才在那里收尾。
          if(isTool(it.kind)||!it.kind){ sawTool=true; addStep("🔧 ✗ "+msg); setPhase("重试中"); }
          else { rsn.textContent += (rsn.textContent?"\n":"")+"[失败] "+msg; }
        }
        else if(k==="turn.completed"||k==="turn.failed"||k==="turn.interrupted"){
          if(k==="turn.completed" && sawTool && !ans.textContent.trim()){ sawTool=false; setPhase("整理中"); clearTimeout(grace); grace=setTimeout(finish,6000); }  // 跑了工具还没文字答案→短暂等可能的后续总结轮(数据已在🔧行)
          else if(k==="turn.failed"){ if(!ans.textContent.trim()) ans.innerHTML='<span class="err">✗ 本轮失败(展开「过程」看详情)</span>'; if(st)st.textContent="✗"; finish(true); }   // 真正整轮失败才标 ✗
          else { if(k==="turn.interrupted"&&st)st.textContent="⏸ 已暂停"; finish(); }
        }
      };
      ["turn.started","item.started","item.delta","item.completed","item.failed","approval.required","turn.completed","turn.failed","turn.interrupted"].forEach(name=>es.addEventListener(name,e=>onEv(name,e)));
      es.onerror=()=>{ if(es.readyState===2){ setPhase("同步中"); syncFromThread(); } };
      bump();   // 起步先武装空闲计时(180s 无任何事件才判卡住);不再用死板的 240s 绝对超时切断长任务
    });
  }catch(e){ CMP.cancelled[prov]=false; if(ans) ans.innerHTML=`<span class="err">✗ ${esc(String(e&&e.message||e))}</span>`; if(cur)cur.remove(); if(st)st.textContent="✗"; cmpSetRunning(prov,false); CMP.turn[prov]=null; }
}
// 对比的 overlay HTML 在本 <script> 之后才解析 → 绑定必须等 DOMContentLoaded,否则 #cmpSendBtn 等还不存在,点了没反应
window.addEventListener("DOMContentLoaded",()=>{
  hydrateIcons();
  const IS_CMP_WIN = new URLSearchParams(location.search).get("compare")==="1";   // 本页是不是一个独立对比窗口
  const cb=$("#cmpbtn"); if(cb) cb.onclick=()=>openCompareWindow();   // 「⚖️ 对比」→ 每点开一个全新独立窗口(原生壳新 NSWindow),可同时跑多个;不再页内覆盖
  const cc=$("#cmpClose"); if(cc) cc.onclick=()=> IS_CMP_WIN ? window.close() : closeCompare();   // 专用对比窗口:退出=关窗;万一在主窗口(理论上不会)则只收覆盖层
  if(IS_CMP_WIN) (async ()=>{   // ?compare=1 即时进对比(覆盖层 CSS 已首帧前盖上,这里只填内容,不再等 200ms);带 ?session 则还原那场对比
    const sid=new URLSearchParams(location.search).get("session");
    if(sid){ try{ await loadCmpSessions(); }catch(e){} const s=state.cmpSessions.find(x=>x.id===sid); if(s){ restoreCompareSession(s); return; } }
    openCompare();
  })();
  const cn=$("#cmpNewBtn"); if(cn) cn.onclick=cmpNewChat;
  const cr=$("#cmpResetBtn"); if(cr) cr.onclick=cmpResetBackends;
  const cs=$("#cmpSendBtn"); if(cs) cs.onclick=cmpSend;
  const csb=$("#cmpSteerBtn"); if(csb) csb.onclick=cmpSteer;
  const cstop=$("#cmpStopAllBtn"); if(cstop) cstop.onclick=cmpStopAll;
  const ca=$("#cmpAutoTgl"); if(ca) ca.onclick=cmpToggleAuto;
  const csh=$("#cmpShellTgl"); if(csh) csh.onclick=cmpToggleShell;
  renderCmpToggles();
  const ci=$("#cmpInput"); if(ci){
    ci.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ if(e.isComposing||e.keyCode===229)return; e.preventDefault(); cmpSend(); }});
    ci.addEventListener("paste",e=>{ const fs=[...((e.clipboardData&&e.clipboardData.files)||[])]; if(fs.length){ e.preventDefault(); cmpUploadFiles(fs); } });   // 粘贴文件/图片 → 上传(纯文本粘贴照常)
  }
  const cab=$("#cmpAttachBtn"); if(cab) cab.onclick=()=>$("#cmpFileInput").click();
  const cfi=$("#cmpFileInput"); if(cfi) cfi.onchange=e=>{ if(e.target.files.length) cmpUploadFiles([...e.target.files]); e.target.value=""; };
  const cvw=$("#cmpView"); if(cvw){   // 拖拽文件到对比视图任意处 → 上传
    cvw.addEventListener("dragover",e=>{ if(e.dataTransfer&&[...e.dataTransfer.types].includes("Files")) e.preventDefault(); });
    cvw.addEventListener("drop",e=>{ if(e.dataTransfer&&e.dataTransfer.files.length){ e.preventDefault(); cmpUploadFiles([...e.dataTransfer.files]); } });
  }
});

#cmpCols{flex:1;display:flex;gap:1px;background:var(--line);overflow:hidden}
.cmpcol{flex:1 1 0;min-width:0;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.cmpcol.max{flex:1 1 100%}
/* 排列方式:横列(默认 flex row)/ 竖列 / 田字格 */
#cmpCols.lay-col{flex-direction:column}
#cmpCols.lay-grid{display:grid;grid-template-columns:repeat(2,1fr);grid-auto-rows:1fr}
#cmpCols.lay-grid .cmpcol{min-height:0}
#cmpLayout{display:flex;gap:2px;margin-left:auto}
.laybtn{border:1px solid var(--line);background:var(--panel2);color:var(--dim);border-radius:6px;width:26px;height:24px;cursor:pointer;font-size:12px;line-height:1;padding:0} .laybtn:hover{color:var(--accent);border-color:var(--accent)} .laybtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.cmpcol.hide{display:none}
.cmpcol-h{padding:8px 12px;border-bottom:1px solid var(--line);background:var(--panel);font-size:12px;font-weight:600;color:var(--txt);display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap}
.cmpcol-h .st{font-size:11px;font-weight:400;color:var(--faint);margin-left:auto}
.cmpcol-h .cmpmodel{font-size:10px;font-weight:500;color:var(--accent);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;white-space:nowrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
select.cmpmodelsel,select.cmpeffortsel{cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:6px} select.cmpmodelsel:hover,select.cmpeffortsel:hover{border-color:var(--accent)}
input.cmpmodelinput{width:104px;min-width:78px;outline:none}
input.cmpmodelinput:focus{border-color:var(--accent);background:var(--bg)}
.cmpcol-h:hover{color:var(--accent)}
.cmpcol-h:hover .cmpmodel{color:var(--accent)}
.cmprunbar{display:flex;align-items:center;gap:7px;padding:5px 10px;border-bottom:1px solid var(--line);background:var(--panel2);font-size:11px;color:var(--dim);min-height:28px}
.cmprunbar[hidden]{display:none}
.cmprunbar .txt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmprunbar .pulse{width:7px;height:7px;border-radius:50%;background:var(--run);box-shadow:0 0 0 0 rgba(199,90,20,.35);animation:cmppulse 1.3s infinite;flex:0 0 auto}
@keyframes cmppulse{70%{box-shadow:0 0 0 7px rgba(199,90,20,0)}100%{box-shadow:0 0 0 0 rgba(199,90,20,0)}}
.cmpstopbar{border:1px solid var(--err);color:var(--err);background:var(--bg);border-radius:6px;padding:1px 8px;font-size:11px;cursor:pointer;flex:0 0 auto}
.cmpstopbar:hover{background:var(--err);color:#fff}
.cmpcol-b{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;font-size:var(--cmp-fs,13px)}
.cmpmsg{font-size:var(--cmp-fs,13px);line-height:1.55}
.cmpmsg.u{align-self:flex-end;max-width:88%;background:var(--user);color:var(--usertxt);padding:6px 10px;border-radius:10px;white-space:pre-wrap;word-break:break-word}
.cmpmsg.a{white-space:normal;word-break:break-word;color:var(--txt)}
.cmpmsg.a .ans{white-space:pre-wrap}
.cmpmsg.a .rsn{display:block;color:var(--faint);font-size:12px;white-space:pre-wrap;border-left:2px solid var(--line);padding-left:8px;margin-bottom:6px}
.cmpmsg.a .cur{color:var(--accent)}
.cmpmsg.err,.cmpmsg .err{color:var(--err)}
.cmpproc{margin:2px 0;border-left:2px solid var(--line);padding-left:8px}
.cmpproc-h{font-size:11px;color:var(--faint);cursor:pointer;user-select:none;padding:2px 0;white-space:nowrap}
.cmpproc-h:hover{color:var(--dim)}
.cmpproc-h .car{display:inline-block;transition:.12s}
.cmpproc:not(.collapsed) .cmpproc-h .car{transform:rotate(90deg)}
.cmpproc.collapsed .cmpproc-b{display:none}
.cmpproc-b{font-size:11px;color:var(--faint);max-height:340px;overflow-y:auto;margin-top:3px}
.cmpproc-b .rsn{white-space:pre-wrap;font-style:italic;word-break:break-word}
.cmpproc-b .rsn:empty{display:none}
.cmpstep{padding:2px 0;word-break:break-word;white-space:pre-wrap}
.cmpcol-h .cnm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmpstop{margin-left:8px;border:1px solid var(--err);color:var(--err);background:transparent;border-radius:6px;padding:1px 7px;font-size:10px;cursor:pointer;flex:0 0 auto}
.cmpstop:hover{background:var(--err);color:#fff}
.cmpcol-f{display:flex;gap:5px;padding:6px;border-top:1px solid var(--line);background:var(--panel)}
.cmpcolin{flex:1;min-width:0;resize:none;border:1px solid var(--line);border-radius:7px;padding:5px 8px;font:inherit;font-size:12px;background:var(--bg);color:var(--txt);max-height:90px;line-height:1.4}
.cmpcolsend{flex:0 0 auto;border:none;background:var(--accent);color:#fff;border-radius:7px;padding:0 11px;font-size:15px;font-weight:600;cursor:pointer}
.cmpcolsend:disabled{opacity:.45;cursor:default}
.cmpcolattach{flex:0 0 auto;border:1px solid var(--line);background:var(--bg);border-radius:7px;padding:0 8px;font-size:14px;cursor:pointer;color:var(--dim)}
.cmpcolattach:hover{border-color:var(--accent);color:var(--accent)}
.cmpcatt{display:flex;flex-wrap:wrap;gap:5px;padding:6px 6px 0}
#cmpNewBtn,#cmpResetBtn{border:1px solid var(--line);background:var(--bg);border-radius:7px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--dim);flex:0 0 auto;display:inline-flex;align-items:center;gap:4px}
#cmpNewBtn:hover,#cmpResetBtn:hover{color:var(--accent);border-color:var(--accent)}
#cmpResetBtn:disabled{opacity:.5;cursor:default}
#cmpHead .tgl{flex:0 0 auto}
#cmpQueue{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:7px 0 0;font-size:12px}
#cmpQueue[hidden]{display:none}
.cmpqlbl{color:var(--run);font-weight:500;flex:0 0 auto}
.cmpqchip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:2px 5px 2px 9px;color:var(--dim);max-width:280px;overflow:hidden}
.cmpqchip span{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cmpqchip b{cursor:pointer;color:var(--faint);font-weight:600;font-size:11px;padding:0 2px;flex:0 0 auto}
.cmpqchip b:hover{color:var(--err)}
#cmpAttachBtn{flex:0 0 auto;width:42px;border:1px solid var(--line);background:var(--bg);color:var(--dim);border-radius:8px;font-size:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
#cmpAttachBtn:hover{color:var(--accent);border-color:var(--accent)}
#cmpAttachBar{display:flex;flex-wrap:wrap;gap:6px;padding:0 0 7px}
#cmpAttachBar[hidden]{display:none}
#cmpAttachBar .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:2px 5px 2px 9px;font-size:12px;color:var(--dim);max-width:280px}
#cmpAttachBar .chip .nm{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#cmpAttachBar .chip .x{cursor:pointer;color:var(--faint);font-weight:600;font-size:11px;flex:0 0 auto}
#cmpAttachBar .chip .x:hover{color:var(--err)}
#cmpAttachBar .chip.imgchip{display:block;width:96px;height:82px;max-width:none;padding:0;border-radius:8px;overflow:hidden;background:var(--panel2)}
#cmpAttachBar .chip.imgchip img{display:block;width:100%;height:100%;object-fit:cover}
#cmpAttachBar .chip.imgchip .nm{position:absolute;left:0;right:0;bottom:0;max-width:none;padding:17px 6px 5px;background:linear-gradient(to bottom,rgba(0,0,0,0),rgba(0,0,0,.68));color:#fff;font-size:10.5px;text-shadow:0 1px 1px rgba(0,0,0,.45)}
#cmpAttachBar .chip.imgchip .x{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(30,28,25,.86);color:#fff;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,.22)}
#cmpAttachBar .chip.imgchip .x:hover{background:var(--err);color:#fff}
</style>
<div id="cmpView" hidden>
  <div id="cmpTop">
    <div id="cmpHead"><b>⚖️ 多模型对比</b><div id="cmpChips"></div><div id="cmpShellTgl" class="tgl" title="开 = 允许 exec_shell 跑命令(跳出沙箱)。注:MCP / web_search / 读取等工具跟单窗口一样一直可用,此开关只额外控制 shell 命令"><span class="sw"></span>💻 Shell</div><div id="cmpAutoTgl" class="tgl" title="工具调用自动批准(对比无逐栏审批 UI,开 Shell 时建议开)"><span class="sw"></span>⚡ 自动批准</div><div id="cmpLayout" title="排列方式:横列 / 竖列 / 田字格"><button class="laybtn" data-l="row">横</button><button class="laybtn" data-l="col">竖</button><button class="laybtn" data-l="grid">田</button></div><div id="cmpFswrap" title="对比文字大小(独立于主窗口)"><button class="fsbtn" onclick="bumpCmpFs(-1)" title="字小一点">A−</button><button class="fsbtn" onclick="bumpCmpFs(1)" title="字大一点">A+</button></div><button id="cmpNewBtn" title="在当前窗口开新一轮对比(上一轮已自动存进侧栏「多模型对比」会话,随时点回,不会丢)">＋ 新对话</button><button id="cmpResetBtn" title="某栏回答的不是它本人(回退成了 DeepSeek)?点这里用最新配置/key 重启所有对比后端">↻ 重启后端</button><button id="cmpClose" title="关闭这个对比窗口">✕ 退出</button></div>
    <div id="cmpAttachBar" hidden></div>
    <div id="cmpInputRow"><button id="cmpAttachBtn" title="上传文件(文本/代码,各模型会 read_file 读取;也可直接粘贴/拖拽。图片会显示预览)">📎</button><textarea id="cmpInput" wrap="soft" placeholder="输入一个问题,同时发给所有选中的模型…（Enter 发送 · Shift+Enter 换行 · 可粘贴/拖拽文件）"></textarea><button id="cmpSteerBtn" hidden title="把这句插进正在运行的对话,实时引导它们(全模型支持);「发送」则是排队、等当前轮完再发">⤵ 引导</button><button id="cmpStopAllBtn" hidden title="停止所有正在运行的模型,并清空还没发出去的排队消息">停止全部</button><button id="cmpSendBtn">发送</button></div>
    <input type="file" id="cmpFileInput" multiple style="display:none">
    <div id="cmpQueue" hidden></div>
  </div>
  <div id="cmpCols"></div>
</div>
