<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CodeWhale</title>
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#F4F6F8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CodeWhale">
<script src="js/preflight.js"></script>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/compare.css">

</head>
<body>
  <div id="backdrop"></div>
  <div id="sidebar">
    <div id="sidehead">
      <div id="brand"><span class="logo">🐳</span><span class="bname">CodeWhale</span><span id="version"></span><button id="updbtn" title="CodeWhale 后端有新版,点击更新">↑ 更新</button><button id="guiupdbtn" title="界面有新版,点击下载验签更新">↑ 界面</button></div>
      <button id="newbtn">新建对话</button>
      <div id="sidetools"><button class="topbtn" id="skillsbtn">Skills</button><button class="topbtn" id="mcpbtn">连接器</button><button class="topbtn" id="cmpbtn" title="多模型并排对比">对比</button><button class="topbtn" id="settingsbtn" title="设置与会话管理">设置</button></div>
    </div>
    <div id="threads"></div>
    <div id="sidefoot">
      <div id="statusrow">
        <button id="modelchip" title="当前模型 — 点击切换"><span id="modelname">…</span></button>
        <span id="balance" title="当前 provider 账户余额">余额 …</span>
      </div>
      <div id="connrow"><span id="conn"><span class="cd"></span><span id="connt">连接中…</span></span><button id="guirestart" title="重启前端 + 后端服务(launchd 自动拉起,约 5-10 秒;会中断正在跑的对话,回来后自动刷新页面)">⟳ 重启</button></div>
    </div>
  </div>
  <div id="sideresize" title="拖拽调整侧栏宽度"></div>

  <div id="main">
    <div id="topbar">
      <button id="sidebarToggle" class="iconbtn" title="收起侧栏" aria-label="收起侧栏"></button>
      <span id="ttitle">CodeWhale GUI</span>
      <span id="tmeta"></span>
      <div id="shellwrap" class="tgl" title="授权 agent 运行 shell/终端命令"><span class="sw"></span>Shell</div>
      <div id="autowrap" class="tgl" title="工具调用弹确认时自动批准"><span class="sw"></span>自动批准</div>
      <div id="fswrap" title="对话文字大小(⌘+/⌘− 是整页缩放)">
        <button class="fsbtn" onclick="bumpFs(-1)" title="字小一点">A−</button>
        <button class="fsbtn" onclick="bumpFs(1)" title="字大一点">A+</button>
      </div>
      <button id="timelinebtn" title="打开本对话的用户输入时间线" onclick="event.preventDefault();event.stopPropagation();window.timelineToggle&&window.timelineToggle('single')">时间线</button>
      <button id="previewbtn" title="打开/关闭应用内预览">预览</button>
      <button id="interruptbtn">停止</button>
    </div>
    <div id="messages">
      <div id="mwrap">
        <div class="empty" id="emptyState">
          <div class="big">🐳</div>
          左侧选择一个对话,或点「＋ 新建对话」<br>多个会话同时存在,随时切换,后端各自独立运行
        </div>
      </div>
    </div>
    <div id="composer">
      <div id="voiceStatus" hidden role="status" aria-live="polite"><span class="voice-dot"></span><b class="voice-label"></b><span class="voice-preview"></span></div>
      <div id="attachbar"></div>
      <div id="cwrap">
        <button id="pluginbtn" title="插件/工具">+</button>
        <div id="plugindrop">
          <div id="pluginharness"><!-- 已安装 harness 由 /api/harnesses 动态填充 --></div>
          <div id="plugincustom"><!-- 插件由 ~/.codewhale-gui/plugins.json 定义(用 Claude Code 安装/编辑),renderPlugins() 填充 --></div>
        </div>
        <button id="attachbtn" title="上传文件(文本/代码,agent 会读取;图片会显示预览)"></button>
        <button id="voicebtn" class="voicebtn" type="button" title="语音输入（点击开始,再次点击结束）"></button>
        <input type="file" id="fileinput" multiple style="display:none">
        <textarea id="input" rows="1" wrap="soft" placeholder="给 CodeWhale 发消息…  (Enter 发送 · Shift+Enter 换行)"></textarea>
        <button id="sendbtn" title="发送"></button>
      </div>
      <div id="hint"></div>
    </div>
	    <button id="scrollbtn" title="回到底部"></button>
	  </div>
  <!-- DeerFlow deep research modal -->
  <div id="dfmodal">
    <div class="dfpanel">
      <h3 id="dfTitle">深度研究</h3>
      <div id="dfEngines"><!-- 引擎选择器:DeerFlow / GPT Researcher / ODR / STORM / 我的方法论,由 renderDfEngines() 填充 --></div>
      <p id="dfHint"></p>
      <div id="dfSkillWrap" hidden>
        <div class="dfsecl">研究方法/skill(可多选,来自 <code>research_skills.json</code>,所有引擎都会作为方法提示)</div>
        <div id="dfSkillPick"><!-- 研究 skill 多选片,由 renderDfSkills() 填充 --></div>
      </div>
      <div class="dfsecl">研究视角/结构(默认全开,LLM 按主题自动取舍,点掉可排除)</div>
      <div id="dftpls"><!-- 研究视角多选片,由 DF_TEMPLATES 渲染 --></div>
      <textarea id="dfprompt" rows="5" wrap="soft" placeholder="输入研究对象/问题,例:「赣锋锂业:锂价周期位置、成本曲线排位、2026 产能释放节奏」——视角和详细报告要求会自动附上,这里只写对象和你特别关心的点"></textarea>
      <div class="dfbtns">
        <button onclick="closeDeerFlow()">取消</button>
        <button class="primary" id="dfSubmitBtn" onclick="submitResearch()">开始深度研究</button>
      </div>
    </div>
  </div>
  <div id="previewResize" hidden title="拖拽调整预览宽度"></div>
  <aside id="previewPane" hidden>
    <div id="pvHead">
      <div class="pvnav">
        <button class="pvbtn" id="pvBack" title="后退">‹</button>
        <button class="pvbtn" id="pvForward" title="前进">›</button>
        <button class="pvbtn" id="pvRefresh" title="刷新">↻</button>
      </div>
      <input id="pvUrl" placeholder="http://localhost:5173 或静态预览地址">
      <div class="pvactions">
        <button class="pvbtn" id="pvGo" title="打开地址">打开</button>
        <details id="pvOpenMenu" class="pvopen">
          <summary class="pvbtn" id="pvOpenSummary" title="用本机应用打开当前文件">打开方式</summary>
          <div class="pv-menu">
            <button type="button" id="pvOpenDefault">系统默认打开</button>
            <div id="pvOpenApps" class="pv-menu-apps"></div>
            <div class="pv-menu-sep"></div>
            <button type="button" id="pvDownloadSource">下载源文件</button>
          </div>
        </details>
        <button class="pvbtn" id="pvExportPdf" title="导出当前预览为 PDF">导出 PDF</button>
        <button class="pvbtn" id="pvReveal" title="在 Finder 中显示当前文件">Finder</button>
        <button class="pvbtn" id="pvClose" title="关闭预览">×</button>
      </div>
    </div>
    <div id="pvToggles">
      <button class="pvbtn" data-pv-size="desktop">桌面</button>
      <button class="pvbtn" data-pv-size="tablet">平板</button>
      <button class="pvbtn" data-pv-size="phone">手机</button>
      <label><input type="checkbox" id="pvAutoOpen">构建后自动打开</label>
      <label><input type="checkbox" id="pvAutoRefresh">重新构建后刷新</label>
      <label>沙箱 <select id="pvSandboxMode" title="兼容模式适合 localhost 开发预览;安全模式会去掉同源权限"><option value="compat">兼容</option><option value="safe">安全</option><option value="auto">自动</option></select></label>
    </div>
    <div id="pvError" hidden></div>
    <div id="pvBody"><div id="pvViewport"><iframe id="previewFrame" sandbox="allow-scripts allow-forms allow-popups allow-downloads"></iframe></div></div>
  </aside>
  <div id="timelinePanel" hidden>
    <div class="tlhead"><b>输入时间线</b><button id="timelineClose" title="关闭时间线" onclick="event.preventDefault();event.stopPropagation();window.timelineClose&&window.timelineClose()">×</button></div>
    <div id="timelineList"></div>
  </div>

  <div class="modal" id="modal">
    <div class="panel">
      <div class="ph"><h3 id="modalTitle"></h3><button class="x" id="modalClose">✕</button></div>
      <div class="pbody" id="modalBody"></div>
    </div>
  </div>




<div id="cmpView" hidden>
  <div id="cmpTop">
    <div id="cmpHead"><b>⚖️ 多模型对比</b><div id="cmpChips"></div><div id="cmpLite" hidden title="对比流量经 LiteLLM 网关">LiteLLM</div><div id="cmpShellTgl" class="tgl" title="开 = 允许 exec_shell 跑命令(跳出沙箱)。注:MCP / web_search / 读取等工具跟单窗口一样一直可用,此开关只额外控制 shell 命令"><span class="sw"></span>💻 Shell</div><div id="cmpAutoTgl" class="tgl" title="工具调用自动批准(对比无逐栏审批 UI,开 Shell 时建议开)"><span class="sw"></span>⚡ 自动批准</div><div id="cmpLayout" title="排列方式:横列 / 标签页 / 田字格 / 纵向 / 最新问答汇总"><button class="laybtn" data-l="row" title="横向并排">横</button><button class="laybtn" data-l="tab" title="标签页切换">标签</button><button class="laybtn" data-l="grid" title="田字格排列">田</button><button class="laybtn" data-l="stack" title="模型窗口纵向排列">纵</button><button class="laybtn" data-l="summary" title="汇总各模型最新一轮问答">汇总</button></div><div id="cmpFswrap" title="对比文字大小(独立于主窗口)"><button class="fsbtn" onclick="bumpCmpFs(-1)" title="字小一点">A−</button><button class="fsbtn" onclick="bumpCmpFs(1)" title="字大一点">A+</button></div><button id="cmpTimelineBtn" title="打开本轮对比的用户输入时间线" onclick="event.preventDefault();event.stopPropagation();window.timelineToggle&&window.timelineToggle('compare')">时间线</button><button id="cmpNewBtn" title="在当前窗口开新一轮对比(上一轮已自动存进侧栏「多模型对比」会话,随时点回,不会丢)">＋ 新对话</button><button id="cmpResetBtn" title="某栏回答的不是它本人(回退成了 DeepSeek)?点这里用最新配置/key 重启所有对比后端">↻ 重启后端</button><button id="cmpClose" title="关闭这个对比窗口">✕ 退出</button></div>
    <div id="cmpAttachBar" hidden></div>
    <div id="cmpVoiceStatus" hidden role="status" aria-live="polite"><span class="voice-dot"></span><b class="voice-label"></b><span class="voice-preview"></span></div>
    <div id="cmpInputRow"><button id="cmpPluginBtn" title="插件/工具">+</button><div id="cmpPlugindrop"></div><button id="cmpAttachBtn" title="上传文件(文本/代码,各模型会 read_file 读取;也可直接粘贴/拖拽。图片会显示预览)">📎</button><button id="cmpVoiceBtn" class="voicebtn" type="button" title="语音输入（点击开始,再次点击结束）"></button><textarea id="cmpInput" wrap="soft" placeholder="输入一个问题,同时发给所有选中的模型…（Enter 发送 · Shift+Enter 换行 · 可粘贴/拖拽文件）"></textarea><button id="cmpStopAllBtn" hidden title="停止所有正在运行的模型,并清空还没发出去的排队消息">停止全部</button><button id="cmpSendBtn">发送</button></div>
    <input type="file" id="cmpFileInput" multiple style="display:none">
    <div id="cmpQueue" hidden></div>
  </div>
  <div id="cmpTabs" class="cmptabs" hidden></div>
  <div id="cmpSummary" hidden></div>
  <div id="cmpCols"></div>
</div>
<script src="markdown.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
