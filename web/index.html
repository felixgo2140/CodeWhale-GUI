<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CodeWhale</title>
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#faf9f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CodeWhale">
<style>
  :root{
    --bg:#faf9f7; --panel:#f4f2ee; --panel2:#e9e6e0; --line:#e2ded7;
    --txt:#2b2926; --dim:#6b665f; --faint:#9c968d;
    --accent:#c2410c; --accent2:#d4622a; --user:#dde8ef; --usertxt:#1f3a4d;
    --ok:#3f9d5f; --run:#c08a2e; --err:#c4483f; --code:#f0ede7;
    --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{display:flex;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;overflow:hidden}

  /* ---------- Sidebar ---------- */
  #sidebar{width:268px;min-width:268px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
  #sidehead{padding:14px 14px 10px;border-bottom:1px solid var(--line)}
  #brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;letter-spacing:.2px}
  #brand .logo{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px}
  #brand .bname{font-weight:600;font-size:15px}
  #version{font-size:11px;color:var(--faint);font-weight:400}
  #updbtn,#guiupdbtn{display:none;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;margin-left:6px}
  #updbtn{margin-left:auto}
  #updbtn:hover,#guiupdbtn:hover{background:var(--accent2)} #updbtn.busy,#guiupdbtn.busy{background:var(--panel2);color:var(--dim);cursor:default}
  .updprog{min-width:220px;text-align:right}
  .updbar{height:8px;border-radius:5px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
  .updfill{height:100%;width:0%;background:var(--accent);border-radius:5px;transition:width .35s ease}
  .updfill.err{background:#c0392b}
  .updtxt{font-size:11px;color:var(--dim);margin-top:4px;white-space:nowrap}
  #cwtoast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(12px);background:var(--txt);color:var(--bg);padding:9px 16px;border-radius:9px;font-size:13px;max-width:80vw;white-space:pre-wrap;box-shadow:0 6px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.2s;z-index:200}
  #cwtoast.show{opacity:.96;transform:translateX(-50%) translateY(0)}
  .cwdlg-ov{position:fixed;inset:0;background:rgba(0,0,0,.34);display:flex;align-items:center;justify-content:center;z-index:210}
  .cwdlg{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .cwdlg-m{font-size:13.5px;line-height:1.6;color:var(--txt);white-space:pre-wrap;margin-bottom:14px}
  .cwdlg-b{display:flex;gap:8px;justify-content:flex-end}
  .cwdlg-b button{border-radius:8px;padding:6px 16px;font-size:13px;cursor:pointer;border:1px solid var(--line)}
  .cwdlg-cancel{background:var(--bg);color:var(--dim)}
  .cwdlg-ok{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  #newbtn{margin-top:12px;width:100%;padding:9px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
  #newbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
  #updatebar{display:none;margin-top:8px;padding:7px 10px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;text-align:center;font-weight:500;line-height:1.35}
  #updatebar:hover{background:var(--accent2)}
  #updatebar.busy{background:var(--panel2);color:var(--dim);cursor:default}
  #threads{flex:1;overflow-y:auto;padding:8px}
  .grp{display:flex;align-items:center;gap:6px;padding:9px 8px 4px;margin-top:2px;font-size:11px;font-weight:700;color:var(--faint);letter-spacing:.3px;cursor:pointer;user-select:none}
  .grp:first-child{margin-top:0}
  .grp:hover{color:var(--dim)}
  .grp .gcount{font-weight:500;opacity:.65}
  .grp .gcar{margin-left:auto;font-size:8px;opacity:.7;transition:transform .15s}
  .grp.collapsed .gcar{transform:rotate(-90deg)}
  .thread{padding:9px 10px;border-radius:9px;cursor:pointer;margin-bottom:3px;border:1px solid transparent}
  .thread.cmpsess{background:color-mix(in srgb,var(--accent) 6%,transparent)}              /* 对比会话行:淡强调底,和单聊区分 */
  .thread.cmpsess:hover{background:color-mix(in srgb,var(--accent) 12%,transparent)}
  .thread.cmpsess .title{font-weight:600}
  .thread:hover{background:var(--panel2)}
  .thread.active{background:var(--panel2);border-color:var(--line)}
  .thread .t1{display:flex;align-items:center;gap:7px}
  .thread .dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex:0 0 auto}   /* idle=灰 */
  .thread .dot.ok{background:var(--ok)}                 /* 完成=绿 */
  .thread .dot.err{background:var(--err)}               /* 失败/中断=红 */
  .thread .dot.running{width:12px;height:12px;border:2px solid var(--line);border-top-color:var(--accent);background:transparent;box-sizing:border-box;animation:spin .7s linear infinite}  /* 运行中=橙色旋转圈 */
  @keyframes spin{to{transform:rotate(360deg)}}
  .thread .dot.stalled{width:12px;height:12px;border:2px solid var(--run);border-radius:50%;background:transparent;box-sizing:border-box;opacity:.55}  /* 非旋转琥珀环 = 可能卡住/超时 */
  .thread .title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .thread .prev{font-size:11.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:3px 0 0 14px}
  .thread .meta{font-size:10.5px;color:var(--faint);margin:3px 0 0 14px;display:flex;gap:8px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  #sidefoot{padding:8px 12px;border-top:1px solid var(--line);font-size:11px;color:var(--faint);display:flex;flex-direction:column;gap:6px}
  #statusrow{display:flex;justify-content:space-between;align-items:center;gap:8px}
  #modelchip{border:1px solid var(--line);background:var(--panel);color:var(--dim);border-radius:7px;padding:3px 9px;font-size:11px;cursor:pointer;max-width:64%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #modelchip:hover{color:var(--accent);border-color:var(--accent)}
  #conn{display:flex;align-items:center;gap:5px}
  #conn .cd{width:7px;height:7px;border-radius:50%;background:var(--err)} #conn.up .cd{background:var(--ok)}

  /* ---------- Main ---------- */
  #main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  #scrollbtn{position:absolute;right:22px;bottom:92px;width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer;font-size:16px;box-shadow:0 2px 9px rgba(0,0,0,.16);display:none;z-index:20}
  #scrollbtn.show{display:block} #scrollbtn:hover{color:var(--accent);border-color:var(--accent)}
  #topbar{height:50px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:12px;background:var(--panel)}
  #ttitle{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #tmeta{font-size:11.5px;color:var(--dim);display:flex;gap:10px;flex:1;white-space:nowrap;overflow:hidden}
  .badge{background:var(--panel2);border:1px solid var(--line);padding:1px 8px;border-radius:20px;font-size:11px;color:var(--dim)}
  #interruptbtn{display:none;padding:5px 12px;border:1px solid var(--err);background:transparent;color:var(--err);border-radius:8px;cursor:pointer;font-size:12px}
  #interruptbtn:hover{background:var(--err);color:#fff}
  #fswrap,#cmpFswrap{display:inline-flex;align-items:center}   /* A−/A+ 连成一个紧凑小药丸,不显字号数字 */
  .fsbtn{border:1px solid var(--line);background:var(--panel2);color:var(--dim);width:23px;height:21px;cursor:pointer;font-size:11px;line-height:1;padding:0;font-weight:600}
  .fsbtn:first-child{border-radius:6px 0 0 6px}
  .fsbtn:last-child{border-radius:0 6px 6px 0;border-left:none}
  .fsbtn:hover{color:var(--accent);border-color:var(--accent);position:relative;z-index:1}

  #messages{flex:1;overflow-y:auto;padding:24px 0}
  #mwrap{max-width:760px;margin:0 auto;padding:0 24px}
  .empty{color:var(--faint);text-align:center;margin-top:18vh;font-size:14px;line-height:1.9}
  .empty .big{font-size:26px;margin-bottom:8px}

  .msg{margin-bottom:20px;display:flex;gap:11px}
  .msg .av{width:28px;height:28px;border-radius:7px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin-top:1px}
  .msg.user .av{background:var(--user);color:var(--usertxt)}
  .msg.assistant .av{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .msg .body{flex:1;min-width:0;padding-top:3px}
  .msg .who{font-size:11px;color:var(--faint);margin-bottom:4px;font-weight:600;letter-spacing:.3px}
  .msg .content{line-height:1.62;white-space:normal;word-wrap:break-word;font-size:var(--chat-fs,14px)}
  .msg.user .content{color:var(--usertxt)}
  .msg.queued{opacity:.62} .msg.queued .who{color:var(--run)} .msg.queued .body{position:relative}
  .qx{position:absolute;top:-2px;right:0;background:transparent;border:none;cursor:pointer;color:var(--faint);font-size:13px;line-height:1} .qx:hover{color:var(--err)}
  .content p{margin:0 0 9px} .content p:last-child{margin-bottom:0}
  .content pre{background:var(--code);border:1px solid var(--line);border-radius:8px;padding:11px 13px;overflow-x:auto;margin:9px 0;font-family:var(--mono);font-size:.9em;line-height:1.5}
  .content code:not(pre code){background:var(--code);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:.9em}
  .content strong{color:#1a1714} .content a{color:var(--accent);text-decoration:underline}
  /* markdown 完整元素 */
  .content h1,.content h2,.content h3,.content h4{margin:15px 0 7px;line-height:1.3;font-weight:600;color:#1a1714}
  .content h1:first-child,.content h2:first-child,.content h3:first-child{margin-top:2px}
  .content h1{font-size:1.45em} .content h2{font-size:1.28em} .content h3{font-size:1.12em} .content h4{font-size:1em}
  .content ul,.content ol{margin:7px 0;padding-left:23px} .content li{margin:3px 0}
  .content blockquote{border-left:3px solid var(--accent);margin:9px 0;padding:3px 0 3px 13px;color:var(--dim)}
  .content hr{border:none;border-top:1px solid var(--line);margin:15px 0}
  .content em{font-style:italic} .content del{opacity:.55}
  .content table{border-collapse:collapse;margin:11px 0;font-size:.95em;display:block;max-width:100%;overflow-x:auto}
  .content th,.content td{border:1px solid var(--line);padding:5px 10px;text-align:left;white-space:nowrap}
  .content th{background:var(--panel2);font-weight:600}
  /* 对比答案也走 markdown,样式镜像单窗口 .content(基准字号用 --cmp-fs);.md 渲染后切 normal(.cmpmsg.a .ans.md 比 .ans 的 pre-wrap 更具体,胜出)*/
  .cmpmsg.a .ans.md{white-space:normal}
  .cmpmsg .ans.md p{margin:0 0 8px} .cmpmsg .ans.md p:last-child{margin-bottom:0}
  .cmpmsg .ans.md pre{background:var(--code);border:1px solid var(--line);border-radius:8px;padding:10px 12px;overflow-x:auto;margin:8px 0;font-family:var(--mono);font-size:.9em;line-height:1.5}
  .cmpmsg .ans.md code:not(pre code){background:var(--code);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:.9em}
  .cmpmsg .ans.md strong{color:#1a1714} .cmpmsg .ans.md a{color:var(--accent);text-decoration:underline}
  .cmpmsg .ans.md h1,.cmpmsg .ans.md h2,.cmpmsg .ans.md h3,.cmpmsg .ans.md h4{margin:12px 0 6px;line-height:1.3;font-weight:600;color:#1a1714}
  .cmpmsg .ans.md h1:first-child,.cmpmsg .ans.md h2:first-child,.cmpmsg .ans.md h3:first-child{margin-top:2px}
  .cmpmsg .ans.md h1{font-size:1.32em} .cmpmsg .ans.md h2{font-size:1.2em} .cmpmsg .ans.md h3{font-size:1.1em} .cmpmsg .ans.md h4{font-size:1em}
  .cmpmsg .ans.md ul,.cmpmsg .ans.md ol{margin:6px 0;padding-left:21px} .cmpmsg .ans.md li{margin:2px 0}
  .cmpmsg .ans.md blockquote{border-left:3px solid var(--accent);margin:8px 0;padding:2px 0 2px 12px;color:var(--dim)}
  .cmpmsg .ans.md hr{border:none;border-top:1px solid var(--line);margin:12px 0}
  .cmpmsg .ans.md em{font-style:italic} .cmpmsg .ans.md del{opacity:.55}
  .cmpmsg .ans.md table{border-collapse:collapse;margin:9px 0;font-size:.95em;display:block;max-width:100%;overflow-x:auto}
  .cmpmsg .ans.md th,.cmpmsg .ans.md td{border:1px solid var(--line);padding:4px 9px;text-align:left;white-space:nowrap}
  .cmpmsg .ans.md th{background:var(--panel2);font-weight:600}
  .msg .acts{display:flex;gap:6px;margin-top:7px;opacity:0;transition:opacity .12s}
  .msg:hover .acts{opacity:.95}
  .mact{border:1px solid var(--line);background:transparent;color:var(--faint);border-radius:6px;min-width:26px;height:26px;cursor:pointer;font-size:12px;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
  .mact:hover{color:var(--accent);border-color:var(--accent)}
  .mact.ok{color:var(--accent);border-color:var(--accent)}
  @media (hover:none){ .msg .acts{opacity:.8} }   /* 手机无 hover:常显操作栏 */

  /* reasoning */
  .reason{margin-bottom:10px;margin-left:39px}
  .reason .head{font-size:11px;color:var(--faint);cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
  .reason .head:hover{color:var(--dim)}
  .reason .rbody{display:none;margin-top:6px;padding:8px 12px;border-left:2px solid var(--line);color:var(--dim);font-size:12px;line-height:1.5;white-space:pre-wrap;max-height:200px;overflow-y:auto}
  .reason.open .rbody{display:block} .reason.open .head .caret{transform:rotate(90deg)}
  .reason .caret{transition:.15s;display:inline-block}

  /* tool / command card */
  .tool{margin:0 0 20px 39px;border:1px solid var(--line);border-radius:9px;background:var(--panel);overflow:hidden}
  .tool .th{padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
  .tool .th .ic{color:var(--accent2)}
  .tool .tb{padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--dim);white-space:pre-wrap;max-height:240px;overflow:auto}
  .tool.needapproval{border-color:var(--run)}
  .tool.collapsible .th{cursor:pointer;user-select:none}
  .tool.collapsible:not(.open) .th{border-bottom:none}
  .tool.collapsible .tb{display:none}
  .tool.collapsible.open .tb{display:block}
  .tool .caret{transition:.15s;display:inline-block;color:var(--faint)}
  .tool.collapsible.open .caret{transform:rotate(90deg)}
  .approval{padding:9px 12px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;background:var(--panel2)}
  .approval .q{font-size:12px;color:var(--run);flex:1}
  .approval button{padding:5px 13px;border-radius:7px;border:1px solid var(--line);cursor:pointer;font-size:12px;background:var(--panel);color:var(--txt)}
  .approval .allow{border-color:var(--ok);color:var(--ok)} .approval .allow:hover{background:var(--ok);color:#fff}
  .approval .deny{border-color:var(--err);color:var(--err)} .approval .deny:hover{background:var(--err);color:#fff}
  .sysnote{margin:0 0 16px 39px;font-size:11.5px;color:var(--faint);font-style:italic}
  .typing{display:inline-block;color:var(--faint)} .typing::after{content:"▋";animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}

  /* composer */
  #composer{border-top:1px solid var(--line);padding:14px 0 18px;background:var(--bg)}
  #cwrap{max-width:760px;margin:0 auto;padding:0 24px;display:flex;gap:10px;align-items:flex-end}
  #input{flex:1;resize:none;background:var(--panel);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:11px 14px;font-family:var(--font);font-size:14px;line-height:1.5;max-height:200px;outline:none}
  #input:focus{border-color:var(--accent)}
  #sendbtn{width:42px;height:42px;border-radius:11px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:17px;flex:0 0 auto}
  #sendbtn:hover{background:var(--accent2)} #sendbtn:disabled{background:var(--line);cursor:default;color:var(--faint)}
  #sendbtn.stop{background:var(--err)} #sendbtn.stop:hover{background:#b23c34} #sendbtn.stop:disabled{background:var(--err);color:#fff}
  #hint{max-width:760px;margin:6px auto 0;padding:0 24px;font-size:11px;color:var(--faint)}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  /* thread row actions (pin/delete) */
  .thread .t1{align-items:center}
  .thread .actions{display:none;gap:1px;margin-left:auto;flex:0 0 auto}
  .thread:hover .actions{display:flex}
  .thread .act{background:transparent;border:none;cursor:pointer;font-size:12px;line-height:1;padding:2px 3px;border-radius:5px;opacity:.65}
  .thread .act:hover{opacity:1;background:var(--panel)}
  /* balance + auto toggle */
  #balance{color:var(--dim);font-size:12px;font-weight:600;white-space:nowrap}
  .tgl{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);cursor:pointer;user-select:none}
  .tgl .sw{width:28px;height:16px;border-radius:10px;background:var(--line);position:relative;transition:.15s;flex:0 0 auto}
  .tgl .sw::after{content:"";position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .tgl.on{color:var(--accent);font-weight:600} .tgl.on .sw{background:var(--accent)} .tgl.on .sw::after{left:14px}
  .tgl.disabled{opacity:.4;cursor:default;pointer-events:none}
  /* terminal block (exec_shell) */
  .term{margin:0 0 16px 39px;border:1px solid var(--line);border-radius:9px;background:var(--code);overflow:hidden;font-family:var(--mono);font-size:12.5px}
  .term-cmd{padding:8px 12px;color:var(--txt);border-bottom:1px solid var(--line);white-space:pre-wrap;word-break:break-all}
  .term-cmd .dollar{color:var(--ok);margin-right:5px;user-select:none}
  .term-out{padding:8px 12px;color:var(--dim);white-space:pre-wrap;max-height:260px;overflow:auto;word-break:break-all}
  .term.failed{border-color:var(--err)} .term.failed .term-out{color:var(--err)}
  /* ---------- mobile / PWA ---------- */
  #hamburger{display:none;background:transparent;border:none;font-size:20px;color:var(--txt);cursor:pointer;padding:2px 8px;margin-right:2px}
  #backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40}
  #backdrop.show{display:block}
  @media (max-width:640px){
    #hamburger{display:block}
    #sidebar{position:fixed;left:0;top:0;bottom:0;width:82vw;max-width:300px;min-width:0;transform:translateX(-100%);transition:transform .2s;z-index:50;box-shadow:2px 0 18px rgba(0,0,0,.25)}
    #sidebar.open{transform:none}
    #tmeta{display:none}
    #ttitle{font-size:13px}
    #mwrap,#cwrap,#hint{padding-left:14px;padding-right:14px}
    #topbar{padding:0 10px;gap:8px}
    #composer{padding:10px 0 14px}
    #autowrap{font-size:11px;gap:5px}
    #input{font-size:16px}            /* iOS 防止聚焦时自动放大 */
  }
  /* 附件条 + 📎 */
  #attachbar{max-width:760px;margin:0 auto 8px;padding:0 24px;display:flex;flex-wrap:wrap;gap:6px}
  #attachbar:empty{display:none}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:4px 8px;font-size:12px;color:var(--dim);max-width:240px}
  .chip .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip .x{cursor:pointer;color:var(--faint);font-weight:600}
  .chip .x:hover{color:var(--err)}

<script>
const API = location.origin;            // 同源:经 server.py 代理到本机 codewhale(免 CORS,适配手机)
const TOKEN = (new URLSearchParams(location.search).get("token")) || localStorage.getItem("cw_token") || "";
if(TOKEN){ localStorage.setItem("cw_token",TOKEN); if(new URLSearchParams(location.search).get("token")) history.replaceState({},"",location.pathname); }
// 新会话 workspace 不再由前端指定:createThread 传空 body,app-server 用自身工作目录($HOME)→ 任何机器都正确,无需注入/写死路径
const url = p => API + p + (TOKEN ? (p.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(TOKEN) : "");
const auth = TOKEN ? {Authorization:"Bearer "+TOKEN} : {};

const $ = s => document.querySelector(s);
const state = { threads:[], activeId:null, es:null, items:new Map(), seen:new Set(), turnId:null, running:false,
  pinned:new Set(JSON.parse(localStorage.getItem("cw_pinned")||"[]")),
  cmpThreads:new Set(JSON.parse(localStorage.getItem("cw_cmp")||"[]")),                 // 多模型对比建的 thread → 侧栏单独归一组
  cmpSessions:JSON.parse(localStorage.getItem("cw_cmp_sessions")||"[]"),                // 对比会话:[{id,topic,ts,threads:{prov:tid}}] → 侧栏每会话一行,点击回到当时对比
  grpCollapsed:new Set(JSON.parse(localStorage.getItem("cw_grpcollapsed")||"[]")),      // 折叠的分组(置顶/对比/对话)
  autoApprove:false, allowShell:false, queue:[], attachments:[] };  // 按会话,不再全局持久

async function api(path, opts={}){
  const r = await fetch(url(path), {...opts, headers:{...(opts.body?{"Content-Type":"application/json"}:{}),...auth,...(opts.headers||{})}});
  if(!r.ok) throw new Error(path+" → HTTP "+r.status+" "+(await r.text()).slice(0,200));
  const ct = r.headers.get("content-type")||""; return ct.includes("json") ? r.json() : r.text();
}

/* ---------- helpers ---------- */
// 原生壳老版本没实现 WKWebView 的 JS 对话框 → 系统 confirm()/alert() 静默失效(点了没反应)。
// 这里用页内自绘对话框兜底,不依赖原生;新原生壳(已加 WKUIDelegate)两条路都通。
function cwToast(msg){ let t=document.getElementById("cwtoast"); if(!t){ t=document.createElement("div"); t.id="cwtoast"; document.body.appendChild(t); }
  t.textContent=String(msg); t.classList.add("show"); clearTimeout(cwToast._t); cwToast._t=setTimeout(()=>t.classList.remove("show"),3200); }
window.alert = m => cwToast(m);   // 全局兜底:所有 alert() 改走页内 toast,原生壳里也能看到
function cwConfirm(msg){ return new Promise(res=>{
  const ov=document.createElement("div"); ov.className="cwdlg-ov";
  ov.innerHTML=`<div class="cwdlg"><div class="cwdlg-m"></div><div class="cwdlg-b"><button class="cwdlg-cancel">取消</button><button class="cwdlg-ok">确定</button></div></div>`;
  ov.querySelector(".cwdlg-m").textContent=String(msg);
  document.body.appendChild(ov);
  const done=v=>{ ov.remove(); res(v); };
  ov.querySelector(".cwdlg-ok").onclick=()=>done(true);
  ov.querySelector(".cwdlg-cancel").onclick=()=>done(false);
  ov.onclick=e=>{ if(e.target===ov) done(false); };
  setTimeout(()=>ov.querySelector(".cwdlg-ok").focus(),30);
}); }
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function md(t){
  // 完整 markdown,转义优先(防 XSS):所有文本先 esc(),再在转义后的文本上套标签;原始 < > 永不会变成真标签。
  t=(t||"").replace(/\r\n/g,"\n");
  const fences=[];                                                   // 代码块先抽出占位(自成一行,内部不当 markdown)
  t=t.replace(/```(\w*)\n?([\s\S]*?)```/g,function(m,lang,code){ fences.push('<pre><code>'+esc(code.replace(/\n+$/,''))+'</code></pre>'); return "\n[[CWF"+(fences.length-1)+"]]\n"; });
  var inl = function(s){ return esc(s)                               // 行内:先转义,再套标签
    .replace(/`([^`\n]+)`/g,function(m,c){return '<code>'+c+'</code>';})
    .replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*\w])\*(?!\s)([^*\n]+?)\*(?!\*)/g,'$1<em>$2</em>')
    .replace(/(^|[^_\w])_(?!\s)([^_\n]+?)_(?![\w])/g,'$1<em>$2</em>')
    .replace(/~~([^~\n]+)~~/g,'<del>$1</del>')
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>'); };
  var lines=t.split("\n"), out=[], i=0;
  var fence=function(l){ return /^\[\[CWF(\d+)\]\]$/.exec(l); };
  while(i<lines.length){
    var l=lines[i], f=fence(l);
    if(f){ out.push(fences[+f[1]]); i++; continue; }
    if(!l.trim()){ i++; continue; }
    var h=l.match(/^(#{1,6})\s+(.*)$/);                              // 标题
    if(h){ var lv=Math.min(h[1].length,4); out.push("<h"+lv+">"+inl(h[2])+"</h"+lv+">"); i++; continue; }
    if(/^(\s*[-*_]){3,}\s*$/.test(l)){ out.push("<hr>"); i++; continue; }   // 分隔线
    if(/^\s*>\s?/.test(l)){ var q=[]; while(i<lines.length&&/^\s*>\s?/.test(lines[i])){ q.push(lines[i].replace(/^\s*>\s?/,"")); i++; } out.push("<blockquote>"+inl(q.join("\n")).replace(/\n/g,"<br>")+"</blockquote>"); continue; }   // 引用
    if(/\|/.test(l)&&i+1<lines.length&&/^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(lines[i+1])){   // 表格
      var pr=function(r){ return r.replace(/^\s*\|/,"").replace(/\|\s*$/,"").split("|").map(function(c){return c.trim();}); };
      var head=pr(l); i+=2; var rows=[];
      while(i<lines.length&&/\|/.test(lines[i])&&lines[i].trim()){ rows.push(pr(lines[i])); i++; }
      out.push("<table><thead><tr>"+head.map(function(c){return "<th>"+inl(c)+"</th>";}).join("")+"</tr></thead><tbody>"+rows.map(function(r){return "<tr>"+r.map(function(c){return "<td>"+inl(c)+"</td>";}).join("")+"</tr>";}).join("")+"</tbody></table>"); continue;
    }
    if(/^\s*[-*+]\s+/.test(l)){ var it=[]; while(i<lines.length&&/^\s*[-*+]\s+/.test(lines[i])){ it.push(lines[i].replace(/^\s*[-*+]\s+/,"")); i++; } out.push("<ul>"+it.map(function(x){return "<li>"+inl(x)+"</li>";}).join("")+"</ul>"); continue; }   // 无序列表
    if(/^\s*\d+[.)]\s+/.test(l)){ var it2=[]; while(i<lines.length&&/^\s*\d+[.)]\s+/.test(lines[i])){ it2.push(lines[i].replace(/^\s*\d+[.)]\s+/,"")); i++; } out.push("<ol>"+it2.map(function(x){return "<li>"+inl(x)+"</li>";}).join("")+"</ol>"); continue; }   // 有序列表
    var p=[]; while(i<lines.length&&lines[i].trim()&&!fence(lines[i])&&!/^(#{1,6}\s|\s*>\s?|\s*[-*+]\s|\s*\d+[.)]\s)/.test(lines[i])&&!/^(\s*[-*_]){3,}\s*$/.test(lines[i])){ p.push(lines[i]); i++; }   // 段落
    if(p.length) out.push("<p>"+inl(p.join("\n")).replace(/\n/g,"<br>")+"</p>"); else i++;
  }
  return out.join("").replace(/\[\[CWF(\d+)\]\]/g,function(m,n){return fences[+n]||"";});
}
function relTime(s){ if(!s) return ""; const d=(Date.now()-new Date(s).getTime())/1000;
  if(d<60)return "刚刚"; if(d<3600)return Math.floor(d/60)+"分钟前"; if(d<86400)return Math.floor(d/3600)+"小时前"; return Math.floor(d/86400)+"天前"; }
let _stick=true;   // 是否"贴底":用户上滚后变 false → 流式输出不再把页面拽回底部(可往前翻看历史)
const scrollDown = (force) => { const m=$("#messages"); if(force) _stick=true; if(_stick) m.scrollTop=m.scrollHeight; };

/* ---------- sidebar ---------- */
async function loadThreads(){
  if(state._loadingThreads) return;   // 防重入:忙碌的 :7878 下,4s 轮询若上一发还没回来就别再压一发(并发堆叠=切换更卡)
  state._loadingThreads=true;
  try{
    const t = await api("/api/threads/all");   // 聚合各 provider 后端的会话,带 provider 标签(每对话锁模型)
    setConn(true); state.threads=t;
    const at=t.find(x=>x.id===state.activeId);   // 兜底:SSE 漏收 turn.completed 时,靠轮询发现活动会话已结束 → 收尾 + 发队列
    if(at && state.running && ["completed","failed","interrupted","canceled","cancelled"].includes(at.latest_turn_status)){ setRunning(false); processQueue(); }
    const sig=JSON.stringify(t.map(x=>[x.id,x.title,x.latest_turn_status,x.updated_at,x.provider]))+"|"+[...state.pinned].sort().join(",")+"|"+[...state.cmpThreads].sort().join(",")+"|"+state.cmpSessions.map(s=>s.id+":"+Object.keys(s.threads||{}).length).join(",")+"|"+[...state.grpCollapsed].sort().join(",")+"|"+state.activeId;   // 含 provider/对比集/会话/折叠态:任一变都重渲染侧栏
    if(sig!==state._sig){ state._sig=sig; renderThreads(); }   // 仅当列表真变化才重建 DOM,避免轮询吞掉点击
  }catch(e){ setConn(false); console.warn(e); }
  finally{ state._loadingThreads=false; }
}
function setConn(up){ const c=$("#conn"); c.classList.toggle("up",up); $("#connt").textContent = up?"已连接 7878":"未连接"; }
const CMP_ONLY_PROV=new Set(["zai","openai-codex","moonshot"]);   // 只在多模型对比里出现的 provider(单窗口用 deepseek 默认 / claude-code 新对话)→ 侧栏归对比组兜底
function threadEl(t){   // 单条对话 DOM
  const pinned=state.pinned.has(t.id);
  const d=document.createElement("div"); d.className="thread"+(t.id===state.activeId?" active":"");
  const st=t.latest_turn_status||"";
  let dotCls = (st==="inprogress"||st==="in_progress"||st==="queued"||st==="running") ? "running"   // summary 返回的是 inprogress(无下划线)
               : st==="completed" ? "ok"
               : (["failed","interrupted","canceled","cancelled","error"].includes(st) ? "err" : "idle");
  let dotTitle = st||"空闲";
  if(dotCls==="running"){
    const age=(Date.now()-new Date(t.updated_at).getTime())/1000;   // inprogress 但久未更新 → 多半是卡死/孤儿 turn
    if(age>240){ dotCls="stalled"; dotTitle=`约 ${Math.round(age/60)} 分钟无更新 — 可能在等你审批、或卡住;点开查看`; }
    else dotTitle="运行中";
  }
  const stalled = dotCls==="stalled";
  d.innerHTML=`<div class="t1"><span class="dot ${dotCls}" title="${dotTitle}"></span><span class="title">${pinned?"📌 ":""}${stalled?"⚠ ":""}${esc(t.title||"未命名")}</span>`+
    `<span class="actions"><button class="act rename" title="重命名">✎</button><button class="act pin" title="${pinned?"取消置顶":"置顶"}">${pinned?"📍":"📌"}</button><button class="act del" title="删除">🗑</button></span></div>`+
    (t.preview?`<div class="prev">${esc(t.preview)}</div>`:"")+
    `<div class="meta"><span>${esc(PROV_SHORT[t.provider]||t.provider||t.model||"")}</span><span>${relTime(t.updated_at)}</span></div>`;
  d.onclick=()=>openThread(t.id);
  d.querySelector(".pin").onclick=(e)=>{e.stopPropagation();togglePin(t.id);};
  d.querySelector(".del").onclick=(e)=>{e.stopPropagation();deleteThread(t.id,t.title);};
  d.querySelector(".rename").onclick=(e)=>{e.stopPropagation();renameThread(t.id,t.title);};
  return d;
}
function cmpSessionEl(s){   // 对比会话行:点=回到当时整场对比
  const provs=Object.keys(s.threads||{});
  const d=document.createElement("div"); d.className="thread cmpsess"+(s.id===CMP.sessionId&&!$("#cmpView")?.hidden?" active":"");
  const names=provs.map(p=>PROV_SHORT[p]||p).join(" · ");
  d.innerHTML=`<div class="t1"><span class="dot ok" title="对比会话(点击回到当时对比)"></span><span class="title">⊞ ${esc(s.topic||"对比")}</span>`+
    `<span class="actions"><button class="act del" title="从列表删除此对比会话">🗑</button></span></div>`+
    `<div class="meta"><span>${provs.length} 模型 · ${esc(names)}</span><span>${relTime(s.ts||0)}</span></div>`;
  d.onclick=()=>openCompareWindow(s.id);   // 点会话 → 新开一个独立窗口还原那场对比(主窗口不受影响)
  d.querySelector(".del").onclick=(e)=>{e.stopPropagation();deleteCmpSession(s.id,s.topic);};
  return d;
}
async function deleteCmpSession(id,topic){
  const s=state.cmpSessions.find(x=>x.id===id);
  const tids=s?Object.values(s.threads||{}).filter(Boolean):[];
  if(!(await cwConfirm(`删除对比会话「${topic||"对比"}」及其 ${tids.length} 个模型对话?\n(整组归档移出列表;后端可恢复)`))) return;
  await Promise.allSettled(tids.map(tid=>api(`/v1/threads/${tid}`,{method:"PATCH",body:JSON.stringify({archived:true})})));   // 归档每个模型的原始 thread
  state.threads=state.threads.filter(t=>!tids.includes(t.id));   // 从列表移除
  let pinChanged=false; tids.forEach(tid=>{ state.cmpThreads.delete(tid); if(state.pinned.delete(tid)) pinChanged=true; });   // 从对比注册表/置顶清掉
  saveCmp(); if(pinChanged) savePins();
  state.cmpSessions=state.cmpSessions.filter(x=>x.id!==id);   // 删会话本身
  saveCmpSessions(); state._sig=null; renderThreads();
}
function renderThreads(){
  const box=$("#threads"); box.innerHTML="";
  const byTime=(a,b)=>new Date(b.updated_at||0)-new Date(a.updated_at||0);
  const sessionTids=new Set();                            // 已被某对比会话收编的 thread → 不再单独显示(由会话行代表)
  for(const s of state.cmpSessions) for(const tid of Object.values(s.threads||{})) sessionTids.add(tid);
  // 对比归组判定:① 服务端权威标记 t.compare(取后端 cmp_threads 注册表,每次刷新,不依赖前端本地是否同步——根治"对比对话散落进单聊");
  // ② 前端本地登记(即时,新建对比当下就归组);③ gpt/glm/kimi 这些 provider 单窗口从不用 → 兜底
  const isCmp=t=>t.compare||state.cmpThreads.has(t.id)||CMP_ONLY_PROV.has(t.provider);
  const pinG=[], cmpLeftover=[], normG=[];               // 置顶 / 对比散条(无会话的历史) / 普通对话
  for(const t of state.threads){
    if(state.pinned.has(t.id)){ pinG.push(t); continue; }  // 置顶优先
    if(sessionTids.has(t.id)) continue;                    // 属某会话 → 跳过,会话行代表它
    if(isCmp(t)){ cmpLeftover.push(t); continue; }
    normG.push(t);
  }
  pinG.sort(byTime); cmpLeftover.sort(byTime); normG.sort(byTime);
  const sessions=[...state.cmpSessions].sort((a,b)=>(b.ts||0)-(a.ts||0));
  const cmpCount=sessions.length+cmpLeftover.length;
  const groups=[];
  if(pinG.length)  groups.push({key:"pin", label:"📌 置顶", count:pinG.length, render:b=>pinG.forEach(t=>b.appendChild(threadEl(t)))});
  if(cmpCount)     groups.push({key:"cmp", label:"⊞ 多模型对比", count:cmpCount, render:b=>{ sessions.forEach(s=>b.appendChild(cmpSessionEl(s))); cmpLeftover.forEach(t=>b.appendChild(threadEl(t))); }});
  if(normG.length) groups.push({key:"norm",label:"💬 对话", count:normG.length, render:b=>normG.forEach(t=>b.appendChild(threadEl(t)))});
  if(!groups.length){ box.innerHTML='<div style="padding:14px;color:var(--faint);font-size:12px">还没有对话,点上方新建</div>'; return; }
  const showHeaders=groups.length>1;                     // 只有一组时不显分组头,保持简洁
  for(const g of groups){
    if(showHeaders){
      const collapsed=state.grpCollapsed.has(g.key);
      const h=document.createElement("div"); h.className="grp"+(collapsed?" collapsed":"");
      h.innerHTML=`<span>${g.label}</span><span class="gcount">${g.count}</span><span class="gcar">▼</span>`;
      h.onclick=()=>toggleGroup(g.key);
      box.appendChild(h);
      if(collapsed) continue;
    }
    g.render(box);
  }
}

/* ---------- open / stream a thread ---------- */
function closeStream(){ if(state.es){ state.es.close(); state.es=null; } }
async function openThread(id){
  if(state.activeId===id && state.es) return;
  closeStream();
  state.activeId=id; state.items.clear(); state.seen.clear(); state.turnId=null; state._optimUser=null; setRunning(false);
  state.autoApprove=false; state.allowShell=false; renderAuto(); renderShell(); loadAutoState(id);   // 读该会话真实 auto_approve/allow_shell 如实显示
  renderThreads(); closeDrawer();
  $("#emptyState")?.remove();
  const wrap=$("#mwrap"); wrap.innerHTML="";
  const t=state.threads.find(x=>x.id===id);
  $("#ttitle").textContent=t?.title||"对话";
  $("#tmeta").innerHTML = t ? `<span class="badge" title="此对话锁定的模型">${esc(PROV_SHORT[t.provider]||t.provider||t.model||"")}</span><span class="badge">${esc(t.mode||"")}</span><span class="badge">${esc((t.workspace||"").split("/").pop()||"~")}</span>` : "";

  // 快照渲染历史(一次 GET 拿全部 item)→ 再从 latest_seq 起只听新事件。
  // 避免旧做法从 since_seq=0 重放上万条事件(切大会话时卡顿的根源)。
  let since=0;
  $("#mwrap").innerHTML='<div class="sysnote" id="histloading">· 载入历史…</div>';
  try{
    const rec=await api(`/v1/threads/${id}`);
    if(state.activeId!==id) return;   // 等待期间又切走了 → 放弃,别污染新会话
    since=rec.latest_seq||0;
    const lastTurn=(rec.turns||[]).slice(-1)[0];   // 切到一条仍在跑的对话:快照不会重放已发生的 turn.started → 据此同步 running,否则会误发触发 409
    const tst=(lastTurn&&lastTurn.status)||(rec.thread||{}).latest_turn_status||"";
    if(/^(in[_ ]?progress|queued|running)$/i.test(tst)){ state.turnId=(lastTurn&&lastTurn.id)||state.turnId; setRunning(true); }
    $("#mwrap").innerHTML="";
    for(const it of (rec.items||[])){
      if(it.kind==="status") continue;   // 跳过 transient 状态噪音(占 ~半数,不是对话内容)
      startItem(it.id, it);
      completeItem(it.id, it, /fail|error|interrupt|cancel/i.test(it.status||""));
    }
    scrollDown(true);
  }catch(e){ $("#mwrap").innerHTML=""; since=0; console.warn("快照载入失败,退回从0重放",e); }

  const es=new EventSource(url(`/v1/threads/${id}/events?since_seq=${since}`));
  state.es=es;
  ["thread.started","thread.forked","turn.started","turn.lifecycle","turn.completed","turn.steered",
   "turn.interrupt_requested","item.started","item.delta","item.completed","item.failed","item.interrupted",
   "approval.required","approval.decided","approval.timeout","sandbox.denied"]
   .forEach(ev=>es.addEventListener(ev,e=>onEvent(ev,e)));
  es.onerror=()=>{ /* auto-reconnect; seen-set dedups replay */ };
}

/* ---------- event handling ---------- */
function onEvent(ev, e){
  let m; try{ m=JSON.parse(e.data); }catch{ return; }
  if(m.thread_id && m.thread_id!==state.activeId) return;
  if(m.seq!=null){ if(state.seen.has(m.seq)) return; state.seen.add(m.seq); }
  const p=m.payload||{};
  switch(ev){
    case "turn.started": state.turnId=m.turn_id; setRunning(true); break;
    case "turn.completed": setRunning(false); refreshActiveMeta(); processQueue(); break;
    case "turn.lifecycle": if(p.status&&p.status!=="in_progress"&&p.status!=="queued") setRunning(false); break;
    case "item.started": startItem(m.item_id, p.item); break;
    case "item.delta": deltaItem(m.item_id, p.delta, p.kind); break;
    case "item.completed": completeItem(m.item_id, p.item); break;
    case "item.failed": case "item.interrupted": completeItem(m.item_id, p.item, true); break;
    case "approval.required": approvalRequired(m, p); break;
    case "approval.decided": case "approval.timeout": approvalResolved(m,p,ev); break;
    case "sandbox.denied": sysnote("⛔ 沙箱拒绝: "+(p.detail||p.reason||"")); break;
  }
  scrollDown();
}

function startItem(id, item){
  if(!id||state.items.has(id)) return;
  const kind=item?.kind||"agent_message";
  const wrap=$("#mwrap"); let el, content;
  if(kind==="user_message"){
    if(state._optimUser){ el=state._optimUser; state._optimUser=null; content=el.querySelector(".content"); content.innerHTML=md(item.detail||item.summary||content.textContent||""); }   // 认领 send() 即时加的乐观气泡 → 不再重复渲染一条
    else { el=row("user","你"); content=el.querySelector(".content"); content.innerHTML=md(item.detail||item.summary||""); }
  }else if(kind==="agent_reasoning"){
    el=document.createElement("div"); el.className="reason";
    el.innerHTML=`<div class="head"><span class="caret">▸</span> 💭 思考过程</div><div class="rbody"></div>`;
    el.querySelector(".head").onclick=()=>el.classList.toggle("open");
    content=el.querySelector(".rbody"); content.textContent=item.detail||"";
  }else if(kind==="command_execution"){          // 终端块:$ 命令 + 输出
    el=document.createElement("div"); el.className="term";
    let cmd=""; try{ cmd=JSON.parse(item.detail||"{}").command||""; }catch{ cmd=item.detail||""; }
    el.innerHTML=`<div class="term-cmd"><span class="dollar">$</span>${esc(cmd)}</div><div class="term-out">运行中…</div>`;
    content=el.querySelector(".term-out");
  }else if(kind==="tool_call"||kind==="file_change"){
    el=document.createElement("div"); el.className="tool collapsible";   // 默认折叠,点头部展开(这类 JSON 一大坨,占屏)
    const label=kind==="file_change"?"✎ 文件改动":"🔧 工具调用";
    el.innerHTML=`<div class="th"><span class="caret">▸</span><span class="ic">${label}</span><span>${esc(item.summary||"")}</span></div><div class="tb">${esc(item.detail||"")}</div>`;
    el.querySelector(".th").onclick=()=>el.classList.toggle("open");
    content=el.querySelector(".tb");
  }else if(kind==="error"){
    el=document.createElement("div"); el.className="sysnote"; el.style.color="var(--err)"; el.textContent="⚠ "+(item.detail||item.summary||"错误"); content=el;
  }else if(kind==="context_compaction"||kind==="status"){
    el=document.createElement("div"); el.className="sysnote"; el.textContent="· "+(item.summary||item.detail||kind); content=el;
  }else{ // agent_message + fallback
    el=row("assistant","CodeWhale"); content=el.querySelector(".content"); content.innerHTML='<span class="typing"></span>';
  }
  wrap.appendChild(el); if(el) el.dataset.id=id;
  state.items.set(id,{el,content,kind,raw:(kind==="user_message"?"":(item?.detail||""))});
}
function deltaItem(id, delta, kind){
  if(delta==null) return;
  let it=state.items.get(id);
  if(!it){ startItem(id,{kind:kind||"agent_message",detail:"",summary:""}); it=state.items.get(id); }
  it.raw=(it.raw||"")+delta;
  if(it.kind==="agent_reasoning"){ it.content.textContent=it.raw; }
  else if(it.kind==="agent_message"||!["tool_call","command_execution","file_change","user_message","status","context_compaction","error"].includes(it.kind)){ it.content.innerHTML=md(it.raw); }
  else { it.content.textContent=it.raw; }
}
function completeItem(id, item, failed){
  const it=state.items.get(id); if(!it) { if(item) startItem(id,item); return; }
  const final = item?.detail!=null && item.detail!=="" ? item.detail : it.raw;
  if(it.kind==="command_execution"){            // 终端输出写进 term-out,失败标红
    it.content.textContent = (final && final.trim()) ? final : (failed ? "" : "(无输出)");
    if(failed) it.el.classList.add("failed");
    return;
  }
  if(it.kind==="agent_reasoning") it.content.textContent=final;
  else if(it.kind==="user_message") it.content.innerHTML=md(final);
  else if(["tool_call","file_change","status","context_compaction"].includes(it.kind)) it.content.textContent=final;
  else it.content.innerHTML=md(final);
  if(failed) it.el.style.opacity=.6;
}

/* ---------- approvals ---------- */
function approvalRequired(m,p){
  const aid=p.approval_id||p.id||m.approval_id; const tool=p.tool_name||p.tool||p.command||p.summary||"工具调用";
  const card=document.createElement("div"); card.className="tool needapproval"; card.dataset.aid=aid;
  card.innerHTML=`<div class="th"><span class="ic">🔧 待审批</span><span>${esc(tool)}</span></div>`+
    (p.detail?`<div class="tb">${esc(p.detail)}</div>`:"")+
    `<div class="approval"><span class="q">${esc(p.matched_rule?("规则: "+p.matched_rule):"是否允许执行?")}</span>`+
    `<button class="deny">拒绝</button><button class="allow">允许</button></div>`;
  $("#mwrap").appendChild(card);
  card.querySelector(".allow").onclick=()=>decide(aid,"allow",card);
  card.querySelector(".deny").onclick=()=>decide(aid,"deny",card);
  // 自动批准开启时,前端直接允许(不依赖后端 turn 启动时读取的标志)。延迟 400ms 并检查仍待审批,避免重放历史已决项时误触。
  if(state.autoApprove && aid){ setTimeout(()=>{ if(card.classList.contains("needapproval")) decide(aid,"allow",card,true); }, 400); }
  scrollDown();
}
async function decide(aid,decision,card,silent){
  try{ await api(`/v1/approvals/${aid}`,{method:"POST",body:JSON.stringify({decision,remember:false})});
    const a=card.querySelector(".approval"); if(a) a.innerHTML=`<span class="q">${decision==="allow"?("✓ 已允许"+(silent?" (自动)":"")):"✕ 已拒绝"}</span>`;
    card.classList.remove("needapproval");
  }catch(e){ if(!silent) alert("审批失败: "+e.message); }
}
function approvalResolved(m,p,ev){
  const aid=p.approval_id||p.id; const card=[...document.querySelectorAll(".tool")].find(c=>c.dataset.aid===aid);
  if(card){ const a=card.querySelector(".approval"); if(a) a.innerHTML=`<span class="q">${ev==="approval.timeout"?"⏱ 超时":(p.decision==="allow"?"✓ 已允许":"✕ 已拒绝")}</span>`; card.classList.remove("needapproval"); }
}

function execCopy(t){ return new Promise((res,rej)=>{ try{ const ta=document.createElement("textarea"); ta.value=t; ta.style.cssText="position:fixed;opacity:0;top:0;left:0"; document.body.appendChild(ta); ta.focus(); ta.select(); const ok=document.execCommand("copy"); ta.remove(); ok?res():rej(new Error("execCommand copy failed")); }catch(e){ rej(e); } }); }
function clipCopy(t){ if(navigator.clipboard && window.isSecureContext){ return navigator.clipboard.writeText(t).catch(()=>execCopy(t)); } return execCopy(t); }   // 优先 clipboard API;不存在(手机/LAN 非 HTTPS)或被拒(失焦/权限)都退回 execCommand
function msgText(msg){ const it=state.items.get(msg.dataset.id); return (it&&it.raw) || msg.querySelector(".content")?.innerText || ""; }
function copyMsg(btn,msg){ clipCopy(msgText(msg)).then(()=>{ btn.classList.add("ok"); const o=btn.textContent; btn.textContent="✓"; setTimeout(()=>{btn.textContent=o;btn.classList.remove("ok");},1000); }).catch(()=>{}); }
function editMsg(msg){ const inp=$("#input"); inp.value=msgText(msg); inp.dispatchEvent(new Event("input")); inp.focus(); try{inp.setSelectionRange(inp.value.length,inp.value.length);}catch{} }   // 调回输入框,光标到末尾,改完重发
function setRunning(r){

/* ---------- send ---------- */
async function send(queuedText){
  const inp=$("#input");
  let text=queuedText;
  if(text===undefined){ text=inp.value.trim(); if(!text && !state.attachments.length) return; inp.value=""; inp.style.height="auto"; text=withAttachments(text); _stick=true; }   // 新发:折入附件路径 + 贴底
  if(!text) return;
  try{
    if(!state.activeId){ const t=await createThread(); await openThread(t.id); loadThreads(); }   // loadThreads 只刷侧栏列表,不阻塞发送(它聚合多后端可能慢几秒);openThread 不依赖它
    // 乐观渲染:会话就绪后立刻显示用户消息 + 进入"运行中"(思考指示),不等 SSE。否则首条要等后端起 turn(~1s+,推理模型更久),
    // 这段时间窗口空白,体感像"卡住/过好久才显示"。真 user_message 事件到达时由 startItem 认领这个气泡,不重复。
    const oel=row("user","你"); oel.querySelector(".content").innerHTML=md(text); $("#mwrap").appendChild(oel); state._optimUser=oel; setRunning(true); scrollDown(true);
    const th=state.threads.find(x=>x.id===state.activeId);
    const freezeName = !th || !th.title || th.title==="New Thread";   // 首条消息 → 把名字锁成这句话,之后后端不再每轮重算
    const r=await api(`/v1/threads/${state.activeId}/turns`,{method:"POST",body:JSON.stringify({prompt:text})});
    state.turnId=r?.turn?.id||state.turnId; setRunning(true);
    if(freezeName){
      const title=text.replace(/\s+/g," ").trim().slice(0,40);
      api(`/v1/threads/${state.activeId}`,{method:"PATCH",body:JSON.stringify({title})}).then(()=>{
        const t2=state.threads.find(x=>x.id===state.activeId); if(t2) t2.title=title;
        if(state.activeId) $("#ttitle").textContent=title; state._sig=null; renderThreads();
      }).catch(()=>{});
    }
  }catch(e){
    if(state._optimUser){ state._optimUser.remove(); state._optimUser=null; }   // 发送失败/转排队 → 移除乐观气泡(由排队占位或错误提示接管)
    if(/\b409\b|active turn/i.test(e.message||"")){   // 该对话仍有一轮在跑(切回来误发/连点)→ 不报错,转为排队,turn 完成后自动发
      setRunning(true); state.queue.push({text, el:(()=>{ const el=document.createElement("div"); el.className="msg user queued"; el.innerHTML=`<div class="av">你</div><div class="body"><div class="who">⏳ 排队中(上一轮还在跑)</div><div class="content"></div><button class="qx" title="取消排队">✕</button></div>`; el.querySelector(".content").textContent=text; el.querySelector(".qx").onclick=()=>{ const i=state.queue.findIndex(q=>q.el===el); if(i>=0) state.queue.splice(i,1); el.remove(); }; $("#mwrap").appendChild(el); scrollDown(true); return el; })()});
      return;
    }
    inp.value=text; inp.style.height="auto"; inp.style.height=Math.min(inp.scrollHeight,200)+"px"; inp.focus();  // 失败:文字留回输入框
    $("#sendbtn").disabled=false;
    sysnote("发送失败: "+e.message);
  }
}
function enterSend(){ if(state.running) queueFromInput(); else send(); }   // 运行中=排队,空闲=直接发
function queueFromInput(){
  const inp=$("#input"); const raw=inp.value.trim(); if(!raw && !state.attachments.length) return;
  const text=withAttachments(raw);   // 排队时就折入附件(否则等发送时附件可能已被后一条消息清掉)
  inp.value=""; inp.style.height="auto"; $("#sendbtn").disabled=true;
  const el=document.createElement("div"); el.className="msg user queued";
  el.innerHTML=`<div class="av">你</div><div class="body"><div class="who">⏳ 排队中</div><div class="content"></div><button class="qx" title="取消排队">✕</button></div>`;
  el.querySelector(".content").textContent=raw||"(附件)";
  el.querySelector(".qx").onclick=()=>{ const i=state.queue.findIndex(q=>q.el===el); if(i>=0) state.queue.splice(i,1); el.remove(); };
  $("#mwrap").appendChild(el); scrollDown(true);
  state.queue.push({text, el});
}
function processQueue(){   // 当前任务结束后,自动发下一条排队消息
  if(state.running || !state.queue.length) return;
  const item=state.queue.shift(); item.el.remove();   // 移除占位,真消息由 turn 事件渲染
  send(item.text);
}
async function interrupt(){
  if(!state.activeId) return;
  let turn=state.turnId;
  if(!turn){ try{ const rec=await api(`/v1/threads/${state.activeId}`); turn=(rec.thread||rec).latest_turn_id; }catch{} }  // turnId 丢了就查回来
  if(!turn) return;
  try{ await api(`/v1/threads/${state.activeId}/turns/${turn}/interrupt`,{method:"POST",body:"{}"}); setRunning(false);
    if(state.queue.length){ state.queue.forEach(q=>q.el.remove()); state.queue=[]; }   // 停止=连排队的也取消
    sysnote("⏹ 已请求停止"); }
  catch(e){ sysnote("停止失败: "+e.message); }
}
async function newThread(){
  try{ const t=await createThread(); await loadThreads(); openThread(t.id); $("#input").focus(); }
  catch(e){ alert("新建失败: "+e.message); }
}

/* ---------- 附件上传 ---------- */
async function uploadFiles(files){
  for(const f of files){
    if(f.size>50*1024*1024){ sysnote("⚠ "+f.name+" 超过 50MB,跳过"); continue; }
    try{
      const buf=await f.arrayBuffer();
      const r=await fetch(url("/api/upload"),{method:"POST",headers:{...auth,"X-Filename":encodeURIComponent(f.name)},body:buf});
      const d=await r.json();
      if(d.path) state.attachments.push({name:d.name,path:d.path}); else sysnote("⚠ 上传失败: "+(d.error||f.name));
    }catch(e){ sysnote("⚠ 上传失败: "+e.message); }
  }
  renderAttach();
}
function renderAttach(){
  const bar=$("#attachbar"); bar.innerHTML="";
  state.attachments.forEach((a,i)=>{
    const c=document.createElement("div"); c.className="chip";
    c.innerHTML=`<span class="nm" title="${esc(a.path)}">📎 ${esc(a.name)}</span><span class="x">✕</span>`;
    c.querySelector(".x").onclick=()=>{ state.attachments.splice(i,1); renderAttach(); };
    bar.appendChild(c);
  });
  $("#sendbtn").disabled=!state.running && !$("#input").value.trim() && !state.attachments.length;
}
function withAttachments(text){   // 把附件路径折进 prompt,让 agent 用 read_file 读;然后清空
  if(!state.attachments.length) return text;
  const refs=state.attachments.map(a=>"- "+a.path).join("\n");
  const out=`我上传了以下文件,请先用 read_file 读取再回答:\n${refs}\n\n${text}`.trim();
  state.attachments=[]; renderAttach();
  return out;
}

    } else { $("#mvariantrow").style.display="none"; $("#mmodel").parentElement.style.display="flex"; $("#mmodel").value=p.model||""; }
    if(EFFORT_PROVIDERS.includes(sel.value)){ $("#meffortrow").style.display="flex"; $("#meffort").value=(window._effortPrefs&&window._effortPrefs[sel.value])||""; }   // Claude / GPT 有推理 effort
    else $("#meffortrow").style.display="none";
    $("#mkeyrow").style.display=p.oauth?"none":"flex";
    $("#mkey").placeholder=p.oauth?"OAuth 登录,无需 key":(keyed[p.id]?"已配置,留空=不改":"必填:该 provider 的 API key");
    const sw=$("#mswitch"); if(sw) sw.textContent=p.newchatOnly?"设为新对话模型":"切换并重启后端"; };   // newchatOnly(claude 订阅)不重启主后端
  sel.onchange=sync; sync();
  $("#mswitch").onclick=async()=>{
    const provider=sel.value, api_key=$("#mkey").value;
    const p=PROVIDERS.find(x=>x.id===provider)||{};
    const vars=MODEL_VARIANTS[provider]||[];
    const variant = vars.length ? $("#mvariant").value : $("#mmodel").value.trim();   // 所选模型变体
    if(!p.oauth && !keyed[provider] && !api_key){ alert("该 provider 还没配置 key —— 请先填 API key"); return; }
    const b=$("#mswitch"); b.textContent=p.newchatOnly?"切换中…":"切换中,重启后端…"; b.disabled=true;
    try{
      if(p.newchatOnly){
        // claude-code(订阅,委派 claude -p)不能当 launchd 主后端(官方二进制不识别)→ 只设"新对话 provider":
        // 新对话走它的独立后端 :7900,主后端 :7878 保持原默认(deepseek)不动、不重启。
        await api("/api/newchat-provider",{method:"POST",body:JSON.stringify({provider})});
      } else {
        // set_model 用安全 model:deepseek 可填具体 id,其它非 deepseek 必须 auto(否则 default_text_model 被当 deepseek 字段校验、启动失败);变体走 pref
        const sm = (provider==="deepseek") ? (variant||p.model||"auto") : (p.model||"auto");
        const d=await api("/api/model",{method:"POST",body:JSON.stringify({provider,model:sm,api_key})});
        if(d.error){ alert("切换失败: "+d.error); b.textContent="切换并重启后端"; b.disabled=false; return; }
        try{ await api("/api/newchat-provider",{method:"POST",body:JSON.stringify({provider})}); }catch(e){}   // 新对话锁定此 provider(每对话锁模型)
      }
      const body={provider}; if(variant) body.model=variant; if(EFFORT_PROVIDERS.includes(provider)) body.effort=$("#meffort").value;   // 模型变体 + Claude/GPT effort 存 pref(单窗口+对比共用)
      if(body.model||"effort" in body){ try{ await api("/api/model-pref",{method:"POST",body:JSON.stringify(body)}); }catch(e){} }
      b.textContent="✓ 已切换 "+(PROV_SHORT[provider]||provider)+(variant?(" · "+variant):"");
      setTimeout(()=>{ const a=state.activeId; closeModal(); closeStream(); loadThreads(); loadModelLabel(); loadBalance(); if(a) openThread(a); }, 700);   // 软刷新:重拉对话 + 模型名 + 余额 + 重连当前会话流,不整页白屏重载(后端已 health-check 过)
    }catch(e){ alert("切换失败: "+e.message); b.textContent="切换并重启后端"; b.disabled=false; }
  };
}

      if(d.available){ const b=document.createElement("button"); b.className="btn primary"; b.textContent="↑ 更新到 "+d.latest; b.onclick=()=>applyUpd(b,"/api/update/gui/apply"); a.innerHTML=""; a.appendChild(b); }
      else a.innerHTML='<span class="st ok">已是最新</span>';
    }catch(e){ a.innerHTML='<span class="st err">检查失败</span>'; }
  })();
  (async()=>{ const a=$("#u_cw_act"), c=$("#u_cw");
    try{ const d=await (await fetch(url("/api/update/check"))).json(); c.textContent=" 当前 "+(d.current||"?");

async function applyUpd(btn,endpoint){
  if(endpoint.indexOf("/gui/")>=0){   // 界面更新:异步 + 下载/校验/应用 进度条
    if(!(await cwConfirm("开始更新界面?会下载、校验数字签名 + SHA-256 后替换并重启(会话数据不丢)。"))) return;
    return guiUpdateWithProgress(btn.parentNode);
  }
  // 后端(codewhale update):子进程,无细粒度进度,沿用同步
  if(!(await cwConfirm("开始更新?会下载、校验后替换并重启(几秒,会话数据不丢)。"))) return;
  btn.disabled=true; btn.textContent="⏳ 更新中…";
  try{ const r=await api(endpoint,{method:"POST",body:"{}"});
    if(r.ok){ btn.textContent="✓ 重启中…"; setTimeout(()=>location.reload(),4800); }
    else { btn.disabled=false; btn.textContent="✗ 重试"; alert("更新失败:\n"+(r.error||r.output||"未知错误")); }
  }catch(e){ btn.disabled=false; btn.textContent="✗ 重试"; alert("更新出错: "+e.message); }
}
// 界面更新进度:启动异步作业 → 每 400ms 轮询进度 → 画下载/校验/应用进度条 → 完成自动刷新
async function guiUpdateWithProgress(box){
  box.innerHTML='<div class="updprog"><div class="updbar"><div class="updfill"></div></div><div class="updtxt">开始…</div></div>';
  const fill=box.querySelector(".updfill"), txt=box.querySelector(".updtxt");
  let start; try{ start=await api("/api/update/gui/apply",{method:"POST",body:"{}"}); }
  catch(e){ txt.innerHTML='<span class="st err">启动失败:'+esc(e.message)+'</span>'; return; }
  if(start && start.error){ txt.innerHTML='<span class="st err">'+esc(start.error)+'</span>'; return; }
  const LAB={checking:"检查中",downloading:"下载中",verifying:"校验签名/完整性",applying:"应用中",restarting:"重启中"};
  const mb=n=>((n||0)/1048576).toFixed(1);
  const poll=setInterval(async()=>{
    let p; try{ p=await api("/api/update/gui/progress"); }catch(e){ return; }
    if(p.phase==="downloading"){ fill.style.width=(p.pct||0)+"%"; txt.textContent=`下载中 ${p.pct||0}%  (${mb(p.downloaded)}/${mb(p.total)} MB)`; }
    else if(!p.done){ fill.style.width="100%"; txt.textContent=(LAB[p.phase]||p.phase||"处理中")+"…"; }
    if(p.done){
      clearInterval(poll);
      if(p.error){ fill.classList.add("err"); txt.innerHTML='<span class="st err">更新失败:'+esc(p.error)+'</span>'; }
      else { fill.style.width="100%"; txt.textContent="✓ 更新完成 "+(p.version||"")+",重启中…"; setTimeout(()=>location.reload(),4500); }
    }
  },400);
}

async function restoreCompareSession(sess){   // 点侧栏对比会话 → 打开对比窗口,恢复各栏 thread + 逐栏回填历史,回到当时对话
  closeDrawer();
  CMP.sessionId=sess.id;
  CMP.threads={...(sess.threads||{})}; CMP.seq={}; CMP.turn={}; CMP.running={}; CMP.busy=false; CMP.sendQ=[]; CMP.dispatching={}; CMP.attachments=[]; CMP.maxed=null;
  CMP.sel=new Set(Object.keys(sess.threads||{}));
  if(CMP.sel.size===0) CMP.sel.add("deepseek");
  $("#cmpView").hidden=false;
  try{ const d=await api("/api/model"); CMP.keyed=d.keyed||{}; }catch(e){}
  try{ const mp=await api("/api/model-pref"); CMP.modelPrefs=mp.prefs||{}; CMP.modelEffort=mp.effort||{}; }catch(e){}
  renderCmpChips(); renderCmpCols(); renderCmpToggles(); cmpSyncSendUI(); cmpRenderAttach();
  setCmpLayout(_cmpLay);
  document.querySelectorAll("#cmpLayout .laybtn").forEach(b=>b.onclick=()=>setCmpLayout(b.dataset.l));
  api("/api/compare/ensure",{method:"POST",body:JSON.stringify({providers:[...CMP.sel]})}).catch(()=>{});   // 起后端(载历史只读不依赖它,但追问要)
  for(const prov of CMP.sel){ cmpLoadHistory(prov, sess.threads[prov]); }   // 并发逐栏回填
  setTimeout(()=>{ const i=$("#cmpInput"); if(i) i.focus(); },60);
}
async function cmpLoadHistory(prov,tid){   // 拉某栏 thread 全部 item,渲染成问答气泡(过程/工具项略过,回看以对话为主)
  const b=$("#cmpb-"+CSS.escape(prov)); if(b) b.innerHTML='<div class="cmpmsg a sysnote">· 载入历史…</div>';
  if(!tid){ if(b) b.innerHTML=""; return; }
  try{
    const rec=await (await fetch(url(`/cmp/${prov}/v1/threads/${tid}`))).json();
    CMP.seq[prov]=rec.latest_seq||0;
    if(b) b.innerHTML="";
    let n=0;
    for(const it of (rec.items||[])){
      const k=it.kind||"", txt = it.text!=null?it.text : (it.detail!=null?it.detail : (it.summary||""));
      if(k==="user_message"||k==="user"){ cmpAddMsg(prov,"u",esc(txt.replace(/^【本机网络环境[\s\S]*?】\s*/,""))); n++; }   // 旧会话存进去的 prompt 可能带历史遗留的网络指引前缀,显示时去掉
      else if(k==="agent_message"){ cmpAddMsg(prov,"a",'<span class="ans md">'+md(txt)+'</span>'); n++; }
    }
    if(!n) cmpAddMsg(prov,"a sysnote","(无历史内容)");
  }catch(e){ if(b) b.innerHTML=""; cmpAddMsg(prov,"a err","✗ 载入历史失败:"+esc(e.message||"")); }
}
let _cmpLay = localStorage.getItem("cw_cmplay") || "row";   // 对比栏排列:row 横列 / col 竖列 / grid 田字格(持久化)
function setCmpLayout(l){
  _cmpLay = (["row","col","grid"].includes(l)?l:"row"); try{localStorage.setItem("cw_cmplay",_cmpLay);}catch(e){}
  const box=$("#cmpCols"); if(box){ box.classList.remove("lay-col","lay-grid"); if(_cmpLay==="col")box.classList.add("lay-col"); else if(_cmpLay==="grid")box.classList.add("lay-grid"); }
  document.querySelectorAll("#cmpLayout .laybtn").forEach(b=>b.classList.toggle("on", b.dataset.l===_cmpLay));
}

function renderCmpChips(){
  const box=$("#cmpChips");
  box.innerHTML=PROVIDERS.map(p=>{
    const on=CMP.sel.has(p.id), nokey=!p.oauth && !CMP.keyed[p.id];

function renderCmpCols(){   // diff:保留已有栏内容,只增删变化的
  const box=$("#cmpCols");
  [...box.querySelectorAll(".cmpcol")].forEach(c=>{ if(!CMP.sel.has(c.dataset.p)) c.remove(); });
  PROVIDERS.filter(p=>CMP.sel.has(p.id)).forEach(p=>{
    if(box.querySelector('.cmpcol[data-p="'+p.id+'"]')) return;
    const d=document.createElement("div"); d.className="cmpcol"; d.dataset.p=p.id;
    const nm=PROV_SHORT[p.id]||p.name;
    const vars=MODEL_VARIANTS[p.id]||[];
    const cur=(CMP.modelPrefs&&CMP.modelPrefs[p.id])||CMP_FORCE_MODEL[p.id]||(vars[0]&&vars[0].id)||"auto";
    // 模型下拉:只要有预设变体就用下拉(单变体也是,避免点静态徽章误触发最大化)
    let modelEl = vars.length
      ? `<select class="cmpmodel cmpmodelsel" data-p="${p.id}" title="选这栏的模型变体(下条起生效)">${vars.map(v=>`<option value="${esc(v.id)}" ${v.id===cur?"selected":""}>${esc(v.name)}</option>`).join("")}</select>`
      : `<span class="cmpmodel" title="此栏实际调用的模型">${esc(cur)}</span>`;
    if(EFFORT_PROVIDERS.includes(p.id)){   // Claude / GPT:推理 effort 下拉(下条起生效)
      const ce=(CMP.modelEffort&&CMP.modelEffort[p.id])||"";
      modelEl += `<select class="cmpmodel cmpeffortsel" data-p="${p.id}" title="推理 effort(下条起生效)">${EFFORT_OPTS.map(o=>`<option value="${o.v}" ${o.v===ce?"selected":""}>${o.n}</option>`).join("")}</select>`;
    }
    d.innerHTML=`<div class="cmpcol-h" data-p="${p.id}"><span class="cnm">${nm}</span>`+
      modelEl+
      `<span class="st" id="cmpst-${p.id}"></span>`+
      `<button class="cmpstop" id="cmpstop-${p.id}" title="暂停这个模型当前的回答" hidden>■ 停止</button></div>`+
      `<div class="cmpcol-b" id="cmpb-${p.id}"></div>`+
      `<div class="cmpcol-f"><textarea class="cmpcolin" id="cmpin-${p.id}" rows="1" placeholder="只追问 ${nm}…（Enter 发送）"></textarea><button class="cmpcolsend" id="cmpcsend-${p.id}" title="只发给 ${nm}（单独继续这个对话）">→</button></div>`;
    box.appendChild(d);
    const sel=d.querySelector(".cmpmodelsel"); if(sel){ sel.addEventListener("click",e=>e.stopPropagation()); sel.addEventListener("change",e=>{ e.stopPropagation(); cmpSetModel(p.id, e.target.value); }); }
    const esl=d.querySelector(".cmpeffortsel"); if(esl){ esl.addEventListener("click",e=>e.stopPropagation()); esl.addEventListener("change",e=>{ e.stopPropagation(); cmpSetEffort(p.id, e.target.value); }); }
    d.querySelector(".cmpcol-h").onclick=(e)=>{ if(e.target.closest(".cmpstop")||e.target.closest(".cmpmodelsel")||e.target.closest(".cmpeffortsel")) return; toggleMax(p.id); };   // 点头部=最大化;点「停止」/下拉 不触发
    d.querySelector(".cmpstop").onclick=(e)=>{ e.stopPropagation(); cmpStop(p.id); };
    const ci=d.querySelector(".cmpcolin"), cs=d.querySelector(".cmpcolsend");
    cs.onclick=()=>cmpRunOne(p.id);
    ci.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ if(e.isComposing||e.keyCode===229)return; e.preventDefault(); cmpRunOne(p.id);} });
    ci.addEventListener("input",()=>{ ci.style.height="auto"; ci.style.height=Math.min(ci.scrollHeight,90)+"px"; });
  });
}
// 单栏运行态:跑时显示「停止」+ 禁该栏追问框,完成后复原
function cmpSetRunning(prov,on){
  CMP.running[prov]=on;
  const stop=$("#cmpstop-"+CSS.escape(prov)); if(stop) stop.hidden=!on;
  const cs=$("#cmpcsend-"+CSS.escape(prov)); if(cs) cs.disabled=on;
  cmpSyncSendUI();   // 刷新「引导」按钮显隐(列停了就收起)
}
async function cmpStop(prov){   // 暂停单个对话:中断该栏当前 turn(中断后 SSE 会发 completed/interrupted → finish 收尾)
  const tid=CMP.threads[prov], turn=CMP.turn[prov];
  const st=$("#cmpst-"+CSS.escape(prov));
  if(!tid||!turn){ if(st) st.textContent="⏸"; return; }
  try{ await fetch(url(`/cmp/${prov}/v1/threads/${tid}/turns/${turn}/interrupt`),{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"}); }catch(e){}
  if(st) st.textContent="⏸ 已暂停";
}
async function cmpRunOne(prov){   // 只追问这一个模型(单独继续该栏对话)
  const inp=$("#cmpin-"+CSS.escape(prov)); if(!inp) return;
  const text=(inp.value||"").trim();
  if(!text || CMP.running[prov] || CMP.dispatching[prov]) return;   // 该栏在跑或正在派发(ensure 间隙)→ 拦住,避免同栏并发把气泡冲乱
  CMP.dispatching[prov]=true;   // 同步占位锁:在 await 之前就置上,关闭"重复 Enter"窗口
  inp.value=""; inp.style.height="auto";
  cmpAddMsg(prov,"u",esc(text));
  try{
    let ensured={}; try{ ensured=await api("/api/compare/ensure",{method:"POST",body:JSON.stringify({providers:[prov]})}); }catch(e){}
    await cmpRun(prov,text,ensured[prov]);
  } finally { CMP.dispatching[prov]=false; cmpMaybeFlush(); }   // 该栏结束→若有排队的全栏发送在等,顺手 flush
}
async function cmpResetBackends(){   // 重启所有对比后端(残留后端连不上各自端点→回退 DeepSeek 时用):杀掉旧后端 + 清历史,下次发送用最新配置/key 冷启
  if(!(await cwConfirm("重启所有对比后端?会清空各栏当前历史,并用最新配置 / key 重新连接各模型(几秒)。\n用于:某个模型栏回答的不是它本人(回退成了 DeepSeek)。"))) return;

  CMP.threads={}; CMP.seq={}; CMP.turn={}; CMP.running={}; CMP.busy=false; CMP.sendQ=[]; CMP.dispatching={}; CMP.attachments=[]; cmpSyncSendUI(); cmpRenderAttach();
  [...CMP.sel].forEach(p=>{ const b=$("#cmpb-"+CSS.escape(p)); if(b) b.innerHTML=""; const s=$("#cmpst-"+CSS.escape(p)); if(s) s.textContent=""; const stop=$("#cmpstop-"+CSS.escape(p)); if(stop) stop.hidden=true; const cs=$("#cmpcsend-"+CSS.escape(p)); if(cs) cs.disabled=false; });

  [...CMP.sel].forEach(p=>{ const b=$("#cmpb-"+CSS.escape(p)); if(b) b.innerHTML=""; const s=$("#cmpst-"+CSS.escape(p)); if(s) s.textContent=""; const stop=$("#cmpstop-"+CSS.escape(p)); if(stop) stop.hidden=true; const cs=$("#cmpcsend-"+CSS.escape(p)); if(cs) cs.disabled=false; });

function toggleMax(p){
  const cols=$("#cmpCols").querySelectorAll(".cmpcol");
  if(CMP.maxed===p){ CMP.maxed=null; cols.forEach(c=>c.classList.remove("max","hide")); }
  else { CMP.maxed=p; cols.forEach(c=>{ const me=c.dataset.p===p; c.classList.toggle("max",me); c.classList.toggle("hide",!me); }); }
}
function cmpAddMsg(p,cls,html){ const b=$("#cmpb-"+CSS.escape(p)); if(!b) return null; const d=document.createElement("div"); d.className="cmpmsg "+cls; d.innerHTML=html; b.appendChild(d); b.scrollTop=b.scrollHeight; return d; }
// 是否有任何对比活动在进行(全局轮 / 任一栏在跑或派发中)→ 用于发送串行化,杜绝并发轮把气泡顺序冲乱
function cmpAnyBusy(){ return CMP.busy || Object.values(CMP.running).some(Boolean) || Object.values(CMP.dispatching).some(Boolean); }
// 同步发送区 UI:busy 时按钮显「发送中…/排队 N」、输入框 placeholder 改提示,但按钮不禁用(点/Enter 都能继续排队)
function cmpSyncSendUI(){
  const btn=$("#cmpSendBtn"), ta=$("#cmpInput"), q=CMP.sendQ.length;
  if(btn) btn.textContent=CMP.busy?(q?("发送中·排队"+q):"发送中…"):"发送";
  if(ta) ta.placeholder=CMP.busy?"回答进行中,再发会排队,完成后自动按序发送…":"输入一个问题,同时发给所有选中的模型…（Enter 发送 · Shift+Enter 换行）";
  const qb=$("#cmpQueue");   // 队列条:把排队中的问题原文显示出来,每条可单独 ✕ 撤销
  if(qb){
    if(!q){ qb.hidden=true; qb.innerHTML=""; }
    else{
      qb.hidden=false;
      qb.innerHTML='<span class="cmpqlbl">⏳ 排队中（完成当前轮后按序自动发）：</span>'+
        CMP.sendQ.map((it,i)=>{const d=(it&&it.disp!==undefined)?it.disp:it;return `<span class="cmpqchip" title="${esc(d)}"><span>${esc(d)}</span><b data-i="${i}" title="取消这条">✕</b></span>`;}).join("");
      qb.querySelectorAll(".cmpqchip b").forEach(x=>x.onclick=()=>{ CMP.sendQ.splice(+x.dataset.i,1); cmpSyncSendUI(); });
    }
  }
  const sb=$("#cmpSteerBtn"); if(sb) sb.hidden=![...CMP.sel].some(p=>CMP.running[p]&&CMP.turn[p]);   // 有正在跑(且有活动 turn)的列才显「引导」
}
// 引导:把输入插进所有正在跑的列的当前 turn(steering),实时改变它们的输出。全模型支持(实测 deepseek/gpt 都被引导停)。
async function cmpSteer(){
  const ta=$("#cmpInput"); const text=(ta.value||"").trim();
  if(!text) return;
  const running=[...CMP.sel].filter(p=>CMP.running[p] && CMP.threads[p] && CMP.turn[p]);   // 正在跑且有活动 turn 的列
  if(!running.length){ cwToast("没有正在运行的对话可引导;直接「发送」即可"); return; }
  ta.value=""; ta.style.height="auto";
  running.forEach(p=>cmpAddMsg(p,"u steer",'⤵ 引导:'+esc(text)));   // 显示引导气泡
  await Promise.allSettled(running.map(p=>
    fetch(url(`/cmp/${p}/v1/threads/${CMP.threads[p]}/turns/${CMP.turn[p]}/steer`),
      {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:text})})
      .then(r=>{ if(!r.ok) return r.text().then(t=>{throw new Error(t.slice(0,80))}); })
      .catch(e=>cmpAddMsg(p,"a err","✗ 引导失败:"+esc(String(e&&e.message||e))))
  ));
}
async function cmpSend(){
  const ta=$("#cmpInput"); const raw=(ta.value||"").trim();
  if(!raw && !CMP.attachments.length) return;   // 有字或有附件就能发
  ta.value=""; ta.style.height="auto";
  const atts=CMP.attachments.slice(); CMP.attachments=[]; cmpRenderAttach();   // 取走本轮附件并清空附件栏
  // sent=发给模型(折入文件路径,让各栏 read_file 读);disp=气泡显示(原文 + 附件名)
  const sent=atts.length ? `我上传了以下文件,请先用 read_file 读取再回答:\n${atts.map(a=>"- "+a.path).join("\n")}\n\n${raw}`.trim() : raw;
  const disp=raw+(atts.length?("  📎 "+atts.map(a=>a.name).join(", ")):"");
  const item={sent,disp};
  // ★ 串行化:上一轮还没渲染完(busy/有栏在跑)就再发 → 缓存进队列,等当前轮全部完成后自动按序发出。
  //   否则两轮的用户气泡会被前置堆叠成「问1 问2 答1 答2」,对话顺序错乱(用户报的"显示混乱")。
  if(cmpAnyBusy()){ CMP.sendQ.push(item); cmpSyncSendUI(); return; }
  await cmpDispatch(item);
}
async function cmpDispatch(item){   // item={sent:发给模型(含附件路径), disp:气泡显示}。原子一轮:先加用户气泡→ensure→并发 cmpRun
  CMP.busy=true; cmpSyncSendUI();
  const provs=[...CMP.sel];
  if(!CMP.sessionId){   // 新对比的首次发送 → 建会话(主题=首个问题,后续追问沿用同会话)
    CMP.sessionId="cmps_"+Math.random().toString(36).slice(2,9)+state.cmpSessions.length;
    const topic=((item.disp||"").replace(/\s*📎.*$/,"").trim().slice(0,80))||"(无标题对比)";
    cmpSessionUpsert({id:CMP.sessionId, topic, ts:Date.now(), providers:provs.slice(), threads:{}});
  }
  provs.forEach(p=>{ cmpAddMsg(p,"u",esc(item.disp)); const s=$("#cmpst-"+CSS.escape(p)); if(s) s.textContent="启动…"; });   // 立即显示用户气泡 + 启动中,不等后端
  try{
    let ensured={}; try{ ensured=await api("/api/compare/ensure",{method:"POST",body:JSON.stringify({providers:provs})}); }catch(e){}
    await Promise.allSettled(provs.map(p=>cmpRun(p,item.sent,ensured[p])));   // allSettled:某栏 cmpRun 抛错也不连累整体,不会卡住「发送中」
  } finally {
    CMP.busy=false; cmpSyncSendUI();   // 兜底:无论本轮怎样都复位发送状态,杜绝按钮卡在「发送中…」(其实已发完)
    cmpMaybeFlush();   // 本轮收尾→若队列里还有缓存的问题,自动发下一条(保持 问→答→问→答 顺序)
  }
}
// ── 对比附件(主输入框:文件发给所有栏)── 上传到 /api/upload 拿文件系统路径,各 provider 后端都能 read_file 读
async function cmpUploadFiles(files){
  for(const f of files){
    if(f.size>50*1024*1024){ cwToast("⚠ "+f.name+" 超过 50MB,跳过"); continue; }
    try{
      const buf=await f.arrayBuffer();
      const r=await fetch(url("/api/upload"),{method:"POST",headers:{...auth,"X-Filename":encodeURIComponent(f.name)},body:buf});
      const d=await r.json();
      if(d.path) CMP.attachments.push({name:d.name,path:d.path}); else cwToast("⚠ 上传失败: "+(d.error||f.name));
    }catch(e){ cwToast("⚠ 上传失败: "+e.message); }
  }
  cmpRenderAttach();
}
function cmpRenderAttach(){   // 附件栏(输入框上方):chip + ✕ 移除
  const bar=$("#cmpAttachBar"); if(!bar) return;
  bar.innerHTML=""; bar.hidden=!CMP.attachments.length;
  CMP.attachments.forEach((a,i)=>{
    const c=document.createElement("div"); c.className="chip";
    c.innerHTML=`<span class="nm" title="${esc(a.path)}">📎 ${esc(a.name)}</span><span class="x">✕</span>`;
    c.querySelector(".x").onclick=()=>{ CMP.attachments.splice(i,1); cmpRenderAttach(); };
    bar.appendChild(c);
  });
}
function cmpMaybeFlush(){ if(!cmpAnyBusy() && CMP.sendQ.length){ const next=CMP.sendQ.shift(); cmpSyncSendUI(); cmpDispatch(next); } else cmpSyncSendUI(); }
async function cmpRun(prov,text,ens){
  const st=$("#cmpst-"+CSS.escape(prov));   // 用户气泡已在 cmpSend 里即时加过
  if(ens && ens.ok===false){ cmpAddMsg(prov,"a err","✗ 后端启动失败:"+esc(ens.error||"")); if(st)st.textContent="✗"; return; }
  const cb=$("#cmpb-"+CSS.escape(prov));
  // 过程块:思考 + 工具/命令调用都收进来,默认折叠,点头部展开;答案气泡始终可见在下面
  const proc=document.createElement("div"); proc.className="cmpproc collapsed";
  proc.innerHTML=`<div class="cmpproc-h"><span class="car">▸</span> ⚙️ 过程 <span class="cnt">0</span> 步</div><div class="cmpproc-b"><div class="rsn"></div></div>`;
  if(cb) cb.appendChild(proc);
  proc.querySelector(".cmpproc-h").onclick=()=>proc.classList.toggle("collapsed");
  const rsn=proc.querySelector(".rsn"), procCnt=proc.querySelector(".cnt"), procBody=proc.querySelector(".cmpproc-b");
  let steps=0;
  const addStep=(t)=>{ const d=document.createElement("div"); d.className="cmpstep"; d.textContent=t; procBody.appendChild(d); procCnt.textContent=(++steps); const x=$("#cmpb-"+CSS.escape(prov)); if(x) x.scrollTop=x.scrollHeight; };
  const A=cmpAddMsg(prov,"a",`<span class="ans"></span><span class="cur">▍</span>`);
  if(!A){ if(st)st.textContent="✗ 此栏未就绪"; cmpSetRunning(prov,false); return; }   // 该 provider 没渲染出列(#cmpb 缺)→ 优雅跳过,绝不抛错连累 Promise.all
  const ans=A.querySelector(".ans"), cur=A.querySelector(".cur");
  if(st)st.textContent="思考…";
  try{
    if(!CMP.threads[prov]){
      const t=await (await fetch(url(`/cmp/${prov}/v1/threads`),{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"})).json();   // 不前端钉 model,由服务端按 model_prefs 注入(claude-code→sonnet 路由键,其它→所选变体)
      CMP.threads[prov]=t.id; CMP.seq[prov]=0;
      api("/api/pin-thread",{method:"POST",body:JSON.stringify({tid:t.id,provider:prov})}).catch(()=>{});   // 锁定到本 provider → 主窗口侧栏正确标 GLM/GPT,不再误显默认 DeepSeek
      markCmp(t.id);   // 登记为对比 thread → 主窗口侧栏归入「多模型对比」组,不灌进普通对话列表
      cmpSessionRecordThread(prov,t.id);   // 记进当前对比会话 → 侧栏会话行能点回来恢复这一栏
    }
    const tid=CMP.threads[prov];
    cmpSetRunning(prov,true);
    // 每轮按当前开关设会话标志(自动批准 / 允许 shell)→ 让模型能联网取数、跳出沙箱
    await fetch(url(`/cmp/${prov}/v1/threads/${tid}`),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({auto_approve:CMP.autoApprove, allow_shell:CMP.allowShell})}).catch(()=>{});
    // ★ since_seq 取「发 turn 前的当前 latest_seq」,只听本轮新事件、绝不重放历史——
    //   否则追问时会把上一轮的 turn.completed/旧增量重放进来,导致 ✓0s 误收尾、流式不同步、答案吞掉。
    let since=CMP.seq[prov]||0;
    try{ const ti=await (await fetch(url(`/cmp/${prov}/v1/threads/${tid}`))).json(); if(typeof ti.latest_seq==="number") since=ti.latest_seq; }catch(e){}
    // 不再往用户 prompt 里前置任何网络指引——它会被模型复述、或在恢复历史时显示出来(felix 嫌它显示)。
    // fake-ip 下「fetch_url 被拦 → 用 curl / web_search」的引导已写在 compare-research skill 的系统提示里(server.py ~876 行),
    // 对模型不可见地生效;非 shell 工具 / MCP / web_search 始终可用,Shell 开关只额外控制 exec_shell(上面 PATCH 的 allow_shell)。
    const sendText=text;
    let myTurn=null;
    try{ const tr=await (await fetch(url(`/cmp/${prov}/v1/threads/${tid}/turns`),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:sendText})})).json();
      myTurn=(tr&&((tr.turn&&tr.turn.id)||tr.id))||null;   // 本轮 turn id:SSE 只认本轮事件,重放的旧轮一律忽略
    }catch(e){}
    await new Promise(resolve=>{
      const es=new EventSource(url(`/cmp/${prov}/v1/threads/${tid}/events?since_seq=${since}`));
      let done=false, sawTool=false, grace=null, phase="思考中", tick=null, poll=null, idle=null; const t0=Date.now();
      const secs=()=>Math.round((Date.now()-t0)/1000);
      const finish=(failed)=>{ if(done)return; done=true; clearTimeout(grace); clearTimeout(idle); clearInterval(tick); clearInterval(poll); try{es.close()}catch(e){} cmpSetRunning(prov,false); CMP.turn[prov]=null; if(cur)cur.remove(); if(ans&&!failed&&ans.textContent.trim()&&!ans.classList.contains("md")){ try{ ans.innerHTML=md(ans.textContent); ans.classList.add("md"); }catch(e){} }   // 收尾把流式纯文本整体重渲染成 markdown(跟单窗口一致);失败/已渲染则不动
        if(steps===0&&!rsn.textContent.trim()&&proc.parentNode)proc.remove(); if(A&&!ans.textContent.trim()&&!failed)A.remove(); if(st&&!/^[✓✗⏸⏱]/.test(st.textContent))st.textContent="✓ "+secs()+"s"; resolve(); };
      // 空闲超时:只要还在出 SSE 事件(模型在干活)就一直续命;真正静默 180s 才判卡住。深度研究任务工具步骤多、跑很久也不会被误杀(原来死板的 240s 绝对超时会把没跑完的长任务一刀切)。
      const onIdle=()=>{ if(st&&!/^[✓✗⏸⏱]/.test(st.textContent)) st.textContent="⏱ 似乎卡住("+secs()+"s)"; finish(true); };
      const bump=()=>{ clearTimeout(idle); idle=setTimeout(onIdle, 180000); };
      const statusText=()=>phase+(steps?" · "+steps+"步":"")+" · "+secs()+"s";   // 工作状态:阶段 · 已跑步数 · 已用秒(步数涨/秒在跳=还在干活)
      const setPhase=(p)=>{ phase=p; if(st&&!/^[✓✗⏸⏱]/.test(st.textContent)) st.textContent=statusText(); };
      tick=setInterval(()=>{ if(!done && st && !/^[✓✗⏸⏱]/.test(st.textContent)) st.textContent=statusText(); },1000);   // 心跳:每秒刷新工作状态
      poll=setInterval(async()=>{ if(done)return; try{ const arr=await (await fetch(url(`/cmp/${prov}/v1/threads/summary?limit=10`))).json(); const me=Array.isArray(arr)?arr.find(x=>x.id===tid):null; if(me && ["completed","failed","interrupted","canceled","cancelled"].includes(me.latest_turn_status)) finish(); }catch(e){} },4000);   // 兜底:SSE 停顿/漏 turn.completed 时靠轮询发现已结束→即时收尾刷新
      const scroll=()=>{ const b=$("#cmpb-"+CSS.escape(prov)); if(b) b.scrollTop=b.scrollHeight; };
      setPhase("思考中");
      const isTool=kind=>kind && !["agent_message","agent_reasoning","user_message"].includes(kind);
      const onEv=(k,e)=>{   // SSE 是命名事件,逐个 addEventListener(onmessage 只收匿名事件,收不到)
        let ev; try{ ev=JSON.parse(e.data); }catch{ return; }
        if(myTurn && ev.turn_id && ev.turn_id!==myTurn) return;   // 不是本轮的事件(重放的旧轮)→ 忽略,杜绝 ✓0s 误收尾 / 流式不同步 / 吞答案
        bump();   // 每收到一个事件就重置空闲计时:模型在干活就别超时
        if(ev.seq) CMP.seq[prov]=ev.seq;
        const pl=ev.payload||{};
        if(k==="turn.started"){ CMP.turn[prov]=ev.turn_id||(pl.turn||{}).id||CMP.turn[prov]; cmpSyncSendUI(); }   // 记下 turn_id 供「停止」中断 + 引导;turn 活了刷「引导」按钮
        else if(k==="item.delta"){
          if(pl.kind==="agent_message"){ if(grace){clearTimeout(grace);grace=null;} ans.textContent+=pl.delta||""; setPhase("输出中"); scroll(); }
          else if(pl.kind==="agent_reasoning"){ rsn.textContent+=pl.delta||""; setPhase("思考中"); }   // 思考收进折叠的过程块,不挤占答案
        } else if(k==="item.started"){ if(isTool((pl.item||{}).kind)){ setPhase("执行工具"); } }
        else if(k==="item.completed"){ const it=pl.item||{};
          if(it.kind==="agent_message"&&it.detail) ans.textContent=it.detail;
          else if(isTool(it.kind)){ sawTool=true; addStep("🔧 "+String(it.summary||it.kind).slice(0,140)); }   // 工具/命令活动→折叠的过程块
        }
        else if(k==="approval.required"){ const aid=pl.approval_id||pl.id||ev.approval_id; const tool=String(pl.tool_name||pl.command||pl.summary||"工具调用").slice(0,90);
          if(CMP.autoApprove && aid){ fetch(url(`/cmp/${prov}/v1/approvals/${aid}`),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({decision:"allow",remember:false})}).catch(()=>{}); addStep("🔧 自动批准:"+tool); }
          else addStep("🔒 需批准:"+tool+"(开「⚡自动批准」放行)");
        }
        else if(k==="item.failed"){ const it=pl.item||{}; const msg=String(it.detail||it.summary||"失败").replace(/\s+/g," ").slice(0,160);
          // 工具/命令失败只算"过程一步",agent 会重试/换招 → 不要当整轮失败把该栏收尾(否则吞掉后面真正的答案)。
          // 只有当 turn 真正结束(turn.completed/failed)且全程没拿到答案时才在那里收尾。
          if(isTool(it.kind)||!it.kind){ sawTool=true; addStep("🔧 ✗ "+msg); setPhase("重试中"); }
          else { rsn.textContent += (rsn.textContent?"\n":"")+"[失败] "+msg; }
        }
        else if(k==="turn.completed"||k==="turn.failed"||k==="turn.interrupted"){

          else if(k==="turn.failed"){ if(!ans.textContent.trim()) ans.innerHTML='<span class="err">✗ 本轮失败(展开「过程」看详情)</span>'; if(st)st.textContent="✗"; finish(true); }   // 真正整轮失败才标 ✗
          else { if(k==="turn.interrupted"&&st)st.textContent="⏸ 已暂停"; finish(); }
        }
      };
      ["turn.started","item.started","item.delta","item.completed","item.failed","approval.required","turn.completed","turn.failed","turn.interrupted"].forEach(name=>es.addEventListener(name,e=>onEv(name,e)));
      es.onerror=()=>{ if(es.readyState===2) finish(); };

    });

}
// 对比的 overlay HTML 在本 <script> 之后才解析 → 绑定必须等 DOMContentLoaded,否则 #cmpSendBtn 等还不存在,点了没反应
window.addEventListener("DOMContentLoaded",()=>{
  const IS_CMP_WIN = new URLSearchParams(location.search).get("compare")==="1";   // 本页是不是一个独立对比窗口
  const cb=$("#cmpbtn"); if(cb) cb.onclick=()=>openCompareWindow();   // 「⚖️ 对比」→ 每点开一个全新独立窗口(原生壳新 NSWindow),可同时跑多个;不再页内覆盖
  const cc=$("#cmpClose"); if(cc) cc.onclick=()=> IS_CMP_WIN ? window.close() : closeCompare();   // 专用对比窗口:退出=关窗;万一在主窗口(理论上不会)则只收覆盖层
  if(IS_CMP_WIN) (async ()=>{   // ?compare=1 即时进对比(覆盖层 CSS 已首帧前盖上,这里只填内容,不再等 200ms);带 ?session 则还原那场对比
    const sid=new URLSearchParams(location.search).get("session");
    if(sid){ try{ await loadCmpSessions(); }catch(e){} const s=state.cmpSessions.find(x=>x.id===sid); if(s){ restoreCompareSession(s); return; } }
    openCompare();
  })();
  const cn=$("#cmpNewBtn"); if(cn) cn.onclick=cmpNewChat;
  const cr=$("#cmpResetBtn"); if(cr) cr.onclick=cmpResetBackends;
  const cs=$("#cmpSendBtn"); if(cs) cs.onclick=cmpSend;
  const csb=$("#cmpSteerBtn"); if(csb) csb.onclick=cmpSteer;
  const ca=$("#cmpAutoTgl"); if(ca) ca.onclick=cmpToggleAuto;
  const csh=$("#cmpShellTgl"); if(csh) csh.onclick=cmpToggleShell;
  renderCmpToggles();
  const ci=$("#cmpInput"); if(ci){
    ci.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ if(e.isComposing||e.keyCode===229)return; e.preventDefault(); cmpSend(); }});
    ci.addEventListener("paste",e=>{ const fs=[...((e.clipboardData&&e.clipboardData.files)||[])]; if(fs.length){ e.preventDefault(); cmpUploadFiles(fs); } });   // 粘贴文件/图片 → 上传(纯文本粘贴照常)
  }
  const cab=$("#cmpAttachBtn"); if(cab) cab.onclick=()=>$("#cmpFileInput").click();
  const cfi=$("#cmpFileInput"); if(cfi) cfi.onchange=e=>{ if(e.target.files.length) cmpUploadFiles([...e.target.files]); e.target.value=""; };
  const cvw=$("#cmpView"); if(cvw){   // 拖拽文件到对比视图任意处 → 上传
    cvw.addEventListener("dragover",e=>{ if(e.dataTransfer&&[...e.dataTransfer.types].includes("Files")) e.preventDefault(); });
    cvw.addEventListener("drop",e=>{ if(e.dataTransfer&&e.dataTransfer.files.length){ e.preventDefault(); cmpUploadFiles([...e.dataTransfer.files]); } });
  }
});

<div id="cmpView" hidden>
  <div id="cmpTop">
    <div id="cmpHead"><b>⚖️ 多模型对比</b><div id="cmpChips"></div><div id="cmpShellTgl" class="tgl" title="开 = 允许 exec_shell 跑命令(跳出沙箱)。注:MCP / web_search / 读取等工具跟单窗口一样一直可用,此开关只额外控制 shell 命令"><span class="sw"></span>💻 Shell</div><div id="cmpAutoTgl" class="tgl" title="工具调用自动批准(对比无逐栏审批 UI,开 Shell 时建议开)"><span class="sw"></span>⚡ 自动批准</div><div id="cmpLayout" title="排列方式:横列 / 竖列 / 田字格"><button class="laybtn" data-l="row">横</button><button class="laybtn" data-l="col">竖</button><button class="laybtn" data-l="grid">田</button></div><div id="cmpFswrap" title="对比文字大小(独立于主窗口)"><button class="fsbtn" onclick="bumpCmpFs(-1)" title="字小一点">A−</button><button class="fsbtn" onclick="bumpCmpFs(1)" title="字大一点">A+</button></div><button id="cmpNewBtn" title="在当前窗口开新一轮对比(上一轮已自动存进侧栏「多模型对比」会话,随时点回,不会丢)">＋ 新对话</button><button id="cmpResetBtn" title="某栏回答的不是它本人(回退成了 DeepSeek)?点这里用最新配置/key 重启所有对比后端">↻ 重启后端</button><button id="cmpClose" title="关闭这个对比窗口">✕ 退出</button></div>
    <div id="cmpAttachBar" hidden></div>
    <div id="cmpInputRow"><button id="cmpAttachBtn" title="上传文件(文本/代码,各模型会 read_file 读取;也可直接粘贴/拖拽。图片当前模型看不了)">📎</button><textarea id="cmpInput" placeholder="输入一个问题,同时发给所有选中的模型…（Enter 发送 · Shift+Enter 换行 · 可粘贴/拖拽文件）"></textarea><button id="cmpSteerBtn" hidden title="把这句插进正在运行的对话,实时引导它们(全模型支持);「发送」则是排队、等当前轮完再发">⤵ 引导</button><button id="cmpSendBtn">发送</button></div>
    <input type="file" id="cmpFileInput" multiple style="display:none">
    <div id="cmpQueue" hidden></div>
  </div>
  <div id="cmpCols"></div>
</div>
</body>
</html>
